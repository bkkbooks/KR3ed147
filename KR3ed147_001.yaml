body:
  text: 卷之一中風門通關散治中風不語不省人事牙關緊閉湯水不入者以此吹之生南星生半夏豬牙皂各等分上為細末用少許吹鼻內有嚏可治無嚏不可治又通關散治中風痰厥昏迷卒倒不省人事欲絕者用巴豆去殼紙包捶油去豆不用用紙捻作條送入鼻內或加牙皂末尤良或用前紙條燒煙燻入鼻內亦可大秦艽湯治卒中風酸厥半身不遂肢體麻木語言微澀症秦艽石膏生各一錢川芎當歸茯苓生地熟地各八分白芍羌恬獨活白朮各六分防風黃芩各七分白芷細辛各五分甘草三分用水二鍾煎一鍾去渣溫服時遇天陰加生薑七片如心下痞滿加枳實一錢此是秋冬之藥如春夏時加知母一錢煎服立效又方治厥不省人事六脈俱閉用折絹子的紙卷捻點菸熏入鼻內久則火痰吐出甚效口眼歪斜方蓖麻子研爛右歪塗左邊左歪塗右邊一經復正即速洗去神效治中風半身不遂效方石斛牛膝木爪當歸白芍各三錢上用煮酒煎溫服治風癱怪方呂道人用油核桃搗爛如泥黃蠟各三錢上二味滾黃酒沖服出微汗停三日又進一次各用四錢照前沖服又停三日再服一次三次服完全愈史國公浸酒方專治左癱右瘓半身不遂四肢麻木骨節疼痛諸般寒濕風氣當歸羌活松節秦艽防風去蘆川牛膝晚蠶砂虎脛骨酒浸一日焙乾酥炙萆薢各二兩枸杞子五兩干茄根八兩飯鍋蒸熟用東酒一斗絹袋盛藥入酒肉封固停十日飲取時不可面向壇口恐藥氣衝入眼目飲酒無間斷飲盡將藥曬乾研末米糊丸梧桐子大空心酒下白丸子藥專治男婦手足癱瘓風痰壅盛嘔吐涎沫及小兒驚風婦人血風生半夏水洗七兩生南星二兩白附子生二兩生川烏去皮臍五錢上共為細末以生絹袋盛於井水內擺出如未出者更以手揉有渣再研細末更以袋盛擺盡為度置磁盆中日曬夜露至曉撒去舊水再加新水每日換水攪時春五夏三秋七冬十日去水曬乾後若玉片研末以糯米粉打稀糊為丸綠豆大每服二十丸薑湯送下如癱瘓風症溫酒下小兒驚風薄荷湯送下三五丸可也又一方治風痹四肢攣急用薏苡仁大粳米等分煮粥空心食之久服即愈清痰順氣湯專治口眼喎斜症南星薑製貝母陳皮蒼朮米泔浸炒官桂防風荊芥黃芩酒炒黃連酒炒半夏薑製瓜蔞仁甘草各等分上銼生薑三片水煎臨服入木香沉香末各五分同服牛黃清心丸治諸風緩縱不遂語言蹇澀心怔健忘恍惚去來頭目眩暈胸中煩郁痰涎壅塞精神昏憒又治心氣不足神志不定驚恐夜怖悲憂慘慼虛煩少睡喜怒無時或發狂癲神精昏亂或積熱吐血骨蒸勞病等症羚羊角末一兩乾山藥七兩白茯苓一兩二錢五分防風一兩五錢白朮一兩五錢阿膠炒一兩七錢五分犀角二兩龍腦研麝香各一兩牛黃研一兩二錢白芍二兩五錢甘草蜜炙五錢麥門冬去心一兩五錢黃芩一兩五錢大棗一百枚去皮核研成膏神麯研人參各一兩五錢白蘞七錢五分肉桂去皮一兩七錢五分川芎一兩二錢五分炮姜七錢五分雄黃研飛八錢蒲黃炒二兩五錢當歸二兩五錢杏仁去皮尖炒黃色另研柴胡去苗桔梗各一兩二錢五分大豆黃卷研炒一兩七錢五分金箔一千二百張用四百張為衣上除棗杏仁金箔二角屑及牛黃麝香雄黃龍腦四味外為細末入余藥和勻煉蜜與棗膏為丸每兩作十丸金箔為衣用黃蠟包裹每服一丸或半丸去蠟皮薄荷湯送下或白滾水送下亦可又方治中風有痰忽不能言者香油二兩雞蛋一個上將雞子打開去殼調勻香油灌下即愈又一方用地內掘出鐵上有鏽土者連土煎水常服遍身淤痰自化一方治中風痰多壅塞用苦丁香末一錢溫水調服令吐出積痰自愈一方治口眼歪斜用鱔魚血塗抹右歪塗左邊左歪塗右邊如正即洗去肘後方治中風口歪用鱉血調烏頭末左歪塗右邊右歪塗左邊待正即將藥洗去傷寒門十神湯治感冒風寒發熱惡寒頭疼身疼咳嗽喘急或欲成疹此藥不問陰陽兩感風寒及四時不正瘟疫妄行並宜服之川芎白芷麻黃陳皮香附赤芍升麻乾葛各一錢紫蘇一錢五分甘草五分水二鍾姜三片煎八分熱服出汗以被蓋之如發熱頭疼加細辛石膏蔥白胸膈膨悶加枳殼桔梗心腹脹滿加枳實半夏潮熱加黃芩麥冬咳嗽喘急加桑白皮桔梗半夏大便閉加大黃芒硝嘔吐加藿香半夏泄瀉加白朮茯苓瘧疾加草果檳榔痢疾加枳殼黃連腹痛加白芍羌活沖和湯以代桂枝麻黃青龍各半湯此太陽經之神藥也治春夏秋感冒暴寒頭疼發熱惡寒脊強無汗白芷川芎防風蒼朮各八分生地黃羌活黃芩各一錢甘草細辛各三分水二鍾姜三片棗二枚煎一鍾捶法加蔥白搗汁五茶匙入藥再煎一二沸如發汗用熱服止汗溫服如胸中飽滿加枳殼桔梗去地黃夏月加石膏知母名神術湯如服此湯不作汗加紫蘇喘加杏仁地黃汗後不解宜再服汗下兼行加大黃釜底抽薪之法其春夏秋感冒非時傷風亦有頭痛惡寒少熱自汗去蒼木細辛加白木如汗不出加黃耆芍藥發汗方連須蔥白二根紅棗二個綠豆三十粒松蘿茶三錢核桃一個連皮打碎水一碗煎八分熱服出汗如小兒服一半又方見佑宮胡方羊糞焙乾炒為末每服三錢黃酒送下汗出即愈治大頭傷寒神方昔京師人多患此病一異人書方於通衢用黑豆二合炒熟炙甘草一錢水二鍾煎八分熱服神效點眼方冰片牛黃青魚膽各一錢膽礬五分麻黃膏一兩八錢黃連膏二兩將前藥俱合膏內用磁罐盛之黃蠟封口以簪蘸無根水點眼男左女右大眼角仰臥閤眼汗出即愈治夾陰傷寒方紋銀一塊捶扁燒紅如病人未絕氣只燒滾熱放在臍上再用小雞一隻連毛剖開不去腸肚包乾銀上用布縛住即愈如人已死揭開雞看如雞育銀黑另換雞銀再包即愈三黃石膏湯治陽毒發斑目黃身如塗朱眼珠如火狂叫欲走燥渴欲死鼻乾面赤齒黃譫語不休晝夜喘息鼻時出血衄可用此湯治之石膏三錢麻黃香豉各五分黃連黃柏黃芩梔子各一錢水二仲姜三片棗一枚捶法入細茶一撮煎熱服三黃巨勝湯治陽毒發斑狂亂妄言大渴叫喊目赤大便燥實上氣喘急舌卷囊縮難治者權以此方劫之石膏三錢芒硝五分黃連黃柏黃芩梔子各一錢大黃一錢五分水二鍾姜一片棗二枚煎服捶法臨服入磨刀泥漿水兩茶匙附傷風方紫蘇二錢核桃五個打碎生薑三大片蔥白二寸水二鍾煎一鍾熱服出微汗即解如夏月去蔥白不用一方治傷寒四五日頭疼發熱腦中煩疼者用苦參五兩烏梅二十枚水二斤煎一斤分服甚妙又方治頭疼身痛發熱憎寒口多譫語久無汗出者用大梨一個生薑一兩同搗爛取汁入童便一碗重湯煮熱服汗大出即愈一方凡遇外感風寒以蘇葉一味煎湯熱服二碗用被蓋汗出渾身通泰風寒即去獨神湯治一切感冒用黑豆一合炒集以酒淬入熱飲微醺將被蓋臥汗出即愈又方將蔥白頭二三根生嚼熱酒下之汗出即愈七將軍湯治感冒將核桃連殼打碎蔥白頭各七個加茶葉三錢共入大碗中用百沸湯泡熏頭面通口盡飲之被覆臥汗出瘥加生薑煎服尤妙一方傷寒初起用生薑帶皮者三兩搗爛將熱酒泡飲出汗即愈又方以水調芥菜子末填臍內內熱物隔衣熨之取汗而愈一方治傷寒發黃目不識人將生薑火煨熱去粗皮布包扭出汗蘸香油點兩目大小眼角立效一方治濕熱發黃昏沉不省人事死在須臾者用白毛烏骨雞一隻干撏去毛破開去腸屎刀切爛鋪心頭上少頃即活陰症傷寒效方胡椒四十九粒飛礬一錢黃丹一錢上研細末以好酒和成為丸男置左手心女置右手心正對陰戶合之緊緊安定少頃腹內躁熱不可動搖即愈女人尤效一方治傷寒譫語以蚯蚓糞涼水調服如有腮腫者用赤小豆為末水調敷之一方治傷寒飲食勞復以面一餅水煮取汁飲之一方因傷寒愈後男女交合而無恙者反得其病名曰陰易陽易其症手足拘急乾薑四兩為末湯調頓服取衣被蓋之出汗即愈又方婦女月經布燒灰水煎乘熱服如無男用女褲襠女用男褲襠燒灰服之亦效瓜蒂散治傷寒四五日病在胸膈痰氣緊滿欲上不得息者以此吐之甜瓜帝炒赤小豆各等分上為末每服一錢豆豉煎湯調服以吐為度姜熨法治傷寒胸膈不寬一切寒結熱結水結食結痞結痰結大小便結胸膈痞氣皆治生薑搗爛如泥去汁取渣炒熱絹包漸漸揉熨心胸脅下其滿痛豁然自愈若姜渣冷再入姜再炒再熨可也中寒門五積散治感冒寒邪頭疼身痛強硬拘急惡寒嘔吐或有腹痛又治傷寒發熱頭痛惡風無問內傷生冷胸膈脹滿外感風寒濕氣客於紅絡腰腳痠疼又治婦人難產經候不調或氣血不通氣壅不快並治白芷川芎半夏官桂各七分白茯苓厚朴桔梗當歸白芍枳殼乾薑各八分陳皮麻黃各一錢甘草六分蒼朮二錢水三鍾姜三片蔥白三根煎熱服婦人調經加醋艾加減沖和湯治春夏秋感冒非時暴寒亦有頭疼惡寒身熱自汗羌活一錢五分川芎一錢三分白朮白芷生地黃黃芩蒼朮各一錢二分防風一錢五分甘草五分炙細辛二分上銼生薑三片棗二枚蔥白二根水煎溫服金不換正氣散治四時傷寒瘟疫時氣頭疼壯熱腰背拘急山嵐瘴氣寒熱交徵霍亂吐瀉臟腑虛寒下痢赤白蒼朮炒厚朴姜炒橘皮去白半夏曲炒藿香各二錢甘草炙一錢上銼生薑五片紅棗二枚水二鍾煎一鍾空心溫服忌生冷油膩發物如出遠方水土不服者亦可服之三白飲治天行時氣熱極狂亂及發熱不退或大便燥結不通雞子清一個白蜜一大匙芒硝三錢為末上三味和勻涼水調服即愈瘟疫門人參敗毒散治傷寒瘟疫風濕頭目昏眩四肢疼痛憎寒壯熱風痰咳嗽鼻塞身重諸般瘡毒及小兒驚風人參五分柴胡一錢前胡川芎茯苓桔梗羌活各八分獨活枳殼各七分甘草二分水二鍾煎八分熱服如咳嗽加半夏杏仁如熱加黃芩黃連黃柏山梔日乾舌燥加黃芩風熱加荊芥防風香蘇散治四時傷寒頭疼發熱惡寒紫蘇三錢香附陳皮各一錢甘草五分水二鍾姜三片蔥二根煎八分空心熱服如頭疼甚者加川芎白芷發汗靈方治傷風傷寒一切等症蒼樣米泔浸羌活白礬各等分為末用生薑搗自然汁為丸如彈子大每用一丸男左女右手緊攥丸對陰處吃蔥薑湯被蓋取汗即愈一方專治內熱不論傳經過經煩渴無汗不大便最效錦紋大黃二兩酒拌蒸小牙皂一兩火煅去皮弦上二味為末米糊為丸如綠豆大每服二錢用綠豆湯涼冷送下取被蓋之出汗即愈涼水金丹治四時不正之氣傷寒傷暑傷風瘧痢發熱頭疼等症如孕婦小兒痘疹勿服沉香公丁香甜瓜子仁各五分木香兒茶各七分京牛黃二分巴豆霜去油淨三錢乳香天南星沒藥輕粉各一錢冰片一分五釐雄黃血竭硃砂各一錢五分牙皂炙黃色八分鴉片六分白花蛇炙黃色二錢上十八味共研細末煮棗肉為丸如黃豆大金箔為衣每服一丸涼水送下即愈又方劉有義方治時氣流行瘟疫通用九九盡日令人收茵陳蒿連根採來陰乾如遇天行春令時疫起每一人用蒿子五分烏梅兩個打碎水二鍾煎八分熱服汗出即愈一方治時氣熱病用生藕搗爛取汁一盞入蜜一合和勻分為兩服又方治時氣三日外忽覺胸滿堅硬手足心熱而變黃用苦丁香七枚研末如大豆許吹兩鼻中令黃水出涎沫再調五分服吐黃水一二盞痊一方靈佑宮胡方治瘟病出汗即愈黃丹胡椒白礬各一兩馬蜂窩五錢上為細末老蔥共搗成膏男左女右手捏對小便處即時汗出效諸葛行軍散綠豆粉一兩麻黃末八錢上共研和勻每服一錢用無根水調下其汗自出瘟疫即愈一方用新布袋盛赤小豆置井中三日取出舉家皆服男十粒女二十粒服之瘟則遠避妙又方用好管仲四個浸在水缸內取水飲之不染瘟疾一方治天行瘟疫病人傳染時氣熱毒煩躁狂言用靛青一茶匙以新汲井水調服效一方凡遇瘟疫盛行之時若欲出門走東過西須飲酒幾杯然後出門回家之時亦當飲酒幾杯然後可食別樣物什自然氣壯決不染瘟但不可至醉如不能飲酒者出入可食薑蒜或將蒜塞在鼻內亦可甚妙一方治大人傷寒小兒瘟疫隱疹不能發出服此即出用鮎魚頭骨燒灰研細將熱黃酒調下二三分服之即愈內府仙方治腫頂大頭病蝦蟆瘟病殭蠶二兩薑黃二錢五分大黃四兩蟬蛻二錢五分上共為末薑汁打糊為丸重一錢大人服一丸小兒服半丸蜜水調服立愈五瘟丹治四時瘟疫流行傷寒發熱並諸瘧熱病黃連黃柏黃芩甘草紫蘇香附各一兩上六味皆生用於冬至日製為末用錦紋大黃三兩濃煎湯去渣熬成膏和前藥為丸如彈子大硃砂雄黃末為衣再貼金箔每服一丸冷水磨秀神效闢瘟疫方神砂一兩為末白蜜合丸麻子大以太歲日或平旦一家皆向東方用井花冷水各吞二十一丸永無疫患忌葷一日一方孫偉凡遇天年大行瘟疫四時不正一切癘氣者多以蒼朮燒之能闢瘟邪至奇中暑門辰砂羌活丸即靈砂丹治風熱鬱結氣血蘊滯頭目昏花感冒傷寒鼻塞聲重清涕口苦舌乾咽嗌不利胸膈痞悶咳嗽痰盛腸胃燥澀小便赤黃或腎水陰虛心火熾盛及偏正頭疼發落齒疼遍身麻木疥癬痛癢一切風邪病皆治之天麻羌活獨活石膏連翹防風薄荷細辛各二兩川芎梔子當歸芍藥黃芩全蠍微炒去毒大黃荊芥人參菊花白朮各五錢桔梗砂仁寒水石各七錢五分滑石四兩甘草硃砂三兩研末為衣上為細末煉蜜為丸每兩作五丸靈砂為衣每服一丸清茶送下一方治中暑忽然倒地氣欲絕者大蒜四五個剝淨再取路上熱土一塊共搗爛以新汲井水和勻去渣灌之即愈六一散治中暑身熱小便不利滑石六兩飛過甘草一兩磨細末上二味和勻每服三錢不拘時以新汲井水調服甚妙辰砂益元散此解中暑傷寒飢渴勞損並酒食熱毒腹脹身疼嘔吐泄瀉下痢赤白又治婦人經水不調此藥服之通九竅利六腑保真元明耳目定心志除燥熱乃神驗之仙丹也滑石水飛六兩粉草一兩硃砂五錢上為細末每服三錢蜜少許溫水調下如熱用新汲涼水如痢用蔥鼓湯下通乳用豬蹄湯下如催生用香油漿下梅蘇丸烏梅肉一斤蘇葉五錢薄荷葉四兩檀香末二兩白洋糖二斤上共為末糖粗渣為母水為丸或煉蜜為丸亦可中濕門除濕羌活湯治風濕相搏一身盡痛蒼木米泔浸藁本各二錢羌活七分防風去蘆升麻柴胡各五分水二鍾煎八分溫服腎著湯治腎虛傷濕身重腰冷如坐水中不渴小便自利乾薑炮茯苓各二錢甘草炙白朮各一錢水一盞煎七分空心溫服一方治濕氣作疼白朮一兩水一鍾酒半鍾煎一鍾不拘時溫服一方治夏月患濕不能行走指腫者九月間收茄根懸檐下臨用煎湯洗之愈立效丹治寒濕兩腿作疼用艾二兩蔥頭一握生薑一兩五錢共搗爛用布包蘸極熱燒酒搽患處以痛止為度痰火門瓜蔞枳實湯治痰火發痓瓜蔞仁枳實貝母桔梗片芩麥冬去心陳皮山梔當歸茯苓去皮蘇子各一錢人參五分甘草三分上銼一劑姜一片入竹瀝薑汁少許水煎溫服青金錠治男婦風痰痰厥牙關緊閉不能開口難以服藥並乳蛾不能言者小兒驚風痰迷將此藥一錠取井水磨開將藥滴入鼻孔即進喉內痰即吐出立刻得生效驗如神元胡索二錢青黛六分牙皂火煅十四枚上為細末入麝香一分再研清水調成錠每錠五分陰乾用活聖散治痰迷心竅癲狂昏迷驚癇等症甜瓜蒂為末每服九分重者服一錢溫水送下即吐如不吐再服倘吐不止用開水解或蔥湯更好加麝香研少許妙若有蟲吐出者再加雄黃一錢服之一方專治痰火貝母不拘多少以童便秋冬浸三日春夏浸一日夜撈起水淋洗淨曬乾研末糖霜和成不拘時滾白湯下化痰丸絲瓜燒灰存性為細末棗肉丸彈子大酒化一丸服之立驗一方治用疾甚危紅消梨啖之或絞汁飲之旬日可愈一方治風癲狂譫語如癡皆痰所致也以鹽水一大碗灌下吐痰即痊回生丹治痰厥氣絕心頭溫者取古塔上陳石灰一合水一盞煎滾去水再用清水一盞煎極滾澄清捎口灌之痰下自醒如無塔灰古牆陳灰亦可痰火方梨汁藕汁蘿蔔汁絲瓜藤汁石膏荸薺汁各四兩上共煎成膏每服半盞白湯送下神效一方急救痰火壅塞用雞蛋清香油對勻灌之痰即自下又方洋糖二錢蜂蜜亦可薑汁不拘加食鹽少許合滾湯送下一方硃砂飛過五錢薑汁調勻灌下二三服痰盡化一方治痰火暫得忽而有痰在喉中響若雷嗚用香油一鍾白礬一錢研細末入香油內調產灌下豨薟丸專治肝腎風氣四肢無力麻悶皮骨疼痛腰膝無力不能行遍身氣串治三十六般用服無不痊常服此丸必效豨薟草處處有之用五月五日六月六日九月九日採葉洗淨用好酒拌蜜蒸曬乾蒸拌九次曬九次研末煉蜜為丸如梧桐子大用磁器裝盛每服四十丸或五十丸空心用好酒送下服此其妙不可盡述有益州張詠進豨薟表云因修龍興寺掘出一碑上說修養之術並藥二件依方訪問採覓藥草頗異金陵銀線根紫蒂對節葉而生蜀號火朽鍁莖葉頗同蒼耳誰知賤之物乃有非常之效臣自食百眼眼自清明至千服鬢髮烏黑筋骨輕健效驗多端臣本州羅太守曾因中風墜馬久喑不語與十服藥其病痊又和尚嚴志年七十得患偏口眼歪邪時時生涎與十服藥亦痊三釐抽筋散殷老公方專治半身不遂番木鱉不拘多少用香油炸待浮起取出乘熱去皮為末每服三分黃酒下汗出即愈一粒金丹殷老公方專治男婦左癱右瘓噎食虛損勞役一切等症木香沉香各一錢麝香四分阿芙蓉四錢硃砂四分飛過冰片八分雄黃牛黃各六分上為細末用婦人乳為丸如櫻桃大以金箔為衣薑湯化下如白痢白糖湯下紅痢西瓜水下如婦人產後經脈不調者紅花湯下孕婦莫服忌氣惱油膩椒酒一方劉大典方治痰火後半身不遂筋骨疼痛核桃仁棉花子仁杜仲炒巴戟砂仁骨碎補枸杞子續斷牛膝各二兩大蝦米四兩菟絲餅四兩上燒酒二十斤煮服如年高者加香附肉桂各一兩酒服完將渣曬乾為細末煉蜜為丸每服二錢酒送下內傷門補中益氣湯治形神勞役或飲食失節勞役虛損身熱而煩頭痛或惡寒而渴自汗無力氣吼而喘黃耆蜜炒一錢五分揀參去蘆一錢白朮去蘆當歸酒洗陳皮甘草各一錢柴胡升麻各五分黃柏酒炒三分紅花三分上銼生薑三片大棗一枚水煎空心服如汗多出去升麻柴胡加酸棗仁一錢夜間不睡亦如之如頭疼加蔓荊子五分川芎一錢如善嚏者加白芷川芎如腦疼頭頂疼加藁本一錢細辛五分如口渴加葛根六分有痰加貝母前胡各一錢如泄瀉加白芍煨澤瀉茯苓各一錢如心胸覺痞悶去黃耆升麻柴胡加枳實六分黃連五分姜炒如嗽加桑白皮一錢五味子十五粒如額疼加白芷一錢葛根升麻各五錢如心志不寧加茯神一錢遠志七分酸棗仁一錢炒石菖蒲七分柏子仁一錢如飲食少或傷飲食加神麯麥芽山楂枳實各一錢如心脾二經舌乾口燥加黃連山梔各五分如胃中濕痰加半夏一錢如虛火上炎加玄參知母黃柏蜜炒各一錢如夢遺加牡蠣龍骨各一錢如下部無力加牛膝杜仲各一錢如腳軟加木瓜一錢防已五分如有痰或兼脾胃不和加半夏麥芽各一錢如陰虛內熱有痰或上焦有火加貝母花粉各一錢有熱加枯芩八分黃連六分如有熱壅盛眼赤加龍膽草八分如風寒頭痛身熱加防風川芎白芷各一錢羌活七分汗多加黃耆一錢眼痛加菊花熟地身熱加生地如大病後元氣未足而胸滿氣短加橘皮枳實白芍一方孫偉專治內傷勞役飲食失節遍身發熱轉成虛勞咳嗽等症白花藕搗爛取汁去渣白蜂蜜黑豆炒去皮研末人乳各四兩上四味和勻每服三匙滾白水下助胃膏治元氣脾胃虛弱吐瀉不止不思飲食久瀉虛寒人參白朮茯苓甘草炙各一錢五分木香山藥炒白豆蔻去殼各五錢砂仁炒十二個丁香藿香官桂各三錢陳皮五錢肉豆蔻麵包捶去油一個上為細末煉蜜為丸如彈子大每服一丸米湯化下醒脾散治小兒吐瀉不止作慢驚風脾困昏沉默默不食人參白朮茯苓天麻木香全蠍去毒白附子煨殭蠶炒各等分甘草炙減半上銼生薑三片棗一枚水煎濁服又方去天麻殭蠶加南星泡半夏泡陳倉米一錢煎服立效傷食門行氣香蘇散治內傷生冷飲食厚味堅硬之物肚腹脹滿外感風寒濕氣頭疼身熱憎寒遍身骨節麻木而痛七情惱怒相沖飲食不下心腹氣痛香附烏藥川芎陳皮麻黃各一錢羌活枳殼麩妙各八分甘草六分紫蘇根二分水二鍾生薑三片煎溫服如濕加蒼朮香砂平胃散專治傷食香附炒陳皮各一錢枳實麩炒藿香各八分木香甘草各五分砂仁七分上加姜一片水二鍾煎八分溫服如肉食不化加山楂草果麵食不化加神麯麥芽生冷瓜果不化加乾薑青皮飲酒傷者加黃連乾葛烏梅吐瀉不止加茯苓半夏烏梅去枳實神仙一塊氣治五積六聚滯食滯水心胸脹滿倒飽嘈雜嘔吐酸水氣悶不通胃脘疼痛等症巴豆莪朮杏仁川椒胡椒官桂青皮陳皮大茴香乾薑良薑川芎牽牛等分上為末對準分兩麵糊為丸桐子大每服一丸用紅棗一枚去核將藥入內包裹臨臥時嚼爛服之不用引送沉香百消丸治一切積聚痞塊此藥消而不見響而不動藥力尋常其功甚捷修德堂利人溥矣香附米醋炒五靈脂揀去沙石酒拌曬乾各半斤黑醜白醜各一斤沉香五錢上五味共為末醋糊為丸如綠豆大每服三十五丸或錢許食後薑湯下或茶清亦可如孕婦泄瀉久病者勿服忌人參七賢仙丹此藥能破五積六聚噎食轉食胃滿作飽胃中作痛心腹脹滿小兒食積大肚青筋等症雄黃硃砂川烏生蟬肚金玉檳榔乳香去油巴豆霜各一錢上研末醋糊為丸如急性子大每服七丸小兒三四丸量用淡薑湯下如外科遍身隱症惡毒初起用金銀花湯下病在上食後服病在下食前服山楂丸能消食健脾胃小兒尤益將山楂蒸熟去核搗爛蜜糖和丸不拘時白湯下一方治老人脾胃虛弱飢飽不食陳皮二兩倉米半升用黃土拌炒熟去土上為細末薑汁和丸桐子大每服五十丸食遠米湯送下九氣湯治風氣膈氣寒氣憂怒氣山嵐瘴氣積聚痞氣心腹刺痛不能飲食時止時發攻則欲死者香附鬱金甘草各三錢水二鍾加姜三片煎一鍾溫服保和丸專治食積酒積山楂肉十兩半夏薑製橘紅白茯苓麥芽炒神麯各五分連翹萊菔子炒黃連各二錢五分上為細末煉蜜為丸如桐子大每服一錢五分白滾水送下一方治吃粽傷者用白酒藥一丸加木香少許共為末黃酒調服愈一方治吃索粉涼粉停滯作疼者杏仁三十個去皮尖搗碎滾白湯泡飲即消一方治吃糯米麵食難化者神麯三錢炒為末酒調服或米飲亦可一方治食牛肉傷或脹滿者干稻草水煎濃湯服之立消一方治一切肉積脹痛神麯炒研末以炒表芽煎茶送下神效一方治食積痛食不運化積在胃口聞食則噁心用食鹽五錢刀口上燒紅水一鍾淬入乘熱飲之任吐即愈後用乾薑小茴香研末各一錢黃酒調服愈一方治酒毒用葛根切片細嚼或煎湯服亦可又止渴解大熱一方治傷酒食過多腹滿鹽花搽牙以溫水嗽下不三次即快一方治食生冷多傷脾胃砂仁煎茶常服郁證門六郁湯治諸郁清火化痰順氣開胸膈香附童便制蒼朮神麯山梔連翹陳皮川芎貝母去心枳殼麩炒蘇梗甘草各一錢水二鍾煎一鍾溫服有痰加南