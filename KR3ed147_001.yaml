煎八分溫服如霍亂轉筋加木瓜腹痛加芍藥寒痛加官桂冷甚加乾薑飲食不化心下痞悶加香附砂仁米穀不化加神麯麥芽肉食不化加山楂心下痞滿加枳殼青皮中暑冒風加香薷扁豆時氣憎寒壯熱加柴胡乾葛發熱加麥冬淡竹葉口渴作泄小便不利加車前子乾葛一方治霍亂吐瀉用淨土以冷水調飲童便尤佳一方用井花水和百沸滾湯各半碗服之效一方治霍亂頭旋眼昏手足轉筋四肢逆冷大蒜頭搗爛和井花水服一方治轉筋霍亂吐瀉扶病人坐起將涼水淋兩腿筋即不轉或以水二桶慢慢抬起病人腳入桶內浸過曲膝上立效一方治乾霍亂欲吐不吐欲瀉不瀉即絞腸沙用手在腿凹內拍數十下即有青脈突起將針刺出黑血立愈又方治霍亂而又下痢者用烏梅七個冰糖二兩水二鍾煎一鍾放土炕內候溫取服即愈治轉筋霍亂方吳之英方木瓜三錢黑糖二錢用水煎數滾涼服即愈一方專治霍亂孫偉方大蘿蔔梗葉細切搗爛取汁半碗一飲而愈炙法治霍亂已死腹中有緩氣者用鹽納臍中炙七壯一方孫偉方用綠豆粉和冰水調飲盡飲盡吐為妙嘔吐門一方治嘔吐膈氣開胃消食半夏生薑各三錢水一鍾煎七分溫服一方專治嘔噦橘皮生薑各三錢水一鍾煎七分溫服一方治嘔吐附噦用白芝麻一合清酒半升煎三合去油麻溫服即愈一方治胃中有火作嘔吐黃連五錢薑汁炒水煎食後服一方專治嘔噦柿蒂不拘多少煎湯服之一方治嘔逆干逆心下痞滿不食取羊乳一杯空心服之即愈噎食門神仙奪命丹雄黃硃砂研末為衣硼砂各二錢烏梅十二個去核乳香一錢黑豆綠豆各四十九粒百草霜五錢上將砂豆等為細末入烏梅肉搗均合丸如彈子大即以雄黃硃砂為衣陰乾每服一丸空心口含自化用茶漱口嚥下過五六日再服極效太倉丸專治噎膈翻胃脾胃虛弱不思飲食白豆蔻砂仁各二兩陳倉米一升黃土炒熟上為細末薑汁為丸如梧桐子大每服三錢淡薑湯送下一方孫偉方專治噎食翻胃嘔吐等症大塊鮮姜一斤人糞坑內泡四十九日然後取出水沏淨用柴火燒成炭研末每服三錢白滾水調下隔三五日再服其效如神一方治噎食神效用醋蛾曬乾為末每服一錢用酒調空心下五子散治氣膈噎食膨脹白蘿蔔子紫蘇子白芥子各五錢山楂肉香附米各一錢上為細末和勻作芥末用一方孫偉方專治翻胃膈食不能下下即吐者鴨子肫內黃皮三個焙乾為末作一服燒酒調下甚妙三日一次服一方專治翻胄馬蛇兒即野地蛇串子數條用公雞一隻籠著餓一日只與水吃淨它腸肚將馬蛇兒切爛或拌米與雞食之取糞焙乾為末每服一錢燒酒送下黃芩半夏生薑湯治嘔翻胃黃芩芍藥各三錢半夏薑汁八錢生薑四錢炙甘草二錢水三大鐘棗二枚煎一鍾溫服一方治翻胃噎膈用出窯石灰投入鍋中滾水內化開去渣只取其清水熬干刮下燒黃色者最妙牙包亦可用淨罐盛貯黃臘封口勿令泄氣過一二年者勿用凡人四十歲內外壯健者用四分老弱者二分或三分只以好燒酒調服能飲者三四鍾任量飲之如回食哽咽年深或吐蟲或下蟲即愈不吐不下遇發再服一次不發不必服自然痊愈一方治膈氣不下食屬火者蘆葦根五兩銼碎水三盞煎二盞去渣溫服代湯歡本草食云蘆根開胃降火治噎膈其根不用浮露者神授目露丹一富人病噎夢僧與之湯因往寺過僧果飲一湯問之乃干乾糖槽頭用六兩生薑四兩搗成餅或焙乾或曬乾每兩入炙甘草二錢研末每服二錢沸湯入鹽少許不拘時代茶服隨愈時時可服八厘金治噎膈等症臥雲山人牛黃狗寶各一分辰砂明雄各二分半全蠍一個巴豆仁一粒共為末每服八釐乾燒酒半鍾點著攪勻吹滅服吞酸門蒼連湯蒼朮黃連姜炒陳皮半夏薑製神麯炒茯苓各一錢砂仁吳茱萸各五分甘草三分水二鍾姜三片煎八分溫服遇仙丹專治邪熱上攻痰涎翻胃嘔吐吞酸酒疾積蟲積氣積血塊諸般痞疾食積腫痛大小便不利婦人女子面色痿黃產後癥瘕誤食銅錢銀物等症白醜頭末四兩半生半熟白檳榔一兩茵陳白朮醋炒三稜醋炒牙皂炙去皮尖各五錢上共為細末醋糊丸綠豆大每服三錢五更時冷茶送下天明看去後之物此藥有疾去疾有蟲去蟲不傷元氣不損臟腑效驗如神小兒減半孕婦忌服嘈雜門涼水丹治倒飽嘈雜心胃疼痛痰火症用陳石灰白麥面各等分蒸熟為丸大人三錢小兒一錢五分涼水送下清郁二陳湯治嘔吐酸水心胃疼痛嘈雜等症陳皮黃連半夏香附醋炒茯苓山梔炒各一錢白芍炒七分甘草三分蒼朮川芎枳實炒各八分神麯炒五錢水三鍾姜三片煎一鍾服諸氣門上下分消導氣湯功勝分心氣飲常患氣惱之人可用此作丸常服甚妙黃連薑汁炒枳殼桔梗桑白皮蜜炙茯苓川芎青皮香附童便浸炒厚朴姜炒半夏薑製瓜蔞仁澤瀉木通檳榔麥芽炒各一錢甘草五分上銼一劑用水三鍾生薑三片煎服如作丸用神麯糊為丸每服三錢空心白滾湯送下淡薑湯送下亦可
