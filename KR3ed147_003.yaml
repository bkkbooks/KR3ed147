一丸早午米湯送下臨晚滾水或黃酒送下日進三服猴薑丸吳化善方能添精益髓返老還童烏須黑髮種子延年猴薑二十斤用竹刀刮去皮毛搗爛取汁一斤二兩遠志肉一斤先以甘草四兩煎濃汁拌曬乾再以猴薑汁拌曬乾石菖蒲一斤蜜多酒少拌蒸枸杞子一斤淨蜜酒各半拌蒸破故紙一斤黃柏四兩煎汁拌曬乾再以知母四兩煎汁拌曬乾後用青鹽二兩水浸拌曬乾黑何首烏三斤黑豆蒸至黑色為度上為細末每藥末一斤用棗肉一斤同搗為丸如不足即將猴薑汁加之每服六錢空心白滾水送下一方治九種心疼並小腸疝氣神效砂仁陳皮香附醋炒荔枝核炒小茴香炒各一兩枳殼一兩五錢木香三錢沉香五錢上為細末麵糊為丸梧桐子大每服二錢空心黃酒送下一方治諸般蟲咬心疼腹內有蟲檳榔百部各一個水三鍾煎服其蟲或出或化效一方治五種黃病整青皮焙整陳皮焙芫花醋泡焙上各等分為細末空心開水送下或五分或一錢量病輕重服之一方治鼻血不止茅花三錢辛夷五分當歸生地各三錢木通六分白芍酒炒二錢荊芥穗酒炒黑存性一錢水二鍾煎八分通口服立止一方治大便下血椿根皮茯苓石榴皮茶葉桑白皮人參生薑水二鍾煎八分空心服一方治左癱右瘓威靈仙蒼朮牛膝桂枝木通各一兩共為末黃酒五斤煮一炷香早晚服專治氣臌水臌産後肚腹脹滿小兒氣臌痞疾蔥須炒黃胡椒炒焦胡鹽紅棗炒焦茶葉白糖乾薑各三錢酒麴蜂蜜各三兩用東酒一斤同藥末共入錫壺內水煮剩一半為度作二服吃為效一方洗風火眼痘風眼仙方神妙黃連粗的甘草生銅緑各二錢歸尾防風柴胡明礬各三錢上為細末每服一錢洗之一方武當山祖師石碑上方時來風癢遍體時無方調理最心疑服此神清精氣爽神光如閃目如漆武當石刻碑然在祖師親口泄天機若是此方無靈驗永作人間萬世驢胡麻威靈仙何首烏苦參甘草石菖蒲各三錢上為細末每服三錢黃酒送下仙傳神效方治大人氣性風羊羔風中風中痰小兒急驚風症生石膏十兩辰硃砂五錢上為細末大人三錢小兒一錢一歲至三歲四歲至七歲一錢五分八歲以後俱用二錢五分治禿瘡方神效馬錢子猴薑香油水各四兩水油藥共入鍋內煎枯去渣澄清調搽其效如神治牙疼神效方玄參升麻細辛各三錢水二鍾煎八分石膏三錢溫服忌煙酒動火之物治胃脘疼方杏仁二個去皮尖紅棗三個去核胡椒七個共搗爛再加五靈脂一錢為末黃酒一碗調服就好治心疼方木香沒藥乳香五靈脂兒茶良薑各五錢上為細末服三錢男人黃酒送下女人燒酒送下又方銀硃乳香沒藥各三錢松香一兩上為細末先用滾水挑半茶匙放水內即時取出為丸黃豆大每服二丸燒酒送下治疝氣偏墜方海藻昆布南山楂各三錢水二鍾煎八分食後服方靈丹沉香乳香去油砂仁香附米炒薑黃丁香藿香白芷黃連枳實麩炒甘草巴豆霜黃芩厚朴酥油炙六錢木香牙皂去皮炒青皮連翹去心大黃酒炒草豆蔻陳皮黃柏生地南山楂去核川芎紅花梔子炒杏仁去尖炒各一兩雄黃硃砂各四錢血竭八錢上為細末醋糊為丸梧桐子大每服大人二十丸小兒十丸五丸六丸孕婦勿服水瀉薑湯送下小兒米湯送下紅痢甘草湯送下白痢燈心薑湯送下瘧疾桃葉湯下氣滯乳香湯送下酒滯茶清送下食滯滾白水下胸膈嘈雜茶清送下胃腕痛薑湯送下心口疼茶醋湯送下眼目赤腫菊花湯下大小便不通茶清下五淋百濁車前子湯下寒嗽甘草湯送下熱嗽桑白皮湯送下疝氣小茴香湯下牙疼細辛湯送下口內生瘡薄荷湯下宿食宿酒茶清下小兒疳症竹葉蜜湯下小兒驚悸硃砂烏梅湯下以上引俱涼用治喉蛾神方將病頭上看有紅點用針挑破即愈雙蛾有紅點單蛾有一點紅保安萬靈丹治癰疽疔毒對口風濕風溫濕痰流注附骨陰疽並左癱右瘓口眼歪斜半身不遂通身走痛偏墜疝氣破傷風牙關緊閉等症服無不效以上十三分馮嘉寶集蒼朮八兩全蠍石斛明天麻當歸川芎羌活炙甘草荊芥防風麻黃川烏湯泡去皮臍草烏湯泡去皮臍細辛何首烏各一兩明雄黃六分上為細末煉蜜為丸每兩分四丸或六丸用硃砂為衣每服一丸口內嚼爛用連須蔥白幾根煎湯送下如左癱右瘓黃酒送下一方治瘧疾神浙姚徐士科集細茶葉緑豆粉各一兩雄黃二錢八分白信一錢八分上為細末醋打稀苗糊為丸如梧桐子大未發時服無根水送下五分如南方人三分忌葷腥生冷等物一方郎興祖集楊狗子焙乾為末血崩每服三錢溫黃酒調服小兒水瀉痢疾每服一錢米湯送下六勝七應丸此藥壯筋骨堅牙齒黑鬚發健步增飲食長氣力骨碎補炒去毛破故紙鹽水拌炒沙苑蒺藜鹽水拌炒白蒺藜炒去刺各四兩青鹽一兩黑豆八兩圓小堅實的炒熟上為細末煉蜜為丸三錢重早午晚服滾水送下一方治瘟疫傷寒不論傳經風寒咳嗽紅白痢心腹痛孕婦傷寒紅白痢初起疔毒大圓黃豆六十粒水二鍾煎一鍾服取汗病大者再一服御製除瘟解毒方辰砂益元散三錢生薑三錢黃酒半鍾水半鍾煎三滾溫服即愈治童子勞偏方人中白露天者不拘多少煅過用布包入靛缸中浸七日取出曬乾為末每服三錢蜜湯送下十日愈治肚大如年骨瘦如柴肚有青筋蝙蝠屎三錢瓦焙為末將牙豬膽煮熟拌屎末食之治小便頻數方白果十四枚七生七煨食之取效立止治下陰腫大痛極方絲瓜子不拘多少擂如泥熱黃酒沖服愈治下部陰蝨生白果嚼爛擦之愈又治陰癬治陰處蝨蟲用洗鏡子的鏽泥搽之一方此藥神應瘦人服身胖其功莫測牡蠣白朮各四兩苦參三兩上為細末用豬肚一具煮爛石臼內搗如泥和丸桐子大每服三十丸米飲送下日三五服妙治諸瘡胬肉如蛇凸出寸許硫黃一兩細研摻於肉上塗立即縮治屎門癢方鐵甲將軍燒灰香油調搽治痱子方將臘雪收藏瓶內封口至端午日將黃瓜入瓶內侵之封好遇有痱子將水搽抹效治缺唇方麻雀屎七粒胡椒七粒二味為末以燒酒調搽作麻藥割破開唇以龍骨白臘為丸搽上將花針縫之外將篾片夾住居靜室處七日勿笑哭恐裂開唇口治雞眼方荸薺一個蕎麥麵一錢蜈蚣一條加硫黃五分共搗爛貼一晝夜即除也治臭蟲方用羊頭骨一個秦艽半斤共入火盆內燒煙將房門閉上勿令出煙其蟲自死治口臭方甜瓜子搗為末蜜丸棗核大每早漱口含一丸治小兒出痘啞喉神方王永光方甜櫻桃核二十個砂鍋內焙黃色煎湯飲之即愈治氣心風方藜蘆甘草各四分為末用溫水調服服藥後必吐吐見血絲方飲涼水一碗則止祕傳棗礬丸治黃胖大有神效胡一鵬方紅棗一斤煮去皮核雞肫皮十個焙乾為末皂礬一兩為末二味用米醋一碗煎乾研細入棗肉搗為丸緑豆大每服五十丸黃酒送下一方治舌下腫一疙瘩稀爛無雜毛的白馬糞陰陽瓦煨灰加冰片少許為末上愈一方治傷寒內有一症叫作咯蒂傷寒用過出大恭草紙四十九張燒灰為末水二碗煎一碗支渣飲效
