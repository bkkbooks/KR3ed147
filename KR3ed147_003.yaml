body:
  text: 卷之三養生門少陽丹西海亭公路行見一少女將翁處分公怪問曰為何女答曰處分家子何怪問亭公遂喜乃知異人聽把於女曰大仙年多少願聞之女曰要知吾年千歲矣吾是西王母之妹這老翁年一百七歲是吾七代玄孫吾所服少陽丹乃太陽老君留傳此方為不信吾教不服此藥以致面皺頭白所以責之亭公曰余家住西海東至扶桑遍採諸藥尋真訪道未聞此藥今幸遭遇願説此方少女曰此藥用四般龍牙虛名一百三味吾宿世服之皆羽化田夫俗輩未嘗見聞此藥久服羽化登仙乃療諸疾服之延年萬歲病皆痊矣第一名烏嘉龍牙凡有四採春苗夏花秋實冬皮是枸杞合用一斤二名天瑣龍牙是蒼朮用一斤擇淨米泔水浸一宿三名錦繡龍牙是桑椹子用一斤稱制為汁合前藥四名百花龍牙是蜂蜜一斤乃是一百三味也上前藥石臼內搗為細末用新瓷盆一個將桑椹汁同前藥一處調勻用細絹蒙蓋盆口收在浮棚上淨處採受日精月華之氣煎乾復為末煉蜜為丸如梧桐子大每服三十丸至五十丸空心鹽湯或酒送下如服一年返老還童耳目聰明顏如白蓮服二年冬暖夏涼諸病不侵服三年齒落更生發白返黑昔白虎殿孫真人患目不見服此藥至一年雙目俱明後天海州有二木匠患風疾數年服此藥一年得痊此仙方也宜祕之不可亂傳祕傳地仙丹昔日赤腳張傳授山西猗氏縣一老人年六十服此藥壽百餘行走如飛飲食強增氣力倍加發白返黑齒落更生陽事強健此藥平常服能除邪熱伐木不怠目視十里認物至真不可轉傳春採枸杞葉名天精草陰乾聽用板上有刺者名曰棘即非枸杞味辛苦麻人切不可用慎之夏採花名長生草陰乾聽用秋採子名枸杞子陰乾聽用冬採根名地骨皮陰乾聽用以上採法俱同但嘗藥味甜者即良有棘刺者傷人切不可採上四味揀淨用無灰酒浸一宿曬露四十九晝夜受日精月華之氣令乾則為細末煉蜜為丸如彈子大每早晚各用一丸細嚼用百沸湯送下或化下五老還童丹赤石脂川椒辰砂乳香白茯苓各等分上為末棗肉為丸如桐子大每服三十丸空心黃酒送下不拘老少皆可服之採桑妙藥仙方治五勞七傷諸虛百損等症採嫩桑葉用河水洗淨曬乾為末有一斤對芝麻四兩先將芝麻用滾水一泡搗去粗皮微炒研爛用井水河水各半斤煎芝麻成膏下桑末再對煉過蜂蜜就和為丸加桐子大每服三錢空心淡鹽湯送下晚用無灰酒送下此藥常服甚效延年益壽不老丹生地酒浸一宿熟地酒洗淨天冬酒浸一二時去心各曬乾三兩何首烏半斤鮮者用竹刀刮去皮乾者用米泔水泡軟去皮用砂鍋內下烏羊肉一斤黑豆半斤量酌水用上加篦放此藥後覆蒸一二時辰取出曬乾白茯苓酒洗地骨皮酒洗各曬乾五兩上共為細末煉蜜為丸如梧桐子大每服三五十丸清晨黃酒送下老君長命丹白茯苓粉甘草各四兩川椒乾薑各二兩白麵六斤炒熱共為細末用其麻油二斤煉花泛淨涼溫入前藥面拌搗為丸如不成可加煉蜜彈子大初服一日三丸三日九丸後一日一丸飲涼水三口一日不飲不渴如要食吃核桃一個即飢思食草還丹能益元陽補元氣固元精壯元神真延年嗣續之藥也當歸四兩破故紙半斤酒浸一日焙乾麝香一錢山茱萸去核一斤酒浸共為細末煉蜜為丸桐子大每服八十一丸臨臥鹽湯送下服黃精法黃精十斤煮至稀爛絞汁去渣入蜂蜜或精七蜜三或四六停對熬成膏以磁罐收貯每日空心白滾水調服十數匙服蜂蜜法蜂蜜一斤柏子仁瓜子仁核桃仁各等分搗爛上將蜂蜜煉熟入前藥三味拌浸磁罐內任用服槐花茶法春月收嫩槐芽入清水內揉洗一會去其氣味擠干入鍋焙乾拌入細茶內煎服甚是香美久服百病不生明目第一服松靈法松脂松實各十斤菊花五斤上為細末煉蜜丸如桐子大每服三十丸黃酒送下服至百日神清體健其效非常服枸杞法枸杞不拘多少酒浸冬六夏三曬乾上研末重入酒內以梭布絞汁慢火熬膏入磁罐內封固煮三時每服一匙入酥油少許溫酒下服白朮法白朮二十五斤以東流水二斗五升入淨器內浸二十日去渣又以大盆盛之夜候流星過時書自己姓名投盆中如此五夜汁變如血取以漬曲如家釀法待熟飲之十日百病除百日面發光順最能延年益壽頭疼門三黃丸專清上焦之火潤大便凡覺有火而大便稍滯者宜服以順暢為度黃芩酒炒黃連薑汁炒各五兩大黃酒煮九次黑色為度三兩上為細末煉蜜為丸如桐子大每服四五十丸白滾水送下加味三黃丸黃連酒炒黃芩酒炒黃柏鹽水炒各三兩大黃酒浸蒸炒梔子酒炒各二兩共為細末酒糊為丸桐子大每服三四十丸空心滾水送下乳香落盞飲孫偉方治男婦偏正頭疼不可忍者罌粟殼去蒂四兩陳皮甘草炙桔梗柴胡各一兩共為細末每服二錢水一鍾燈心二十寸煎七分去渣食後服談野翁試效方專治偏正頭風百藥不治一服便可天下第一方也香白芷炒二兩五錢川芎炒甘草炙川烏頭半生半熟各一兩上為末每服一錢細茶薄荷湯調下三清神異丸川烏生用巴豆去油各一兩乾薑炮二兩上共為末醋糊為丸如急性子大硃砂為衣每服五七丸十一丸量人加減頭疼遍身疼傷風好酒下傷食原物湯下吹鼻散專治偏正頭疼腦悶牙疼咽喉等症歌曰此藥名為神聖乳香沒藥川芎雄黃石膏二錢停半兩牙硝共用不論頭疼腦熱那管滿口牙疼將藥一字吹鼻中管教時下立應一方專治男婦風虛氣虛頭痛胎前産後一切傷風等症並治茵除五兩麻黃石膏煅存性各二兩共為細末每服一錢臘茶調服服藥後仰臥片時太陽痛方生薑三片桑皮紙包水濕入灰水煨熱貼太陽兩邊貼印堂中一片以帶纏之立愈又方孫偉方用大蘿蔔皮貼太陽穴痛即止頭面浮腫方土狗一個焙乾輕粉二分半上共為末少許搐入鼻中令鼻出黃水其腫自消人馬平安散治偏正頭疼咽喉腫痛乳蛾纏喉喉閉腹內寒疼絞腸痧乾霍亂及眼目暴發點之即愈以上諸症用藥少許葦筒吹鼻中男左女右又治馬骨眼黑汗風等吹鼻效川烏草烏尖各用七個重一錢生用乾薑蔥子微炒川芎硼砂各一錢麝香三分皂角火硝各一錢五分狗頭燒黑用靈蓋雄黃各一錢硇砂煅存性三分上共研細末入磁罐內聽用或用稀糊為丸黃豆大棉裹塞鼻中頭眩香倒方白果二個支殼生搗爛空心滾水沖服至重者五服即安老年更效治頭疼方薄荷為末置之紙條內作捻涼水蘸濕塞鼻則愈眼目門治豆風風眼眼邊紅爛吳之英方用混屎蟲長尾巴蟲也可取糞煅兩節用白漿點愈洗肝明目散治一切風熱赤腫疼痛等歸尾川芎赤芍草決明連翹生地各一錢黃連黃芩梔子蔓荊子各八分防風荊芥薄荷甘菊花甘草各五分石膏二錢羌活白蒺藜各六分桔梗七分水三大鐘煎一鍾溫服渣再煎滋腎明目湯專治勞神腎虛血少眼痛用當歸川芎白芍生地白芷菊花各一錢熟地二錢蔓荊子一錢五分桔梗山梔各八分炒黑人參任意用黃連七分甘草三分上加細茶一撮燈心一團水三大鐘煎一鍾食後服熱甚加龍膽草柴胡腎虛加黃柏知母風熱壅盛加防風荊芥風熱紅腫加連翹黃芩神聖光明餅此方通大腸之火永除燥結之患專治諸般眼疾疼痛日久漸細云膜遮睛遠不視物並一切難治眼疾立效羚羊角鎊白犀角鎊密蒙花生地熟地獨活藁本草決明梔子炒川芎細辛蔓荊子蒼朮各五錢木賊甘草白蒺藜槐花黃連荊芥青葙子羌活芒硝白附子煨赤石脂夜明砂淘淨末各一兩薄荷葉大麻子大黃各二兩上為細末煉蜜為丸如彈子大重二錢每服一丸用冷茶研化下此藥重者十丸即好起異復光丸此丸治目病久昏內外翳膜脹閉夜光紅散晝怯陽明黑珠作痛瞳人有蠅翅恍惚不明上生白點下生如粟赤縷紅絲等症黃牛糞不令落地淨水和黃土將牛糞包裹做球放炭火內埋一宿日取出去泥土晾乾研細末八兩再加明淨硼砂末二兩同糞研勻江米麵打糊為丸如桐子大每服三錢菊花湯食遠服切忌房事椒蒜火酒發氣之物以上二方方可庵集又加味三仙方治病同前白蒺藜黃酒拌蒸七次淨一斤白菊花四兩淫羊藿去邊刺羊油拌炒一斤石決明焙存性八兩五味子酒拌曬乾四兩共為細末將薄荷四兩煎濃湯合丸桐子大每服三錢食遠服鹽湯送下忌物同前生明散專點瞎眼後及年老眼目昏花白丁香要笠著的揀淨水飛過細末一兩好南硼砂末三錢共研極細用大活蛤蜊一個將藥末入蛤蜊內又將蛤蜊放淨碗內上蓋竹紙勿沾灰塵日頭地連碗曬令水出用骨簪點眼光明點瞎眼方祕得真古銅一兩用火燒紅淬在醋內七次初伏頭一日用南荸薺三個同古銅研細入陳醋一兩五錢放太陽地曬之每日攪曬至二伏頭一日又入荸薺三個細研入醋同前每日研攪至三伏頭一日俱同前一樣加研曬共一月三次磁器收之骨簪蘸涼水遇症點此藥點後其癢非常須令病者忍之勿擦壞眼目撥雲散王永光方此藥能點老年目昏攀睛胬肉拳毛倒睫迎風流淚等症先揀沒石性的羊腦蘆甘石八兩用砂茶吊一個將蘆甘石上火一煅用水飛出細粉粗渣不用曬乾聽用川黃連羌活連翹黃芩各五錢水三碗煎一碗又水二碗煎半碗二次放一處又將飛過蘆甘石燒紅倒在童便內如此三淬第四次燒紅方淬於煎藥內內再勿見火如濕待其自干聽用硼砂三兩生用海螵蛸二兩煮去鹽性石決明煅一兩乳香去油沒藥去油瓜兒血竭各五錢熊膽三錢麝香三分冰片一錢上共乳無聲方好磁罐內祕收點時用骨簪蘸涼水點大眼角效一方孫偉方專治老人眼花火眼等症蘆甘石火煅紅淬童便內飛七次再燒紅淬入黃連湯內黃連黃柏黃芩梔子菊花防風連翹木賊各等分上八味有五兩蘆甘石每用一錢煎湯將甘石淬入湯內令其自干聽用春用蘆甘石一兩煅硼砂二分冰片二分煅真珠三分麝香半分夏用蘆甘石一兩煅硼砂四分冰片三分半煅真珠二分麝香四釐秋用蘆甘石一兩煅硼砂二分冰片二分煅真珠三分麝香半分冬用蘆甘石一兩煅硼砂二分半冰片二分煅真珠半分麝香一分上共研細末磁器內收祕封固用骨頭簪蘸水點大眼角夜光丸專治眼目昏暗羞明怕日不敢見燈火者此方乃仙家所服之藥因治眼有效故傳之於世久服此藥能黑夜視物發白轉黑通神強志延年益壽甘菊花淨末一斤川椒去目併合口者炒出汗取紅末一斤上用大生地十五斤洗淨黃酒泡一日夜其酒不可太多量酌搗爛絞汁八斤入煎藥二味放大磁盆內日曬夜露每日攪勻待乾入煉蜜二斤杵丸如桐子大一日三服每服三十丸白湯下治紅眼方王永光集用香油入細磁器中煎滾入黃香一塊化開起煙煙盡入水中收入罐內黃臘塞口每點大眼角早晚二次其眼癢疼異常乃是蟲出也治信眼方此藥害眼後行房事太早服當歸赤芍甘草生地黃川芎梔子柴胡木賊草細辛蒙花黃芩各一錢蟬蛻支頭尾五分火眼加黃連五分水二鍾燈心二十寸煎八分溫服點眼方王永光集羊膽蜂蜜各等分青魚膽少許上三味同盛磁罐內入鍋中水煮數滾後入麝片妙治石灰入目方三日內可治三日外不可治山梔子煎濃汁澄清頻頻洗滌自愈一方治小兒出痘後痘落眼中以此點之牛身上蝨子一個取血點之一次即愈一方銀硃用三年老雄雞冠內血調以銀簪點入眼內三次即愈治痘風眼方王永光集專治四邊紅爛其癢非常豬肚隨時支了糞肚子上有稀涎連皮用刀刮下抹在眼患處上用絹布蓋在上面其眼內蟲盡出二三次見效天茄青礬散孫偉方專治老眼錯花初發