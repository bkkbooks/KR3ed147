銼細以水一斗煮取五升熱洗日三切宜避風冷治婦人陰腫或瘡爛者麻黃黃連蛇床各二兩艾葉一兩半烏梅十個上銼細以水一斗煮取五升去渣熱洗避風冷大黃散治陰癢大黃微炒黃芩黃耆炙一兩赤芍藥玄參丹參山茱萸蛇床子各五錢上為細末食前溫酒調二錢服又方杏仁燒灰乘熱綿裹納陰中日二易之又方蒜煮湯洗之一方用枸杞根煎湯洗之又方取雞肝乘熱納陰中如有蟲黃盡出下治陰癢脫方礬石為末空心酒服方寸匕日三治陰挺下脫方當歸炒黃芩各二兩牡蠣二兩半蝟皮炙一兩赤芍藥一兩半上為細末每服二錢煎暖酒調下米飲亦可治陰中生瘡方杏仁炒存性雄黃硯石各五錢麝香一錢二分上為末敷陰中內補丸治婦女五勞七傷子息斷緒服一月當妊娠百病皆愈萆薢四兩牛膝五加皮白朮各二兩川烏炒枳實麩炒丹參各一兩上為細末煉蜜為丸如桐子大溫酒下二十丸日午晡後進一服有妊娠住服辨證詩括紫色紅傷寒青驚白色疳黑時因中惡黃色困脾端觀兒顏色及男左女右手二指節紋如經過三節上者難治自下而上看全嬰紫圓治小兒變蒸發熱不解並夾傷寒溫壯後熱不歇腹中有痰癖哺乳不進乳則吐吮食癇先寒後熱此方無所不治雖下不虛人代赭石赤石脂各一兩大杏仁五十粒去皮尖巴豆二十粒去殼用厚紙捶去油或加青礞石二錢重另研為末入和上石二味為末別研巴杏為膏相和更搗一二千杵當自相得若硬入煉熟蜜少許同杵收密器中若生才三十日兒服只如麻子大一粒與少乳汁令下食頃又與坐乳勿令多至日中當小下則熱除若未全除明日更與一粒如百日兒圓如小豆一粒以此準定加減蓋小兒初生骨骼未成筋骨未就臟腹末充精神未全血氣虛浮肌膚軟脆資乳以養積漸增大故有變蒸之候三十二日為一變變者變其形容再變為一蒸蒸者蒸長肌肉十變而五小蒸又四大蒸積五百七十六日大小蒸俱畢乃得成人故當變蒸之時輕者體熱而微驚耳冷尻冷上唇頭有白泡起如魚目珠子微汗時出其重者體壯熱而脈亂或汗或不汗不欲乳食食輒吐吮目白微赤黑睛微白變蒸畢則目明矣此氣血周流肌膚充溢所致謹無他治但少與紫圓微下其熱即退若二次下後身有熱而耳熱尻熱乃為他病宜別治焉保嬰桃紅散亦可用水煮麵糊為丸如龍眼大臨用各依湯使磨化服如用吞服則丸如緑豆大每服十五丸川烏白附子各五錢生用大南星陳半夏各二錢生用上銼碎以汲井花水拌溫瓦器中浸之春五夏三秋七冬十日曬夜露一日一換新水日足曬乾為末以好大粒硃砂五錢重另研為細末和如桃紅色為度治急驚風薄荷燈心金銀環同煎湯下重則灸百會慢驚用全蠍鉤藤同煎湯嘔瀉薑蔥煎湯下或老腹痛淡薑湯下咳嗽米飲加酸醋呷下桑白皮煎湯下胎驚夜啼及覺腹中有蟲用苦楝根皮煎湯露一宿下傷風咳嗽薑蔥煎湯下瘧亦薑蔥湯下後用薑湯調末子服尤佳保命丹治小兒急慢驚風痰涎壅盛牙關緊急角弓反張睡中驚跳哭泣叫喊偏搐斜目面青臉赤兩眼直視手足搐搦天弔客忤搖頭上竄一切風痰皆可治之大個無油南星二兩煨硼砂淨六錢白殭蠶二兩薑汁浸炒茯神去皮尖六錢蟬蛻去頭足翅淨一兩白礬一兩火枯天龍四條酒煮即蜈蚣也麝香一錢全蠍去尾毒淨用三兩糯米炒黃為度去米遠志去骨用淨肉一兩甘草一節同煮過去草大粒硃砂五錢另研為衣豬牙皂角二兩打碎煎濃汁上先將南星煨以皂角汁淬十數次余皂汁留煮米糊以前藥俱為末為丸如龍眼大以硃砂為衣陰乾每用一丸以薄荷燈心金銀環子同煎湯浸磨化臨時以火上燉溫與服保童丹治小兒急慢驚風痰涎咳嗽喘滿不進飲食蟲疳積熱膨脹等症陳枳殼五對大者去根用巴豆七粒去殼入內以線十字縛定好醋反復煮軟去巴豆切片焙乾余醋留煮糊三稜莪朮煨各五錢金箔十個硃砂二錢另研疔瘡治法夫疔瘡之初生也人多不覺生於頭面手足肚脅腰腿間亦無定處一二日必作寒熱如瘧頭疼體痛不可忍其痛稍異於尋常之證須去遍身尋認其瘡如有小瘡與常患之瘡稍異即是疔也此瘡得患各有所因而其形狀亦各不同豬疔形圓而小瘡口內有油羊疔形長色白牛疔形圓而小瘡口內無油狗疔形長或帶尖色赤驢馬疔其狀三角頂上有黑點根赤或要知此瘡非時豬牛狗羊驢馬之毒所致宿水不潔飲之亦生水疔豆腐中有人汗食之亦生豆腐疔又有氣疔鬼疔形狀雖不一然其治之之法則一也瘡色緩第一日瘡疔疱色小白第二日色大白第三日色微紫第四日色真紫瘡色急第五日色微青小緊第六日色深青大緊第七日色黑其狀有加魚臍又如灸瘡之狀乃最緊急之候也瘡證吉有應如生一疔之外別處肉上再生一小瘡即是有應可用針挑破護場瘡四圍右赤腫生多瘡多者謂之滿天星飲食如常頭痛身熱手足溫瘡證凶無應別處肉上無瘡不護場疔四圍無赤腫內疔盛渴欲飲水飲食不進頭眩眼花護床不動臥不起也眼白晴癡不轉唇舌青腹痛甚者用看療五心腫手足冷氣粗無脈桃紅散治諸疔瘡雖有凶證迭見六脈俱絶死者此藥悉能主治斑蝥去足翅各三個蜈蚣頭一個國丹五錢蟾酥信石各多許蟬蛻去足翅風化石灰一兩砂鍋盛瓦片蓋炭火煅二時久取出上各制同研為末令極細指爪甲刮蔥白皮內涎調藥先以蘇葉針針破瘡口可深半寸凡疔瘡必有紅絲路可隨紅絲斜下針如瘡在胸以上可斜下如在胸下可針斜向上蓋瘡毒喜趨心故下針亦隨毒氣行也出針後瘡口有惡血須令出盡別將蟾酥一粒如麥粒大人在瘡口中用針送令深入卻以前蔥涎所調藥敷瘡口莫敷在好肉上用冷水浸濕紙二三十重貼在藥上封固瘡上如清早封固至睡覺瘡口熱即去紙水洗去令淨用玉紅散摻瘡口瘡口必有數日臖作疼痛只用玉紅散摻瘡仍日用蔥湯洗然疔瘡之證雖危惡自能用針破瘡口入蟾酥在內以桃紅散封固瘡後即可保其回生也至如瘡口臖作疼痛不可忍可不必憂此非疔毒為害乃是蟾酥在臖作腐爛疔毒故爾痛也可採芙蓉葉桑葉亦可擂敷瘡四圍散其血勿令血潮日夜各換一藥須洗瘡後上藥其瘡安不日好也若疔瘡初發時必發熱身疼此乃毒氣在表當汗而解白沸湯主之老人虛人孕婦不宜下汗止用桃紅散拔毒白沸湯白礬五錢青黛三錢冢間貼背干石灰三錢上件同為細末研至無聲為度打和令勻每服三錢井花水半碗調楊柳攪千百下令勻頓服之厚衣蓋覆良久用蔥豉湯入醋少許極熱服少助藥力得汗而解若始不覺是疔瘡不曾以前法出汗過數日方覺則寒熱體痛皆罷毒氣入里矣須用利藥使內中毒氣下泄雄黃丸主之雄黃丸雄黃鬱金各五錢巴豆半兩去心殼略去油一方加信石一字許不可多用清油煮半日取出曬乾入藥一方加斑蝥七個去翅嘴糯米炒變色去米用以治瘰癧一方加玄胡粉三錢以治咽喉腫痛喉閉等症上各研為細末麵糊為丸如緑豆大每服一丸冷茶清吞下取利為度如未利再服玉紅散寒水石一兩火煅輕粉國丹各少許上件研為細末摻爛口日夜二洗二換蓋蟾酥膏桃紅散皆為毒藥故令瘡疼痛用玉紅散解二藥之毒用二藥散其血則當自然安矣若一時未能辨前項蟾酥桃紅散等藥可用李世安一宗治法主之功效尤速李世安治療法當歸散當歸尾二錢川芎乾葛荊芥穗烏藥白芷川獨活赤芍藥升麻各一兩羌活甘草防風去蘆枳殼各半兩紅花蘇木各二錢半瘡疼痛者加乳香沒藥白芷各五錢瘡熱不退加墨竹青山梔仁各少許大便閉加枳殼一兩躁煩加燈心十莖竹茹一團渴者加天花粉一兩腫者加甘草節降真節各半兩眼暈加川芎白芷荊芥防風渴而小便閉者加滑石一兩上件㕮咀每服五錢燈草十數莖烏豆十粒水一鍾半煎至八分病在上食後服病在下食前服連進取效若患疔瘡始初不覺不曾用前法出汗過數日外證皆罷或在腹脅之間或在胸腋之下腫起此乃毒氣入里所致宜用霹靂火治之若服當歸散外證不解者亦急用霹靂火發散霹靂火法鵝卵石炭火煅通赤用澱桶一隻先置竹椅一隻於桶內又用一勺置竹椅下令病人裸體坐於椅上用荊芥為末調下酸米醋一器卻置煅石於勺內即用荊芥醋淋沃石上火力不可大煅灼人恐病人難禁若火力已微汗尚未透可再加火力再沃之沃時桶口用衾覆蓋別用一衾蓋病人頭上只留口鼻在外令遍身汗出須要頭面皆有汗病即除矣此法絶妙老人虛人孕婦不宜汗下可針破瘡口用海馬拔毒散點瘡酒煎蒼耳服至於毒入里用霹靂火時病人不須入桶只用一小水桶依前法以勺盛煅石在桶中用醋淋沃令病人側身以腫處覆在桶上四周用衾被遮護勿令氣泄良久腫處出汗如汗未透可再加火力再沃之須令腫處汗透卻不必遍身汗也若瘡在兩脅間毒氣欲奔心乃危急之證也可急於患處尖上用艾炷灸三五壯仍於灸穴前後針出少血灸瘡四圍有疱起吉無疱凶若瘡生於虛軟不便處不可用針灸者可用松針截法針斷紅絲路如瘡生於兩胯間毒氣欲奔腎者用松針於兩胯紅絲路盡處針斷出血如瘡生頭面上者可於項間絲路盡處針斷出血或各處紅絲路亦有不現者亦可以意消詳用松針針之凡用松針者蓋因紅絲路不現無可下手處故用此法於頷下兩腋間兩胯間虛軟處下手針斷毒氣毋令攻心盛而已松針法取向北松枝上葉極硬者頓齊作一束扎令極細緩緩以意消詳毒氣所經行虛軟處針之須令出血針時先用酒潤下針處針必小痛令病人稍忍仍用雄黃麝香為末溫酒調一二服與之服之方下針若表證皆罷毒氣人里者用前雄黃主之若手足厥冷六脈俱絶者此乃毒氣已深氣血為毒氣所並不能流通是以體冷而不現必須用木香流氣飲連進數服氣血流通則脈自回矣然後依法治之萬無一失海馬拔毒散治疔瘡大效兼治諸惡瘡發背海馬一雙炙穿山甲黃土炒水銀硃砂各二錢雄黃三錢輕粉一錢腦子麝香各少許上件除水銀各研為末打合入水銀再研至無星針破瘡口點藥人內一日一點神效夫內疔之證與外疔之證並同亦發寒熱頭疼身痛但瘡形不現過數日胸背腹脅頭面手足間或有一處腫起即內疔所發之處急用霹靂火如前不護場汗法於腫處出汗若體寒熱雖未有腫起但腹痛甚者便須作內疔證用後法治之不可緩也用蟾酥一粒病勢重者用二粒置病人舌上噙化化後良久用井花水灌漱卻用雄黃丸七丸冷茶清吞下得臟腑利數行其病應手而愈凡治內疔蟾酥可於取時用桑葉小錢大入蟾酥揉和得所丸如念珠大陰乾急救仙方卷之六補遺終
