body:
  text: 卷之六太平部附妊娠門諸疾品郭德祥道藏查吳雙壁術苓湯治婦人胎孕不安白朮茯苓各等分上為粗末每服三錢水二盞當歸一根同煎至一盞稍溫服立效散治胎動不安如重物所墜冷如冰川芎當歸各等分上為粗末每服五錢水煎服食前下或下血心腹痛酒水相半煎服保安散治妊娠因有所傷胎動疼不可忍及血崩不止連皮縮砂不拘多少炒黑去皮上為細末溫酒調下覺腹中熱則胎已安矣治妊娠胎動不安或腰痛胞轉搶心下血不止石菖蒲根搗汁三升飲之又方艾葉如雞子大以酒四升煮取二升分二服良又方檳榔一兩為末蔥白湯調下一錢匕佳二黃散治有孕胎漏下血生地黃熟地黃各等分上為細末每服三錢煎白朮枳殼調下立聖散治妊娠下血不止雞肝二具用好酒一升煮熟共酒食之大效枳芩散治胎漏下血或因事下血枳殼去穰半兩麩炒黃芩半兩白朮二兩上為粗末每服五七錢水煎去渣食前服治妊娠誤有失墜或推築著疼痛難忍當歸一兩新竹茹二合上以好酒二升煮十數沸分三服又方以川芎為末每服二錢溫酒調下治妊娠因頓跌胎動不安腰痛腹滿或有所下或胎上搶心熟地黃二兩白芍藥艾葉當歸甘草阿膠炒珠黃耆川芎各一兩上㕮咀每服半兩姜三片棗一枚水煎服火龍散治妊娠心氣痛艾葉半兩鹽炒一半茴香半兩炒川楝子半兩炒上為細末水煎食前服通氣散治妊娠腹痛至不可忍此藥神妙破故紙不拘多少瓦上燒香熟為末嚼故桃肉一個空心酒調下三錢芎歸湯治妊娠胎動子死或不死川芎當歸各等分上㕮咀每服三五錢加紫蘇數葉酒水合煎服死者即下未死者即安黃連湯治妊娠兒在腹中啼黃連二錢生甘草一錢上濃煎汁令母呷之又方以多年空屋下鼠穴中土一塊令母噙之即止豬苓散治妊娠從腳上腫至腹小便微利微渴引飲豬苓五兩上為末以熟水服方寸匕日三服葶藶散治妊娠遍身洪腫葶藶二兩白朮五兩白茯苓桑白皮郁李仁各二兩上為粗末水六升煮取二升分三服小便利即差又方澤瀉三兩葶藶二兩茯苓枳殼麩炒白朮各六兩上為切細以水六升煮取二升分二服防己湯治妊娠脾虛遍身浮腫心腹脹滿喘促小便不利防已七錢半桑白皮赤茯苓紫蘇莖葉各一兩木香二錢半大便不通加枳殼檳榔上為粗末每服四錢姜四片水同煎食前服當歸芍藥散治妊娠腹中絞痛心下急痛白芍藥四兩當歸茯苓各一兩澤瀉二兩川芎二兩甘草炙一兩上為細末每服三錢食前溫酒調服以蜜丸亦可人參散治妊娠霍亂吐瀉心煩腹痛人參一兩厚朴一兩薑製陳皮一兩當歸炒甘草半兩炙乾生薑一兩嘔逆不止加益智仁煨草豆蔻上㕮咀每服四錢棗三個水煎服茯苓半夏湯治妊娠惡阻心中憒悶頭目眩暈四肢怠惰百節煩疼胸膈痰逆嘔吐噁心嫌聞食氣好啖酸鹼多臥少起全不進食先服茯苓半夏湯次服茯苓丸半夏一兩二錢湯洗七次炒赤茯苓熟地黃各七錢半陳皮人參芍藥旋覆花川芎桔梗各半兩甘草半兩炒上為粗末每服五錢姜三片同煎食前熱服茯苓丸赤茯苓人參桂枝炒半夏湯洗炒陳皮乾薑炮各五錢白朮葛根各一兩甘草一兩炙枳實二兩麩炒上為細末煉蜜丸桐子大米飲下三五十丸食前竹瀝湯治妊娠恆若煩悶心膽怯此名子煩茯苓三兩竹瀝一升上以水四升煎取二升分三服不差再服又方茯苓四兩防風麥門冬去心黃芩各三兩人參一兩五錢上㕮咀每服四錢淡竹葉數片同煎服不得眠加酸棗仁紫蘇飲治妊娠胎上逼脹滿疼痛謂之子懸兼治臨産驚悸氣結連日不下紫蘇一兩當歸甘草各二錢半人參川芎大腹皮陳皮白芍藥各半兩上㕮咀每服半兩水一盞半姜四片蔥白七寸去渣空心溫服知母散治妊娠煩躁悶亂口乾及胎氣臟熱知母甘草麥門冬去心各半兩黃耆黃芩赤茯苓各七錢上㕮咀每服四錢竹茹一塊水煎服四肢壯熱加葛根柴胡治妊娠忽下黃汁如膠或如小豆汁苧根切二升上水四升煎取二升分二服每服入酒半升再煎服厚朴散治妊娠下利黃水不止厚朴三兩薑汁炙黃連二兩肉豆蔻五個連皮上㕮咀用水二升煮取一升服治妊娠無故卒下血阿膠二兩重以蚌粉同炒珠搗為末生地黃半斤洗取汁上以清酒三升將二味攪勻溫過分三服治妊娠無故尿血龍骨一兩為末蒲黃五錢研勻上以酒調方寸匕日三服治妊娠臟氣本虛脾胃久弱臍腹疼痛滑泄無度産後同厚朴二兩薑汁浸炒黃草豆蔻一個煨肉豆蔻一個面里裹上㕮咀每服三錢姜三片煎服大寧散治妊娠下痢赤白及泄瀉疼痛垂死者黑豆三十粒甘草三寸半半生半熟罌粟殼二十生炒上為粗末都作一服生薑三片同煎食前服神效治妊娠挾熱下痢黃連一兩黃柏一兩梔子仁十枚上㕮咀每服三錢水二盞浸三時久煮十沸去渣頓服嘔加生薑橘皮治妊娠下痢腹痛小便澀糯米一合當歸一兩炒黃耆一兩上細末和勻水二盞煮取一盞二分去渣分四服黃連散治妊娠下痢赤白膿痢血久不止黃連八錢厚朴薑製阿膠蚌粉炒當歸各六錢艾葉黃柏各四錢乾薑炮四錢上為細末空心米飲調下方寸匕日三服治妊娠小便不禁桑螵蛸十二個炙上為細末每服二錢空心米飲調下白薇散治妊娠遺尿不禁白薇白芍藥炒各等分上為末每服二錢食前溫酒調下茯苓散治妊娠小便不通赤茯苓黃葵子各等分上㕮咀每服五錢冰二盞煎一盞溫服如不通恐是轉胞加發灰少許調服極妙治妊娠患淋小便熱水道熱不通車前子一兩葵根五錢切上二味以水升半煎至一半空心溫服大腹皮散治妊娠大小便赤澀大腹皮枳殼去白麩炒甘草黃芩各一錢赤茯苓去皮二錢上㕮咀加蔥白水一盞煎七分空心溫服斬邪丹治婦人鬼胎如抱一甕吳茱萸川烏秦艽柴胡白殭蠶洗巴戟生用巴豆去殼不去油芫花酷煮各一兩上為末煉蜜丸如梧桐子大每服七丸蜜酒吞下取出惡物即愈桔梗散治妊娠肺塞及外傷風寒咳嗽喘急天門冬去心一兩貝母人參甘草桑白皮桔梗紫蘇各半兩赤茯苓一兩麻黃去節七錢上㕮咀每服四錢姜三片水煎服服藥忌食鯉魚紫菀湯治妊娠咳嗽不止胎不安紫菀天門冬各一兩桔梗半兩甘草桑白皮杏仁各二錢半防風半兩上㕮咀每服三錢竹茹一塊水煎去渣入蜜半匙再煎二沸溫服服藥忌食鯉魚人參橘皮湯治妊娠嘔吐痰水多是惡阻人參橘皮白朮甘草三錢麥門冬去心各一兩厚朴薑製白茯苓各半兩上為粗末每服四錢入淡竹葉數片用生薑三片水煎空心食前服加味四物湯治妊娠傷寒證熟地黃當歸川芎芍藥各等分上㕮咀每服四五錢水煎服若妊娠傷寒頭痛身熱無汗脈浮緊加麻黃細辛若妊娠傷寒中風表裡自汗頭痛項強身熱惡寒脈浮而弱加黃耆地骨皮若妊娠傷寒中風濕之氣肢節煩疼脈浮而熱頭痛加防風蒼朮制若妊娠傷寒胸脅滿痛而脈弦加柴胡黃芩若妊娠傷寒大便硬小便赤氣滿而脈沉數加生大黃桃仁去皮尖麩炒若妊娠傷寒小便不利加茯苓澤瀉若妊娠傷寒小便赤如血狀者加琥珀茯苓若妊娠傷寒四肢拘急身涼微汗腹中痛脈沉而遲加附子泡去臍桂少用若妊娠傷寒蓄血證加生地黃酒浸大黃若妊娠傷寒身熱大渴蒸又而熱脈長而大者加石膏知母若妊娠傷寒下後過解而不愈溫毒發斑如錦紋加升麻連翹若妊娠傷寒下後咳嗽不止者加人參五味子若妊娠傷寒下後虛痞腹滿加厚朴薑製枳實麩炒若妊娠傷寒下後不得眠者加梔子黃芩若妊娠傷寒汗後血漏不止胎氣損者加阿膠炙甘草黃耆若妊娠脈浮頭腫自利腹中疼痛去地黃加桂枝炒若妊娠傷寒自利腹中痛飲食不下脈沉者去地黃川芎加白朮炙甘草茯苓加黃耆護胎法治妊娠傷寒白藥子不拘多少為末用雞子清調攤於花紙上可碗來大貼在臍下胎存處干則以溫水調之又方以灶心土水調塗臍下干又塗之又調服彈子大佳又方壯熱甚則以井底泥敷心下令胎不傷白朮散治妊娠傷寒煩熱頭痛胎氣不安或時吐逆不下食白朮橘紅人參前胡川芎麥門冬去心赤茯苓各一兩半夏湯洗炒甘草各半兩上每服四錢姜四片竹茹二錢半水煎服升麻散治妊娠傷寒頭痛身體壯熱升麻蒼朮炒麥門冬去心麻黃去節石膏各一兩黃芩知母各五錢上每服四錢姜四片淡竹葉十四片水煎服柴胡散治妊娠傷寒頭痛項強身熱口乾胸脅疼柴胡前胡川芎當歸人參芍藥甘草生地黃各等分上為細末每服四錢姜三片棗三枚蔥白三根水煎出汗秦蘇散治妊娠傷寒五六日不得汗口乾多吃水狂語嘔逆秦艽柴胡各一兩石膏二兩前胡赤茯苓甘草葛根犀角屑升麻黃芩各半兩上每服四錢姜四片竹茹三錢水煎服防風葛根湯治妊娠中風腰背強直時復反張防風葛根生地黃川芎各二兩杏仁制一兩半麻黃去節一兩半桂心炒獨活甘草防已各一兩上㕮咀每服四錢水煎服治妊娠中風角弓反張口噤語澀謂之風痙亦名子癇麻黃去節防風獨活各一兩桂心炒升麻甘草川芎羚羊角犀角酸棗仁秦艽各半兩當歸杏仁制各七錢上㕮咀每服四錢姜四片竹瀝一合水煎服治妊娠臨月因發風疰忽悶憒不識人吐逆眩倒名子癇葛根貝母去心牡丹皮防已防風當歸川芎甘草澤瀉炒各二兩桂心白茯苓獨活石膏人參各三兩上㕮咀以水九升煮取三升分二服貝母令人易産若未臨月以升麻代之柴胡散治妊娠瘧痢方柴胡生大黃各二兩黃芩一錢半甘草一錢上㕮咀作一服水煎臨發日五更溫服必取利為愈如胎上逼心可服枳殼散忌油麵辛熱等物又方大黃二兩柴胡一兩半黃芩芍藥各一兩上為細末清水糊為丸如桐子大每服百丸臨發日五更冷湯吞下隔兩時再服五十丸以利為度治妊娠瘧疾發熱口乾渴飲無度者生地黃一兩半黃芩麥門冬去心人參知母各一兩石膏二兩甘草半兩乾葛一兩上㕮咀每服五錢入烏梅半個煎服治妊娠瘧疾得效方常山石膏各一兩甘草炙黃芩各半兩烏梅七個上細切以酒水各一碗浸一宿平旦煎至一碗去渣分二服臨發日驗胎方治婦人經脈不行已經三月者川芎不見火上為細末空心濃煎艾湯下調方寸匕覺腹內微動則有胎也婦女雜病品四物湯熟地黃川芎當歸芍藥各等分上為粗末水煎服若女蒸勞熱加地骨皮牡丹皮知母柴胡黃芩若妊娠胎動不安下血不止者加陳艾葉阿膠黃耆蔥若血藏虛冷崩中去血過多亦加阿膠若血崩者加生地黃蒲黃黃芩一加阿膠艾黃芩若血虛而腹痛微汗而惡風加莪朮官桂若風虛眩暈加秦艽羌活若氣虛弱起則無力眶然而倒加厚朴陳皮若發熱而煩不得睡臥加黃連梔子若虛寒脈微自汗氣難布息清便自調加乾薑附子炮若中濕身重無力身涼微汗加白朮茯苓若筋骨肢節痛及頭痛憎寒加羌活防風藁本細辛若臍下虛冷腹痛及腰脊間悶痛加玄胡索苦楝若經水過多別無餘證加黃芩白朮若經水澀少加葵花紅花若虛勞氣弱咳嗽喘滿加薑製厚朴麩炒枳實若經水暴下加黃芩若血積塊痛加莪朮三稜桂乾漆炒若赤白帶下加香附子桂炒若血痢加膠艾黃連若産後血痢腹痛疼加槐花黃連玉米殼若血熱相搏舌乾口渴加瓜蔞麥門冬若大渴引飲加石膏知母若臟腹祕澀加大黃桃仁若嘔吐者加白朮人參藿香生薑若虛寒滑泄者加官桂附子炮若虛煩不得睡加竹葉人參酸棗仁若目赤暴發作雲翳疼痛不可忍加防風羌活防己酒浸龍膽草酒浸芎歸湯川芎當歸各等分上㕮咀水煎熱服若産後眩暈加芍藥甘菊花若産後腹痛加官桂酒童便合煎若妊娠子死或不死胎