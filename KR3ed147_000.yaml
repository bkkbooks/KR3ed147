front:
  text: 急救仙方序醫之療疾莫難於婦人婦人之疾莫重於胎産胎産之重者何蓋以一身之疾否系乎母子之存亡效千金方部居獨以婦人廁其首此思邈孫真人之用心不苟矣世之胎産諸方不為不富然其間多犯冗僻貴冗則倉卒之際難備僻則窮鄉下邑難得貴則貧窶之家難求是三者雖非君子用心之不周而人之蒙其惠者往往求什一於千百今此方之編分為三類末附以雜病雖不能如諸方之廣載博賅要之不犯冗僻貴而凡胎産危急之證大略亦盡之矣俾倉卒之際窮鄉下邑貧窶之家皆得易而求之雖一草一木是以收效豈若前三者之難為功哉苟有用者治信其為閨門之重寶云金川徐守真序
