body:
  text: 卷之二痞滿門滿心痞神方面半斤麝香三分鴿糞四兩皮硝六兩上將面做一圈圍在痞上麝香燒酒調搽痞上將鴿糞皮硝入鍋內炒焦乘熱放圈內上蓋紙七層用尉斗慰之待口內有香氣方服後煎藥桔梗枳殼檳榔木香另包將藥煎成放入石菖蒲赤茯苓小茴香川楝子三梭莪朮青皮陳皮乾薑肉桂當歸川芎厚朴黃柏神麯麥芽柴胡各八分蔥白三根水三鍾煎一鍾俟尉住手時乘熱飲痞即下一方專治痞疾王永光集麝香一錢阿魏三錢水紅花子歸尾大黃甘遂急性子甘草各五錢上為細末用豬尿胞一個量病大小用尿胞大小裝入乾燒酒半胞將前藥末放入胞內緊縛住口用白布將胞兜於患處以病化淨為度即去之不可遲也守病丸方王永光集硃砂二錢硇砂豆腐煎雷丸去黑皮血竭硼砂磁石輕粉各一錢雄黃三錢五分白砒二錢五分巴豆去油六錢木鱉子去皮五個共為細末黃臘七錢五分化開為丸黃豆大硃砂為衣溫水送下一丸潰堅湯治五積六聚諸般癥瘕痃癖血塊之症當歸白朮陳皮半夏薑製枳實香附厚朴山楂肉砂仁各等分水三種姜二片煎一鍾磨木香末調服左助有塊加川芎右肋有塊加青皮肉食成塊加姜炒黃連粉面成積加神麯血塊加桃仁紅花官桂去半夏山楂痰塊加海石瓜蔞枳實去山楂腹飽脹加蘿蔔子檳榔去白朮壯健人加蓮米瘦弱人加人參少許大消痞丸治一切心下痞及年久不愈者黃連土炒枯芩炒各六錢枳實五錢麩炒半夏陳皮厚朴姜炒各四錢白朮薑黃各一兩豬芩澤瀉砂仁各三錢乾薑二錢人參四錢神麯炒甘草炙各二錢上為末蒸餅為丸如梧桐子大每服五十丸至百丸空心白湯送下一方專治痞疾陳皮胡椒青皮各五錢蘿蔔三錢烏梅九枚去核巴豆十八粒去油丁香四十八個共為末麵糊為丸如緑豆大每服二十一丸空心薑湯下孕婦忌服硫半丸專進飲食消痞疾治風冷健脾胃潤大腸溫暖之藥製半夏三兩硫黃三兩生薑四兩搗爛取汁二味為末用薑汁泡蒸餅為丸如梧桐子大每服一錢滾水送下或薑湯送下治血龜血痞方劉春光方小鱉一個取淨肉紅莧菜與鱉肉等分上二味同搗爛包患處一日一換以愈為度一方治痞蜈蚣一條用頂好細茶葉煎服以身癢為度一方治酒鱉鱉要吃酒如攻上心來取白馬溺飲之鱉即化為水蠱脹門七轉丹專治水蠱膨脹五膈噎食心腹脹滿五積六聚等症木香檳榔大黃使君子錫灰白豆蔻雷丸各等分水二鍾連須蔥五根煎八分夏春秋天露一宿次日五鼓重湯煮熱溫服冬月煎出溫服蠱症下水甚物所積就用此物作引子一方孫偉方治水蠱氣蠱不忌鹽醬一服立消活魚一尾重七八兩去鱗甲將肚剖開去腸淨入好黑礬五分松蘿茶三錢男子用蒜八瓣女七瓣共入魚腹內放在磁器中蒸熱令病人吃魚連茶蒜皆食更妙此藥從頭吃就從頭上消起如從尾上吃起即從腳上消起立效之仙方也一方治膨脹雄豬肚一個洗潔淨用三個大活蝦蟆裝入肚內東酒三斤對水半斤煮爛再洗淨多用紫皮蒜同肚子食之須忌鹽醬百日一方專治水蠱腫胖丹方奇術不必服藥自然去也輕粉二錢巴豆四錢去油生硫黃一錢上研成餅先以新棉一片鋪臍上次以藥餅當臍按之外用帛縛如人行五六里自瀉下候三五度除去藥餅以溫粥補之久患者隔日方取去藥餅一餅可救念人其效如神愈後忌飲涼水一方治水腫蠱脹黑牽牛頭末檳榔各等分上兩味研細末每服三錢空心黃酒送下取蠱用砂糖水下利三五次效當忌葷腥鹽醬百日永不發一方治氣蠱大蝦蟆一個破開用砂仁填實黃泥封固炭火煅紅取出涼冷研末陳皮煎湯調服放屁即愈一方治水腫無論年深月久雖肚有青筋亦治之大戟當歸陳皮各一兩水兩碗煎七分溫服利下水者更好如病重者再服切忌鹽醬一方治諸蠱脹用獨頭蒜一歲一個去皮入真窩兒白酒六七分對水白酒二三成量酒蓋過蒜為度蒸熟如夏月露一宿又溫熱用冬月乘熱連白酒服完從大便出虛氣即下穢物其腫自消一服除根不忌鹽醬真仙方也一方治蠱症苦丁香即甜瓜蒂為末棗肉為丸如梧桐子大每服三十丸空心棗湯下一方治心腹脹滿氣短草豆寇一兩研細末以木瓜生薑煎湯送下每服五分一方白和集專治蠱脹虛損將危之症人參蛤蚧各等分上為細末黃臘為丸如梧桐子大每服三錢或二錢白滾水送下一方治心下虛脹手足厥冷或飲苦寒之劑過多未食先嘔不思飲食山藥不拘多少半炒半生研為細末米飲調服二錢一日兩次大有功效切忌鐵器生冷一方王永光集專治蠱脹屢驗救活人多矣西瓜一個切去頂如滿穰挖去穰三成入蒜瓣以滿為度將原頂蓋之放在新砂鍋內又著新鍋合上用文火蒸熟瓜蒜湯盡食之三日之內盡消不忌鹽醬雷音丸治腹大如鼓以行下幾次不愈服此能散氣消滿甚效乾薑炒巴豆皮各等分上二味研細末麵糊為丸如緑豆大百草霜為衣每服五十丸滾白水下綿大戟散治水蠱氣蠱綿大戟三錢廣木香一錢共為末作一服蜜五錢水調服行水瀉氣不用補一服即消忌鹽醬百日更妙一方治水蠱乾絲瓜去皮一根剪碎入巴豆十四粒同炒以巴豆黃為度去巴豆用絲瓜炒除倉米如絲瓜之多炒米黃色去絲瓜研米為末和清水為丸如梧桐子大每服百丸滾水送下即愈積聚門三才卻病丹專治五積六聚心疼腹痛小兒諸般脹悶及婦人乾血痞滿等症巴豆七百粒揀白仁去油成霜緑豆揀淨十三兩四錢研細末黑臍白豇豆揀淨二十兩研末飛羅面八兩上四味和勻清水為丸如緑豆大每服大人五分小兒三分如九種心疼艾醋湯下五積六聚鮮薑湯下臍腹疼痛鹽湯下小兒諸般脹悶蘿蔔子湯下婦人産後百病益母草煎湯下乾血癆症一錢紅花湯下小兒疲疾痞塊涼水送下余疾不問內外虛實概白滾水下一方治積聚腹內膨脹神麯麥牙山楂松蘿茶各二錢水二碗姜二片煎一碗溫服追蟲利枳丸使君子肉牽牛各一兩檳榔五錢蕪荑仁雷丸烏梅肉木香各三錢共為細末以白砂糖為丸如芡實大每服一丸滾水送下牛郎散治腹內一切諸蟲屢試屢驗其效如神黑醜白醜頭末各五錢尖檳榔一兩研末三味合均聽用遇有蟲症於上半個月空心先飲砂糖水一盞再用藥三錢砂糖水調連服三次其蟲盡出小兒減半孕婦勿服三仙丹又名沉香百消丸此藥能消食消滯消氣消痞消脹消腫消疼消而不見響而不動藥本尋常其功甚大香附醋炒五靈脂黑醜頭末白醜頭末各一斤沉香四兩研末上諸末和均醋糊為丸如緑豆大每服三五十丸食後薑湯送下一方治胃氣積聚作痛移動不定者木香檳榔各等分磨酒服一方治瘀血作痛桃仁四十個去皮尖炒為末煎酒服伏梁氣者亦可治醋煎三稜丸治一切積聚不拘遠年近日神效京三稜四兩醋煮竹刀切片川芎二兩醋炒大黃八兩醋浸用紙包好灰火煨熟上研細末醋糊為丸如桐子大每服三十丸溫水送下大病服一月小病半月可也硃砂守病丸專治遠年近日腸內積塊硃砂硼砂血竭黃臘各三錢巴豆去油輕粉硇砂各一錢上為末將黃臘化開入藥為丸如緑豆大每服十五丸燒酒送下其積塊消化行下為愈五疸門茵陳散治濕熱發黃茵陳梔子赤苓豬苓蒼朮枳實黃連厚朴澤瀉滑石各等分水三鍾燈草三十寸煎一鍾服身熱加柴胡小水短赤加黃柏胸膈飽悶加蘿蔔子茯苓飲酒人加瓜蔞仁乾葛砂仁去滑石此成酒疸者多一方治黃疸渾身如金色苦丁香二錢母丁香一錢黍米四十九爛赤小豆五分上為細末臨臥時先含涼水一口卻於兩鼻孔㗜上半字便睡至次日打下黃水便服黃連散病輕者五日見功重者半月見效黃連散治黃疸大小便祕澀壅熱在內者服屢效大黃醋拌炒黃連各二錢黃芩炙甘草各一兩上為細末食後用溫水調下二錢日進三服攻除實熱自愈一方治症同前孫望林集苦丁香為細末㗜鼻內一時鼻出黃水水盡即止三日後再㗜一次痊愈三物湯治黃疸入便自利而黃茵陳蒿三錢梔子黃連各二錢水二鍾煎八分溫服棗礬丸治食癆目黃身黃皂礬不拘多少入砂鍋炒紅用米醋點之炒用木炭火煮熟棗肉為丸如梧桐子大每服三五十丸食後薑湯送下如連炒礬砂鍋底研末合內尤妙一方治男女黃腫鯽魚一尾或四兩二兩火硝或九分三分看人虛實用之將魚破開肚內去淨以硝為末干搽在魚腹內合著用碗二個一仰一蓋放飯上蒸熟食之若口渴以水解之一夜消盡忌鹽醬與發物如婦人産時腫俱效一方專治五疸用絲瓜連子燒存性為末如因酒病者酒調下面病者麵湯下一方治漫膽眼與周身黃如金色者絲瓜根或三根七根搗爛水一碗煎八分沖黃酒服即愈如病深者服二三劑方好一方治黃病黑白牽牛三兩用一個糟發大餑餑刀切開去內穰裹上牽牛末合一處紙包好放炭火內燒出煙存性去面用牽牛為末每服一錢五分酒酒調下盡下黃水為效貞元廣利方治黃疸皮膚眼如金色小便赤心煩口乾者秦艽三兩牛乳二碗煎一碗溫服又方加芒硝一錢一方專治五疸益母草搗爛取汁一鍾以好酒沖服四五次即愈一方採酸漿草根搗爛取汁飲之多效治遍身發黃如金色甜瓜蒂六月六日收者好丁香各四十九個用淨砂鍋炒以煙盡為度研為細末小兒半匙大人一匙吹入鼻內數次瘥補益門延齡固本丸王世功集治五勞七傷諸虛百損顏色衰朽形體羸瘦中年陽事不舉精神短少未至五旬鬚髮先白並左癱右瘓步履艱辛腰膝疼痛下元虛冷等症人參肉桂當歸韭菜子火酒煮枸杞茯神山藥菟絲餅山萸肉蛇床子牛膝各二錢熟地何首烏九蒸肉蓯蓉去甲酒洗各四兩大附子一個童便浸煮鴿子蛋十個去皮炒成粉黃狗腎內外一具酥炙車前子一兩黑驢腎連子一具竹刀去筋同肉蓯蓉酒煮一日一夜鹿茸一對酥炙共研細末以驢腎蓯蓉搗膏為丸如梧桐子大每服百丸或黃酒或滾水送下長春補藥方王永光集專治男子諸虛羸瘦中年陽事不舉精神短少未至五旬鬚髮變白行步艱難及婦人下元虛冷久不孕育服藥即孕必生長命之子驗地神應不可盡述人參天冬當歸酒洗山藥薑汁炒巴戟去心木香各一兩川椒微炒二兩肉蓯蓉酒洗二兩白茯苓車前子石菖蒲去毛五味子柏子仁炒覆盆子生地赤石脂另研各一兩澤瀉熟地牛膝酒洗遠志山萸肉酒洗杜仲姜炒地骨皮各二兩枸杞子菟絲子酒炒蒸透搗餅各三兩共為細末煉蜜為丸如梧桐子大每服五十丸空心或黃酒或淡鹽湯送下此藥服過十日加二十丸過半月再加二十丸服至十日之後小便赤色是舊疾出也又覺鼻酸聲雄胸痛咳嗽吐痰吐血是肺病出也大便下膿下血或下魚凍青黃者是五臟六腑之病出也服到一月之後一應七情之滯氣沉痼冷疾皆出也服百日之後萬病皆無方覺容顏光彩鬚髮變黑齒頽重固既老康健耳目明亮精神百倍益壽種子百發百中但子壽二字皆由命內有無之分惟積陰德可保修制長生仙丹治遍身疼痛體頑麻瀉痢米糧不納翻胃噎嘔癱瘓色癆久嗽哮㗇清晨一服實堪誇百病即時消化丁香砂仁官桂白豆蔻陳皮各三錢小麻尖六七月採陰乾一斤共為末每服三錢空心白滾水調服白沙草靈丹宋徽宗封為萬安丹當歸生地熟地麥門冬去心天冬赤何首烏肉蓯蓉白芍大茴香炒黃色白茯苓枸杞子山藥遠志去心菟絲子酒炒蒸為餅粉草白何首烏川芎各二兩蒼朮酒浸洗川椒去核各四兩丁香三錢人參一錢川烏一兩炮上共為細末煉蜜為丸如梧桐子大每服三五十丸食遠鹽湯送下或黃酒更妙日進三服一月身輕體健百日唇紅齒白手足溫暖面容光彩耳明目亮百病消除屢拭屢驗其效如神神仙七星散陳德芳集地膚子嫩松枝巨勝子黃精嫩柏葉蔓荊子桃膠各等分上七味九蒸九曬為末每服二錢白滾水送下空心服補陰丸治男婦諸虛百損黃柏酒炒四兩敗龜版醋炙牛膝酒洗各二兩知母酒炒白芍炒熟地各一兩五錢陳皮當歸虎骨醋炙各五錢共為末煮好肥羊肉二十四兩不用油煮的如泥石臼中搗極爛合藥又搗為丸如梧桐子大用鹽湯送下十丸冬月薑湯送下草還丹丁君粥方蒺藜炒三斤黑豆用小粒炒存性三斤菟絲餅一斤酒蒸白茯苓乳浸八兩當歸酒洗黃芩酒洗各一斤蘿蔔子八兩春冬用蒼朮一斤赤茯苓八兩牛乳浸夏秋用白朮一斤上為末煉蜜為丸重二三錢早晚滾水送下打老兒丸靈佑宮胡方棉花子一斤炒去殼核桃肉四兩打爛上用小米麵打糊為丸重三錢滾白水化下仙傳蟠桃丸棉花子取淨仁乾燒酒拌透下用黃酒水平對蒸一炷香紅棗黃酒煮熟取淨肉各一斤歸身牛膝枸杞俱用酒浸肉蓯蓉酒洗去泥甲山茱萸酒潤去核菟絲子酒蒸成餅白魚膘麩炒成泡白茯苓人乳拌蒸破故紙鹽水炒熟地酒煮如飴以上各四兩洗淨巴戟酒洗去心五兩共為細末煉蜜為丸三錢重早晚酒水任意送下痼冷門附子理中湯治陰寒身戰而重語言聲輕氣短目睛口鼻出冷氣水漿不入之症大附子麵包煨去皮臍人參白朮乾薑炒肉桂陳皮茯苓各等分甘草炙減半水二鍾生薑一片棗二枚煎熱服一方治陰寒諸般瘟病初覺者用一錢白礬八分丹二分胡椒細細研火硝一分共四味釅醋調合手中攤男左女右按陰戶一身冷汗洗衣衫此方用者如神效無義之人不可傳一方乾薑黃丹枯礬胡椒各三錢共研末用好燒酒和做兩個大丸只用一個男左女右手心按住陰戶處出汗即愈蔥炙法修德堂方蔥五斤用麻繩在中間緊緊縛住三指長一節用刀截去兩頭放在臍上上用慰鬥尉之令汗出即愈一方治陰症身重口噤氣短目睛口鼻氣冷腹痛面青者用鴿子糞一茶鍾研末滾黃酒一斤衝入待澄清去渣遂將酒飲之汗出即愈虛勞門加味坎離丸治飲食少進頭目昏花耳作鐘聲腳力痠軟肌膚黃瘦身體疼痛吐痰咳嗽胃脘停積夢遺盜汗泄瀉手足厥冷等症此方下滋腎水上降心火中補脾胃添精補髓強陰壯陽殺九蟲通九竅補五臟益精氣止夢遺身輕體健甚有效驗人參天冬麥冬去心各五兩菟絲子酒煮牛膝酒炒肉蓯蓉酒洗山茱萸去核杜仲炒去絲巴戟去皮酒浸小茴香鹽水炒白茯苓當歸五味子去核黃耆蜜炒川椒去子炒木香各一兩黃柏酒炒四兩共為細末煮酒煉蜜為丸如桐子大每服五十丸鹽湯下一方專治下部虛弱左安門王千總集木瓜川芎蒼朮川烏水泡去皮臍秦艽防風獨活川續斷虎骨酥炙牛膝蟹甲炙川萆薢防已各一兩當歸破故紙炒白朮白芍松節菟絲餅各二兩甘草五錢杜仲姜炒去絲四兩紅花金毛狗脊各五錢二十三味各遵炮製裝壇內入燒酒二十斤煮三炷香隨量而飲不可大過酒完再入酒泡亦可一方治吐血咳嗽虛勞等症小紅棗二斤揀好者用水煮熟去皮核黑糖一斤揀淨芝麻油四兩三味合一處揉成一家不見油星做一餅瓷盒盛每早晚一二兩白滾水調服一方治男婦五勞七傷諸虛百損癱瘓等症肥母雞一隻不要出血用繩縊死去毛淨用竹刀剖開取內腸肝連屎不可入水即用陰陽瓦焙乾煙盡為度可重六七錢研磨分為三服黃酒調下至大重病不過二三隻即愈如兼咳嗽氣喘者用麥冬一斤去心水煮成膏陸續服之更妙治癱瘓將雞倒放砂鍋內雞腹內坐一酒杯重湯蒸熟杯內有自然汁不拘多少對無灰酒服之即愈又方王永光集雞雌雄兩隻繩縊死滾水去毛用竹刀剖開摟去五臟不用將雞骨打碎放在磁盆內蒸別出氣蒸六十時辰為度取汁服之神效一方專治癆病痰嗽王永光方老白鴨一隻去毛水洗淨用竹刀開膛膛內不可見水將肝肫肺不見水入內再入龍眼肉四十九個桃仁十個蓮子肉一兩五錢川貝母五錢又用絲線縫嚴又用新砂鍋一個東酒一斤童便二斤甜酒一斤煮熟先用肚內果子鴨湯隨用鴨肉就粥飯點心隨用至重者四五服痊愈如痰中帶血量加人參坎離丸專治男婦虛癆等症黑豆不拘多少炒熟研末紅棗量用煮熟去皮核上二味共搗泥為丸如桐子大每服二錢或三錢鹽湯送下或酒下一方治男婦咳嗽成癆此藥當茶湯服其效如神黑芝麻微炒藕粉山藥微炒黏黃米麵炒白砂糖各一斤建蓮肉微炒八兩共為細末每日早晚不拘多少滾水沖服一方專治男婦虛癆一切等症白花藕粉白茯苓白扁豆炒蓮肉川貝母山藥白蜜各等分人乳另入共為細末每食用一兩滾水沖服大補虛損一方治氣虛血弱飲食減少蓮子不拘多少去皮酒浸一宿入豬肚中水煎爛搗成餅炙乾為末酒糊丸如桐子大每服五七十丸食前溫酒下或不丸日常煮爛食之又方干浮萍天花粉各等分上研末取人乳為丸如梧桐子大每服二十丸不拘時米飲下日服三次三日見效一方治男婦氣血虛弱兼麻木身疼胳膊足腿墜疼皆治當歸川芎牛膝白茯苓木瓜各一錢熟地姜浸白朮白芍薏苡仁各一錢五分陳皮防已防風羌活各五分半夏曲七分柴胡四分秦艽六分炙甘草三分水三鍾姜二片棗三枚煎一鍾溫服一方治麻骨白頭至心窩或從足心麻至膝而死者用人糞燒灰豆腐漿調服即止一方專治癆症王永光集蜂蜜四兩薑汁四兩人乳一碗白蘿蔔汁梨汁各半斤共熬成膏子每服三匙早晚服用二料盡除根一方治吐血癆症王應魁集烏梅五味子各八分款冬花川貝母陳皮知母桑皮側柏葉甘草籍節山楂黃芩紫菀大熟地生地各一錢牛膝五錢麥冬去心天冬各一錢五分杜仲五分水三鍾煎