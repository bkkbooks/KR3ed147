右邊痛吹左邊鼻孔令病人手上下和之又方大核桃兩個燒焦去殼細嚼燒酒送下腰痛立止一方治筋骨疼穿山甲三錢蜈蚣一條去頭足全蠍芒硝生大黃赤芍藥麻黃殭蠶當歸各一錢酒二碗煎一碗早晚服忌椒酒房事治腿疼方芥菜子一兩搗如泥松香末一兩共合成膏布攤貼痛處出汗則愈治痛風方歷節風四肢疼痛即用醋磨硫黃敷之蔥灸法治虛怯人患腫塊或痛或不痛或風襲於經絡肢體疼痛或四肢筋攣骨疼又治流注跌僕損傷腫痛棒打刺痛及婦人吮乳陰症腹痛手足厥冷並治用蔥頭杵爛炒熱敷患處冷則易之再尉腫痛即止如神洗浴方楊方治風癱四肢不順筋骨拘攣椿槐桃李並茄柯桑拓蓽麻共一鍋不論遠年同近日一洗風疾盡消磨心疼門枳縮二陳湯治痰涎在心膈上攻走腰背嘔噦大痛枳實麩炒砂仁半夏薑製陳皮香附各二錢木香另研草豆蔻乾薑炒各五分厚朴薑汁炒茴香酒炒延胡索各八分甘草三分水三鍾生薑三片煎一鍾入竹瀝木香同服九氣湯治膈氣風氣寒氣憂氣驚氣喜氣怒氣山嵐瘴氣積聚痞氣心膈刺痛不能飲食時止時發攻則欲死香附鬱金甘草各二錢水二鍾姜三片煎八分服如意仙丹專治男婦遠近九種心痛疝氣牽引遍身作痛大渴飲水隨飲隨吐飲食不進晝夜不睡噎膈翻胃久痢不止並治真鴉片四錢沉香硃砂木香各二錢京牛黃二分麝香一分上研細末用頭生人乳合作八十丸重裹金箔為衣每服一丸用梨一個搗爛白布包絞自然汁先將丸藥用淨布包打碎再用梨汁研化服其痛立止如久痢不止西瓜水送下一方凡男婦胃脘疼痛不論老少一切俱治高良薑香附米各等分同用醋泡七次上為末每服三錢薑汁調和食鹽少許服之立效一方治胃氣痛姚清虛傳延胡索炒研末用三五分放手心內以舌舔滾水送下即愈治心痛方烏梅七個去核紅棗八中去核杏仁十個去皮尖共搗成膏為丸如雞頭子大每服一丸熱酒下或鹽湯下一方治心疼胃疼七個胡椒三十棗五十杏仁一處搗滾熱燒酒送入胃九種心疼一時好一方治心疼胡椒蓽撥各五錢上為末醋調捏作餅子重一錢每服一餅含之白水送下即效一方治胃腹急痛者高良薑厚朴五靈脂各五分上為末每服一錢醋調服陰陽丸治九種心疼胃痛王永福方緑豆胡椒各等分上為末水合丸如桐子大每服二三十丸白滾水送下一方治心痛欲死百草霜二錢七分用熱小便調服即止一方治寒氣心疼青筋等症古石灰滾水澄三五次研末二錢用乾燒酒調服立止腳氣門三妙丸治濕熱腳氣或腫疼俱可服蒼朮冬月用四兩夏月用四兩米泔浸一宿曬乾黃柏冬月用三兩夏月用四兩酒浸一宿曬乾川牛膝酒洗二兩上為末煉蜜為丸如梧桐子大每服五十丸空心鹽湯送下酒亦可洗足湯治腳氣川椒一兩獨活羌活木瓜各五錢荊芥穗一兩白芷三錢水一壺煎半壺傾出去渣溫浴洗後拭乾仍用花椒炒熱絹包裹尉患處或炒鹽亦可尉之大全良方治寒濕腳氣川椒二三斤疏布囊盛之日以踏腳貴人所用一方治病後足腫狗脊煎湯常洗甚效又方治腳氣無名異為末化牛皮膠調勻貼痛處一方蘿蔔煮濃湯浸浴一二時久自安一方治腳氣衝心大雞心檳榔一個研末用童便薑汁溫酒共半鐘調作一服一方治腳指縫白爛吳化善方鵝掌黃皮燒存性為末敷之如有水出用飛過黃丹人花乳粉摻之陽痿門補腎壯陽丹此藥最能添精補髓保固真精不泄善助元陽滋潤皮膚壯筋骨理腰膝其效如神蒺藜一斤酒洗炒黃蓮鬚八兩炒山萸肉酒浸一夜蒸焙乾續斷酒洗蒸覆盆子去蒂酒蒸枸杞子酒蒸金櫻子膏各四兩菟絲餅芡實米炒各八兩五花龍骨醋煅三四次一兩上為細末煉蜜為丸如桐子大每服三錢空心白滾水送下封臍固陽膏大附子重者加薑汁製陰乾一兩蟾酥四錢麝香五錢升硫一錢六分上為末用淫羊藿二兩白酒二碗入羊藿熬煎好時去藿不用將酒熬成膏和藥末為二十四丸瓷罐盛如用時取一丸放臍中不拘時膏藥封之其陽自然起也制硫法用硫黃半斤牛糞一斤共搗人陽城罐內半肚火升濕青布蓋口升起布上硫可用糞內硫不用壯陽膏石醫生方甘遂二錢甘草二錢五分附子三錢燒酒泡透曬乾阿芙蓉乳汁泡開母丁香蟾酥各三錢麝香三分上為末用多年婁蔥汁二碗煎成膏將藥入膏內攪勻裝磁罐內用時攤貼臍上一方專治陽痿靈佑宮胡集大附子一個重者燒酒泡軟用銀簪鑽七孔每孔入紅娘子一個外用棉紙包裹水濕煨熟取出紅娘子不用切片曬乾為末又用公雞肝花一個雀腦三個團魚膽三個三味研入附子末為丸桐子大每服一丸黃酒送下解此藥用皮硝二錢煮紅棗十個每用一個食醫心鏡益丈夫興陽理腰膝冷痛淫羊藿一斤酒一斗浸經三日飲之妙又方治陽不興草蓯蓉二斤以好酒一斗浸之經宿隨意早晚飲之一方治男子陰濕陽痿不舉黑附子蛇床子紫梢花丁香海螵蛸木鱉子遠志去心菖蒲各三錢潮腦一錢五分每服五錢水三碗煎碗半溫洗陰囊並濕處日洗二三次多洗為妙一方蜂房燒灰存性為末每服一錢五分涼水送下一方治陽衰陰痿不舉天雄菟絲子各等分上為末用雀卵清為丸桐子大每服十丸空心黃酒送下消渴門黃連地黃湯凡消渴之症多屬血虛不生津液故曰宜服此方神效黃連生地黃天花粉當歸人參五味子白茯苓乾葛甘草麥門冬去心各一錢上加姜一片棗一枚竹叮十片水三鍾煎一鍾去渣溫服如上焦渴者加山梔桔梗中焦渴者加黃芩頭眩渴不止者加石膏下焦渴者加柏知母若欲作丸加薄荷煉蜜為丸如彈子大每服一丸噙化咽下一方治消渴心中煩熱滑石二兩研末水二碗煎去渣下粳米二合煮熟食之立效又方治消渴小便數多瓜蔞根簿切人乳拌蒸竹瀝拌曬上研末蜜丸如彈子大噙化或緑豆大米飲送下竹龍散專治諸病作渴飲水不止五靈脂研生黑豆去皮各等分上為末每服二錢不拘時用冬瓜皮煎湯調下如無冬瓜皮即冬瓜子仁亦可
