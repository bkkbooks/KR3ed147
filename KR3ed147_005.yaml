body:
  text: 卷之五外科癰疽門凡人初覺癰疽發背已結未結赤熱腫痛先以濕紙覆上立視候其紙先干處即是結疽頭處取獨頭蒜切片如三個錢厚安在頭上用大艾三壯換一蒜片痛者灸至不痛不痛灸至痛方住最要早覺早灸為上方發一二日者十灸十愈三四日者六七愈五六日者三四愈過七日則不可灸矣若有十數頭作一處生者用大蒜搗成膏作餅子鋪上聚艾燒之亦能安也若背上初發赤腫內有一粒黃如粟米者即用獨蒜切片如前灸法治之次日去痂膿自潰也追風通氣散治癰疽發背腦疽流注腫毒救壞病活死肌彌患於未萌之前拔根於即愈之後此藥順氣勻血扶植胃土不傷元氣滌盪邪穢自然通氣不生變症兼治打傷疝氣腳氣諸氣痞寒腰痛一切痰飲等症當歸何首烏木通赤芍白芷小茴香烏藥枳殼麩炒甘草各等分水二鍾煎一鍾溫服病在上食後服病在下食前服槐花酒方李永福方治百種瘡毒初覺頭腦面目及身上下有瘡腸風痔漏或中毒眼花頭暈口乾舌苦心驚背熱四肢麻木覺有紅腫在背等症槐子二兩或槐花四兩炒胃寒人不可服煮東酒一斤煎一二滾去渣乘熱服之汗出即愈如不退照前再服一劑縱成膿者無不愈矣三聖錠治初起無名大瘡疔毒上之能消陳石灰水飛細末一斤蝸牛五十個馬齒莧絞汁多些曬乾作錠用水醋研上瘡初覺便上五日後留頂圈上干則又換新起未傳經者能消已傳經者出膿亦斂移山倒海靈佑宮胡方地牯牛四十九個麝香一分蟾酥三分上為細末丸如黍米大硃砂為衣凡腫毒以一丸水研用新筆點藥從患處書引到別處其腫處自消如上藥處腫將針挑被以藥按上膏藥貼之即愈得命丹王永光集專治無名腫毒發背癰疽疔毒惡瘡噎食轉食水蠱氣蠱心疼腹疼大小便不通胸脹脅滿水瀉痢疾天疱楊梅風癬疥癩腸風下血男子五淋白濁婦人赤白帶下風濕流注並皆治之沉香木香乳香丁香各五分苦葶藶五分牙皂微焙皂礬各三分生用川芎五錢巴豆去油少帶油性四錢上為細末棗肉合丸豌豆大每服一丸生水送下服藥後不可吃一切熱物如藥不受嘔出藥來再服一丸大人壯者用大些丸弱人小兒用小丸孕婦忌服腫毒方未成膿者圈上即消已成者即破黑驢蹄煅成灰存性為末蕎麥麵各一兩生草烏六錢食鹽五錢上研細末水和成餅放鍋內烙黃色曬乾研細末醋調從四圍上之白馬婆口傳方一人肩臂生無名腫毒瘡數月腫痛百藥不效一人教用金絲木鱉一個研末用童便一大碗調服次日即消治癰疽無頭方蜀葵花子一粒新汲水吞下須臾即破如要多破服三四粒有驗治大癰小毒初起方修德堂方疔瘡發背識者稀醋研京墨繞四圍乳香沒藥同調上天明恰似鬼神移臘礬丸癰疽已成即服此藥護心護膜止痛淨黃臘一兩明礬一兩研用勺化開臘再入礬末攪均為丸綠豆大每服六七十丸滾水送下一日三服三日後每日一服外科聖藥用硃砂為衣更效忍冬花金銀花一斤粉甘草二兩上為細末麵糊為丸桐子大每服八九十丸黃酒送下每日服三次一方金銀花四斤搗爛放罐內水三碗東酒三碗煎十餘沸去渣取汁熬膏滴水不散再入甘草末二兩合一處曬乾酒打麵糊為丸綠豆大每服八九十丸黃酒送下或滾水亦可一方治癰疽蜀葵花搗爛敷患處乾者為末蜜調搽之夏枯膏治癰疽發背無名腫毒瘰癧馬刀等瘡夏枯草去根莖葉搗爛取汁熬膏貼之破者白滾水調服二三茶匙尖茶用治癰疽及貼骨痛不破者白丁香即麻雀糞唾黏在腫癤軟處自穿一頭尖而堅者乃雄雀糞方妙治蛇頭瘡即指上長人糞黃泥合一處搗爛裹患處即安治諸毒惡瘡蒲公英金銀花各等分上為細末每服三錢熱黃酒調服治諸瘡癤扎內長出胬肉烏梅去核搗爛加蜜少許攤貼即清治一切瘡久不收口者蜂房蛇蛻皮亂髮各等分俱燒灰存性為細末每服一錢水調服治癰疽真人活命引此方專治一切癰疽腫毒發背惡瘡初起二服即消已成易潰其效如神川山甲蛤粉炒黃防風赤芍甘草沒藥去油培白芷以上各六分歸尾一錢乳香一錢天花粉八分荊芥一錢川貝母八分陳皮去白三錢金銀花三錢其十三味用無灰酒三茶鍾煎三五滾溫服瘡在上部食後服在下部食遠眼服藥之後再用酒三小鐘即愈皂角刺炒八分在外用要破用瘰癧門開鬱湯治瘰癧先用開鬱白芍鹽水炒昆布桔梗白芷夏枯草花粉連翹金銀花香附鹽醋酒童便四制各一錢水二鍾煎一鍾溫服陀僧丸治鼠瘡已破初起遍身瘡毒有管出水有口出膿頑臁多年不愈及痔漏諸瘡通用此方常服則自愈黃臘一兩枯礬三錢陀僧雄黃硃砂各一錢蜜五錢除蜜臘研細末聽用先將臘化開入蜜溶化離火將前藥入內攪均眾手速丸綠豆大每服三分滾水送下病在上食後服病在下食前服鼠瘡未破者長以帛絹按之已破者用米泔水煎地錦草洗之勤洗必效瘰癧內消仙方穿山甲炒乳香去油沒藥去油各三錢海藻白鴿糞炒蝸牛炒各五錢公土狗二個連足翅炒楊柳蟲三條炒共為細末每服三錢臨臥黃酒調服忌麵食腥葷房事甘草一百日一方治症同前黃柏炒黑白鴿屎瓦上炙焦各一兩上研細末雞子清調搽紙上貼之一日一換自消一方黎思賢方巴豆煅七分人言煅三分上研細末先將初起頭一個灸一壯然後上藥三釐用膏貼之如瘰上藥後流水用紙拭之俟頭一個愈再灸第二個同前上藥漸次治之神效一方靈佑宮胡方紫背天葵一兩五錢海藻海帶昆布各一兩海螵蛸五錢貝母桔梗各一兩通血香三錢上為細末酒糊為丸桐子大每服七十丸食後溫黃酒送下肘後方治頸下瘰癧如梅李海藻一斤黃酒三斤泡數日稍稍飲之一方治瘰癧潰爛久不愈者用大蜈蚣一條用瓦上燒灰為末清油調塗三四次即安治鼠瘡方李應春方檳榔防風陀僧白朮黑醜江米焙炒斑蝥去頭足翅江米同炒各等分共為細末麵糊為丸桐子大每服八九丸量病輕重加減用甘草檳榔煎湯送下炒藥江米入於溝中勿令雞犬食之即死千捶膏治年久不愈鼠瘡臁瘡效大麻子去殼苦杏仁桃仁各去皮各四百粒乳香沒藥銅青各五錢松香一斤用鍋化開松香倒石板上冷定先將前三味搗為泥方入乳沒等四味共搗三千下成膏如干入麻油少許用布絹攤貼鼠瘡未破者服即消蜈蚣一條去頭足山甲五錢全蠍十四個去毒火硝三分上為細末每服一錢黃酒調服隨嚼核桃肉二枚一料服完效內府秘傳方治癭氣神效海藻熱水洗淨昆布洗淨海帶海粉飛過海螵蛸海螺醋炙甘草少許上各等分為細末煉蜜為丸如圓眼大每服一丸臨臥口中噙化如頸下搖者加長螺鼠瘡方郎興祖方馬蜂窩一兩燒灰存性冰片三分俱為末用醋熬成膏攤貽膏上剪一孔出膿水治鼠瘡瘰癧偏方豬懸蹄甲燒灰存性上為細末每服三錢黃酒調即消治鼠瘡方關紹聖方大鯽魚一尾皂角內獨子每歲一個川貝母三錢土貝母二錢將皂角子貝母放入魚肚內黃泥包裹陰陽瓦炭火焙乾存性研為細末每服三錢食後黃酒調服忌葷百日一方孫望林方治鼠瘡已破者貼之效銀硃銅綠為末明松香各五分天麻仁杏仁各七個去皮上將前三昧搗爛共合一處為泥舊紙攤貼患處聽其自落疔毒門療毒入內方寶坻縣張相公方治疔瘡走動毒攻入內不知人事但有氣者可救沔茄一枚用磁碗盛黃酒將茄於碗內磨得下磨不下只管於酒內磨一鍾熱茶時將酒裝入長頸錫壺內再入連須蔥二根牙咬不令斷白豇豆七粒如蕎麥開花時加蕎麥七粒別時不用又用小麥令眾人口嚼成麵筋封固壺口放火鍋內煮一炷香取出熱服出汗愈後靜四五日效如不省人事灌之梅花點舌丹治傷寒初起諸般疔毒破傷風咽喉痛一切無名腫毒之症又治騾馬鼠瘡每瘡內入一丸自落乳香沒藥硃砂雄黃沉香血竭硼砂苦葶藶各一錢熊膽麝香珍珠各三分牛黃冰片蟾酥各五分上將蟾酥預用煮酒泡化將前藥共研細末同蟾酥杵合為丸綠豆大金箔為衣如遇疔毒傷寒初起先將一粒放舌下噙化完再用一丸溫水吞下如口內麻苦用涼水連漱吐之蓋被以出汗其病即解如諸惡瘡日久黑腐陷而不起者用三五丸白滾水送下重者二三服愈急救疔毒方郭麗方苦參元參柴胡連翹龍膽草青木香槐花各二錢生地黃三錢在頭上加川芎在下部加牛膝在手上加金銀花在前後加桔梗在腰間加杜仲用水酒各一碗煎一碗露一宿服渣再煎疔毒膏貼疔毒惡瘡穿山甲象皮山梔子八十個槐桑柳榆桃枝如指粗五寸長各五根用真香油二十兩將前藥泡油內三日炸焦黑色再入女發一兩炸化濾淨將山甲象皮揀出為細末同血竭二兩硇砂一錢五分兒茶二錢合一處聽用將油稱准十六兩飛過黃丹八兩入油內熬滴水成珠待溫時再下象皮細藥攪均入涼水內抽拉幾十次聽用飛龍奪命丹蟾酥銅綠乳香沒藥各二錢雄黃二錢輕粉麝香各五分蜈蚣一條去頭足血竭膽礬寒水石各一錢硃砂二錢蝸牛二十一個上為細末預將蟾酥用黃酒浸開合藥丸如綠豆大硃砂為衣每服二丸先咬蔥一大口吐於男左女右手心內用指將蔥擢一孔將藥包於內連蔥入口熱酒送下蓋被出汗神效一方內加冰片五分拔疔方如遇疔毒用衣針刺頭針入知痛出針入藥少許白砒燒酒煮過一錢明雄一錢乳香沒藥各五分為細末上針孔內疔毒方梅芳馨方食鹽綠礬各等分研極細末放磁器內三伏日曬每日攪三五遍曬成汁水埋土內留一揭蓋取藥處如不用密蓋之遇有疔毒先以針撥頂深入見血水出將藥點入針口即安疔瘡方痛不可忍者白菊花根葉搗爛敷之痛即可止加冬月無葉以根代亦可再以根葉取汁服之死者可活治走馬疔立刻回生蟾酥銀硃雄黃各等分上為細末棗肉為丸如綠豆大每服七丸胡椒煎湯一鍾研鐵鏽於湯內少許灌下前藥一丸起死回生離宮錠治無名疔毒蟲傷腫瘍等症京墨一兩蟾酥膽礬血竭硃砂各二錢麝香五分上用涼水化酥合錠用時涼水磨塗腫處傷處八返膏貼疔瘡神效羊角蔥心搗爛加生蜜合膏貼之切忌入口傷人指上紅腫白酒藥丸以鹽水煮之熟熱包患上過晚即愈治蛇頭疽方黑豆水泡搗爛敷上效蛇頭指方雞子開一竅將指入內待蛋化水又換一個如此三個即愈五毒錠子治惡毒蛇蠍所傷疔瘡初起磨上效硃砂雄黃各八錢麝香贍酥各一錢用黃酒泡酥合做錠子治疔瘡神方並各種惡瘡紫花地丁旱蘿蔔切片陰乾各二錢用黃酒煎三四滾熱服出汗為度煎時不可令出氣一方孫望林方治人忽然生一水泡不知弄破其名叫作走疔疔走則所牽引經絡隨脈腫去令人憎寒壯熱久則噁心如不速治傷人槐子炒黃色為末平對陳石灰末雞蛋清調從外圈至破處留錢大一塊如上藥令他原毒還從舊口出再上疔藥愈對口門對口瘡方小鯽魚一尾燈草一錢量用醋糟共搗爛敷之即效一方靈佑宮胡方望江南花又名丁豆生大黃蒲公英當歸紫花地丁各二錢金銀花三錢芒硝柴胡各一錢水酒各一碗煎一碗食後服二次去硝並大黃加桔梗一錢食前服二劑患可愈也一方鯉魚一尾去鱗腸上搗爛入頭垢五六錢再搗極均加蜜半杯攪均從瘡外圈入裡面留一孔出氣二次止痛全消一方爬山虎樹上生的好白及各等分二味搗爛做成餅敷瘡口即止痛一方並治初起諸瘡抱小雞母出巢時熱屎塗之瘡上立效腫毒門治腫毒初起方白及白蘞各一兩枯礬五錢共為細末入水碗中即沉底外用雙白紙蘸水搭患處另用紙再換搭其患處冷定即傾去水用藥敷上立消一方五倍子炒為末醋調塗患處一方王永光集當歸八錢黃耆五錢粉甘草二錢金銀花一兩水一碗煮酒一鍾煎一碗空心溫服鐵筆圈神效方膽礬六錢江米同炒黃不用米雄黃二錢為末硼砂四錢二分先將礬砂入鐵鍋內熔化次入雄末拿下冷定研細入麝香一分磁罐秘收用時燒酒調筆蘸藥圈瘡四圍腫處一日一圍瘡隨藥收待瘡熱時用針刺開出膿而愈一方公豬膽陰乾切巴豆大巴豆一粒去皮二味同搗爛再研香墨合均搽患處留口出其毒自消圈毒散姜王方榆樹面飛羅面乳香沒藥等分上為細末無根水調搽自遠遠圍上其腫自歸聚一處輕者自行消散小奪命丹治腦疽及疔瘡惡毒無名腫毒其效如神千頭子即掃帚子槐花子地丁香上三味各等分水煎通口溫服加膽酥少許更妙烏龍膏治一切無名腫毒疔瘡初起用敷接骨跌打損傷隔年陳粉子炒黑一斤五倍子四兩炒歸尾二兩上為細末用膏醋調圍毒根上治毒瘡初起痛不可忍急令人解王永光集大便乘熱包裹之其痛立止消毒散治無名腫毒黃水白皮瘡顏守乾方生大黃白及各等分為末涼水調搽患處效解毒散治無名腫毒瘡效川烏草烏藤黃各等分三味為末用醋調搽患處即愈小兒軟癤大枳殼一個去白磨口平麵糊抹邊合癤上自出膿血盡更無痕一方豬膽汁調白糖上無名腫瘡一方治一切諸瘡靈佑宮胡方蕎麥一大碗炒半炷香人言一塊黃豆大硫黃二塊白果大再炒半炷香研末水調搽秘傳神效活命飲金銀花一兩皂刺八分山甲八片炙黃色陳皮貝母花粉各六分歸尾乳香大黃沒藥木鱉子去殼甘草赤芍防風各五分白芷八分水酒各一鍾煎八分老人體虛者加生黃耆二錢大麻風門大麻風奇方治全身腫爛頭髮眉毛俱落兩腳臭爛一治一效蝦蟆一隻用泥裹燒熟去泥令病人坐定以大碗盛蝦蟆小碗蓋住乘熱沖滾黃酒烹一刻止服酒取汗為度只服一次三日痊愈胎癩方官粉水調塗於碗內曬乾用艾熏至老黃色取下為末絹袋撲之絕炒用豬膽湯洗淨更妙神效癩藥方人言一錢川椒二錢枯礬三錢火硝四錢硫黃九錢大附子二三個上為細末用豬油調搽患處上火烤立效一方治大麻風眉毛盡落肌膚腐潰兼治一切惡瘡浮萍煎湯浴浸半日大效一方治一身惡瘡癩地膚子半升煎湯頻浴甚效楊梅門托楊梅方孫偉方治楊梅初起渾身筋骨疼痛寒熱往來頭目昏眩服此藥已出瘡者即愈未出瘡者則不可出矣威靈仙蟬蛻各一錢生大黃三錢麻黃二錢甘草節五分上用精羊肉一斤水五碗將肉煮爛令病人食盡肉然後用肉湯二碗煎藥六分去渣溫服蓋被出臭汗打下惡物大便如痢疾不需補下盡毒氣忌七日不出房門勿令見風一方治楊梅已出未出毒盛人體壯者服前藥脫去內毒再服此藥陸續去其皮膚之毒可除根龍眼肉一個如無龍眼紅棗亦可入紅粉霜二三釐上為丸早晚各一丸白滾水送下一方治頭面出楊梅瘡銅綠為末干燉酒調點之效一方孫偉方治楊梅瘡倒發幾次用金蟬蛻殼方窩見白酒五斤大蝦蟆一隻將蝦蟆放酒內煮熟去蝦蟆不用只飲酒盡其瘡自平如不平再服一料愈茯苓糕治楊梅瘡毒土茯苓末糯米麵白蜜各一斤上三味和均蒸糕食之常以土茯苓煎湯飲不可飲茶水香鰾湯治楊梅筋骨疼痛久不愈者立效茜草麻黃烏藥細辛槐子炒花椒各二錢乳香一錢魚鰾三錢苧麻同炒成珠水二鍾姜五片蔥五根煎一鍾溫服二三貼即愈一方楊梅已破未破杏仁去皮尖二錢輕粉一錢冰片少許上研細末豬骨髓油研膏點之一方不論男女得此惡瘡用魚膠半斤香油炸枯上用陳南酒須量飲之以魚膠當下酒之物備淨房一間紙糊嚴密不透風再用舊棉被套子矇頭出汗汗完用長竹杆將棉套子揭的遠遠埋於空處唯恐人畜聞此惡氣傷其性命天疱楊梅點藥方輕粉一錢杏仁七個去皮尖為末豬骨髓油調搽一方治楊梅新舊不愈者用明雄黃研細末每服三錢樺皮酒煎濃汁空心調服五次痊愈一方兒茶輕粉銅青各等分上研細末將瘡去癡濕用乾摻乾用豬膽汁調搽天疱楊梅諸瘡方香油二斤入水一盞煎至白煙起收貯每用黃酒一鍾入油一盞溫服每日三次服盡痊愈一方鴨一隻餓兩日只與白水食之再以輕粉一兩入大米飯內拌均餵鴨待鴨吃盡以葦根捶碎泡水令鴨食之解去輕粉之毒待鴨毛落盡煮鴨食之一方小蛇一條斬令碎爛將母雞一隻罩住餓一日夜放出令食蛇肉待食盡罩放淨土上將撒下雞屎收放缸瓦上煅過存性每用一分作三釐稱之先三釐治頭上中三釐治身間末三釐治腳下燒酒調服百無所忌秤頭記明一方肥皂子山皂子白扁豆蟬蛻殭蠶全蠍斑蝥去頭足翅各七個共為末分作四服每服艾根二錢水煎湯調下又敷藥方杏仁膽礬輕粉各五分上研細末香油調搽濕則乾摻三黃丸以上三方楊仲衡集黃芩黃柏大黃各等分為細末水為丸桐子大每服二錢滾水送下痔漏門臟連丸治內痔或大腸有毒小便有血或前或後用此方黃連四兩酒煮炒黑為末豬大腸五寸去油將末裝入大腸內扎住用酒濕透入甑內蒸熟連腸藥末共搗成膏為丸桐子大每服三錢滾水送下其病斷根斗門方治雞冠痔用黃連為末敷之甚良痔瘡方番白草熬水熏洗效點痔瘡方大田螺蓋上入冰片少許放一宿次日蘸殼內水點之兼可搽大瘡止痛效痔瘡方羊膽一個冰片五分併合一處敷之即愈治翻花痔方馬齒莧陰乾燒灰豬油調搽痔瘡腫痛方熊膽冰片等分為末水調點腫痛即止痔漏神方王千總方槐角四兩炒地龍二兩去泥醋炒白丁香二兩酒炒珍珠煅一錢二分象牙屑煅一兩管仲二兩炒蟬蛻八個全良薑一兩炒上為細末煉蜜為丸桐子大每服三錢白滾水送下服至十三日管子自落矣取至二十日其病愈也切忌房事燒酒氣惱一月永不再發治痔漏有管方白鴿屎一升入罐內以開水灌之即坐在罐口上其管自落入罐中數日即收口要坐臥忍疼治癖漏不拘何處並楊梅人面生瘡槐花皂刺各四錢皮硝二錢黃連生地各一錢廣木香五分水二碗煎一碗空心溫服渣再煎十五貼痊愈治漏瘡神方一硫二汞三硃砂四兩雄黃交加一斤鉛礦碎如麻制度休差毫髮平分兩罐內作用三文三武制他但憑一字走天涯勝似神仙點化先將此藥共研一處平分開入兩個陽城罐內上著燈盞蓋定著微火封完去火以鐵絲袢住用鹽泥將罐口嚴封入八卦爐中先文後武各香三炷用棉花作捻放盞內不時添水打香完把罐取下冷定方開罐口將盞底靈藥掃下為成極細末入江米糊內合均捻成極細捻子入瘡管內待四五日其瘡管自出矣瘡管落了後上生肌藥其妙如神熏洗漏瘡方川蚊蛤整大者同核桃葉熬水先熏後洗效治漏瘡有孔化管生肌散枯礬一錢白砒八分硃砂二分蟾酥二分沒藥乳香各三分上為細末口津為條穿入孔內外用膏貼之治痔瘡潤腸帶補丸蒼耳子重者十斤輕者四五斤焙乾上為末用糯米粉打糊為丸桐子大每日早晚白滾水送下二錢漏瘡退管方胡一鵬方用白道地龍火炙存性為末或一條二條黃酒送下追毒化管作膿丸胡黃連薑汁炒一兩刺猥皮一兩火炙黃色麝香二分為細末煮白米飯搗和為丸桐子大每服二十丸空心白滾水送下服過二十日後再服後方內托長肉閉口收功丸胡黃連一兩穿山甲五錢用麻油四兩炸黃色石決明五錢煅槐花五錢微炒黃色為細末煉蜜為丸桐子大每服一錢空心白滾水送下治漏瘡除根方沒藥血竭各五錢蜂房燒存性蟬蛻燒存性木香麝香各一錢為細末熔化黃臘一兩入藥末為丸黃豆大早晚各一丸燒酒送下治痔漏除根方槐耳石脂煅龍骨煅雄黃象皮乳香沒藥象牙屑炒刺猥皮炒血竭青黛明礬生用各五錢羊角海燈佛前舊的煅五錢豬懸蹄殼十四個煅為細末米粉打糊為丸桐子大每服一錢五分白滾水送下早晚服戒房事忌芝麻治楊梅痔漏方大鱉甲三個去肉湯洗淨刺猥皮一個火炙黃色象牙末三錢為細末棗肉為丸櫻桃大每服一丸童便送下服七日後仍用三味末豬膽外調敷患處一方鐵角將軍為末米飯做捻入孔內其管自脫化管不疼方藥針官桂乾薑丁香各一錢蝦蟆一隻去筋骨用腿肉上將前藥為末用腿肉搗爛合藥作捻如針插管孔內一日一次一方乳香木香蟬蛻殭蠶各三錢沒藥象牙末血竭羌活各五錢碗大蜂房一個用食鹽填滿孔內火煅存性研細熔黃臘四兩為丸龍眼豆大每日空心一丸用酒化開服七日其管自出再用生肌散敷之一方玉末水晶末象牙末各一兩上合一處每日空心白滾水送下一錢吃即出管矣一方水蓬花科煎膏上於管內其管自干一方河邊柳根上須一把花椒芥子各二錢水二碗煎先熏後洗其蟲頭黑身白俱從漏瘡而出立愈治心漏方胸前有水孔常出血水謂之心漏又治腰疼鹿茸去毛酥炙微黃色附子童便泡去皮臍食鹽炒上三味各等分為末棗肉為丸綠豆大每服三十丸空心黃酒送下洗痔方黑茄枝馬齒莧瓦松蔥鬚子陳蒜辮槐枝各五錢花椒六分水煎入罐內坐在口上熏蒸水著的手倒在砂盞內燙洗甚效發背門發背將成方劉述庵方凡人中熱毒眼黑頭暈口乾舌苦心驚背熱四肢麻木覺有紅暈在背後槐子一兩炒茶褐色用黃酒一碗滾過去渣乘熱服即愈如未愈照前再煎服之效就成膿者亦輕亦愈屢驗之方發背已破治法方可治鄉間無醫藥處者以此法治可全性命僵石子研細末多少不拘量瘡大小地下掘一坑比瘡大些坑邊四圍泥圈之坑內令水滿將僵石末入水內用水攪和成稀粥令病人仰臥在坑上只要瘡在泥粥內泡多時其毒膿血盡歸泥去用帛沾干再用艾子燒煙一熏使他收口不受蟲蠅之害則愈箍藥奇方治發背癰疽諸般腫毒神效鮮雞蛋三個煮熟去皮入鍋內煎出油再用蝦蟆頭二個炭火內燒存性為末銀硃三錢共攪蛋油內磁罐收則封口勿令泄氣遇對口發背諸毒疼痛不可忍者用鵝翎掃瘡周圍留頂以出毒氣其痛立止能束緊瘡根不致開大甚有功效發背瘡疑似者人屎燒作灰醋和為泥敷腫處干即易之治發背癰疽腫毒方豬膽一枚取汁傾入磁罐內再入蜜平兌共合均量瘡大小先以面圈之將蔥搗爛攤瘡上然後用茶匙挑膽蜜於瘡上不一時立消治發背癰疽並杖瘡及蛇傷最效鳳仙花連根莖葉搗爛先用陳米醋洗淨後敷藥一日一換如冬無鮮的乾者為末水調敷亦效治發背疔瘡諸般惡瘡方番硇砂川鹽硃砂各等分要晴天無雲三樣共為細末用竹紙包不用瓶裝以玉簪沾藥點患處四圍立效八珍錠方三合堂治發背癰疽惡瘡粉瘤鼠漏無名疔毒等瘡瘡頭孔多膿血不通淤肉不腐腐肉不脫漏管不落看瘡大小可用數個放入孔內上用膏貼之硃砂雄黃沒藥乳香各五錢真番硇八分煅令煙盡人言一錢煅過枯礬三錢巴豆三十枚去油上為細末粳米飯為丸如蕎麥大小成錠成作線條亦可發背方官粉不拘多少用槐條銼碎拌炒官粉黃色去條不用官粉一兩入銀硃一錢同研用神前柏油燭調攤舊棉花上貼之效破傷風門破傷風方綿麻四兩蟬蛻二十四個鐵角將軍四個黃臘二兩殭蠶四個後四味用麻繞裹放鐵鍋內上合磁盆周圍縫用黃泥塞嚴火煅成灰分作四服熱黃酒調服出汗為度瘡口作癢不可動手避風忌房事一方用全蠍一個為末黃酒調服一日三度一方用槐子一合炒黃酒一碗煎八分熱服汗出即愈一方用新宰豬乘熱割肉一片貼患處連換三四片若打傷眼目者治之亦立消青腫灸法方治破傷風及癲狗咬傷此方最益而神效核桃殼半邊內填人糞滿再用槐皮襯扣傷處用艾灸核桃上灸至遍身汗出其人大困即愈若遠年只在瘡上灸之亦愈一方人手足指甲炒煙起六錢獨活硃砂飛過天南星薑汁製各二錢上為細末每服三錢黃酒調服出汗外貼真玉散生南星防風等分上為細末薑汁調搽貼患處即愈一方用蘇木為末每服三錢熱黃酒沖服全蠍散乃破傷風症而至危者非此不除蠍子梢七個為末熱黃酒調服一方魚鰾頭炒存性不見鐵器病輕者一錢病重者一錢五分荊芥穗三錢上為細末黃酒一碗燉熱飲之汗出即愈一方黑驢糞為末圈傷處槐皮一塊放頂上面做燈碗一個放槐皮上燈花燃點待瘡熱痛為度頑瘡門但凡一切頑瘡不收口先用桑木柴燒灰再兌礦子灰水熬三五沸洗一次後上珍珠散紅玉膏八寶珍珠散孫偉方治一切頑瘡生肌長肉珍珠煅海巴煅乳香去油沒藥去油血竭孩茶各一錢冰片五分麝香三分上為細末上瘡收口神效紅玉膏貼諸瘡久不收口貼之生肌長肉止痛甚效香油十二兩火上滾下頭髮五錢炸令盡雞蛋十個打開攪破蛋黃陸續下油內炸枯色去蛋下黃臘五兩化開拿下火看鍋四邊油定再下飛去黃丹五兩上攪令均成膏憑用生肌收口靈藥乳香去油沒藥去油血竭官粉兒茶各一錢珍珠五分冰片五分共研細末磁罐收藏黃臘塞口聽用生肌散劉士琦方乳香去油沒藥去油血竭各一錢象皮少許兒茶一錢珍珠五分冰片二分龍骨五分上為細末磁罐收貯黃臘塞口憑用一方桑葉用醋煮一滾撈起貼瘡上生肌收口一方修德堂洗瘡去毒化腐生肌去疔角兼可開瘡能破核瘤去鼻痔去鼠瘡內管點面上痔去斑治楊梅結毒成癩點猴子等症桑木灰七錢石灰五錢用水煎洗患處一方治瘡久不收口貓犬頭骨燒灰研末上患處即愈珠泥膏治頑瘡諸瘡不收口真麻油四兩定粉黃臘各二兩琥珀五分珍珠一錢冰片三分乳香去油沒藥去油各五分上將香油入鍋內沸之再下臘化開衝入定粉攪均拿下火待溫再入眾藥攪均入水中拔去火毒此方救人多矣一方頑瘡不收口劉士琦方蓖麻子去皮一百粒紅棗十個煮熟去皮核上合一處搗成泥貼患處一日一換癭瘤門一方治癭氣結聚於頸口漸腫大黃藥子一斤煮酒十斤浸之上入甑蒸透候取飲常常勿絕酒氣三五日漸消常把鏡照或以綿逐日度之覺消即停飲不然令人項細也煙膠散治燕窩瘡生於項上者兼治牛皮血癬及四彎瘡痛癢久不愈者神效煙膠小檳榔各等分為細末用柏油調搽即愈治瘤初起方用米醋煮芫花將絲線入汁內同煮取線系瘤根處徐徐漸緊縛之則自落治瘤子方用椰樹上蜘蛛絲纏瘤根上初覺脹悶久則自消血氣不通即落亦可以纏牛奶痔房屋中蜘蛛絲亦可七夕纏之更妙一方治頸下卒結囊欲成癭兼治瘰癧海藻一斤黃酒一斤半泡數日徐徐飲之治癭氣方大蜘蛛一個擂酒頓服或海藻浸酒久服亦可治胞頸方海帶一錢三分燒酒二小鐘泡一個時辰切細搗爛聽用又將大黃豆四十九粒清水泡脹去皮大麥芽一碗炒為末用前藥將豆搗爛為泥用好醋一小鐘共合為丸桐子大頭一日一丸二日二丸三日三丸唾津送下其疾自消神效治癭瘤方昆布海藻熱水洗淨海粉海螺醋製海螵蛸海帶如項上垂者用長海螺不垂者用圓的各等分為細末煉蜜為丸栗子大每服一丸臨臥口中噙化癜風門白癜風方雄黃三分陀僧七分共為細末於三伏月用鮮絲瓜葉蘸藥末搽患處三日後方洗浴一日搽三五次治黑白癜風方硫黃一錢陀僧一錢人言六分上為細末用陳醋調和晚上搽之次早洗去數日效赤白癜風方芝麻花同自己小便搽患過半日洗去效臁瘡門一方吳善化方定粉豬脂油連須蔥共搗爛敷患處用青布蓋之用帶縛之以不癢去藥治騾馬亦可一方人中黃為末醋調搽患處愈一方熱豆腐一片貼瘡以絹縛之日換二次拔出黃水其腐紅黃乾硬雞犬不食數日痊愈治女子裙邊風瘡經年不愈方男子頭垢不拘多少以桐油調作夾紙膏貼之一方姚清虛方用火籠內銅鍋片量瘡大小比瘡大一分將銅片用童便泡夜貼瘡上再用布緊緊纏住其癢非常不可解看三日肉平又換一片銅必用二片先以甘草煎水洗之一方孫偉方涼水茄子切薄片貼患處兩日一換以愈為止一方豬脊髓綠豆粉老蔥白搗爛貼之一方孫偉方蘆甘石末豬骨髓油調搽患處效一方白芝麻擂如泥油紙厚厚攤貼三五次愈一方天靈蓋燒灰香油調搽患處一方郎興祖方銅綠銀硃定粉各三錢為末用燈窩油調濃作夾紙膏要五層有膿水每日翻轉貼之一方此名紅粉治腿上血風瘡滿腿腫破上二三次即愈水銀牙硝明礬各三錢冰片半分上將硝礬研末放廣鍋內鋪平再將水銀滴放末上如天星之狀用磁碗一個用生薑搽過恐其制破將碗扣於鍋上外用鹽泥封固其碗底上用水不時滴之文武炭火煅三炷香完拿下鍋來待冷用翅毛掃藥下冰片在內收貯磁罐中聽用疥瘡門諸瘡一掃光方孫偉方治癢瘡或干或濕異類殊形但多癢少痛並婦人白屑風症苦參黃柏各一斤木鱉肉蛇床子川椒明礬枯礬硫黃風子肉潮腦水銀輕粉各一兩白砒五錢煙膠二斤上為細末豬脂油調搽瘡上用火烤癢即止熏疥方孫偉方銀硃雄黃高佛香各一錢艾葉三錢木鱉子一個去殼共搗一處用草紙圈成捻子燒燃一頭放於瓦上再蓋一瓦放被內令患人頭在外用衣將大小便固好口噙涼水一捻可熏四五刻後餘毒成痂搽一掃光收功治諸瘡疥癩血風等症硫黃不拘多少人言少許入白蘿蔔內火燒存性取出研極細末又用香油四兩放鍋內入雞蛋三個煎熟去雞子不用再入花椒四兩於油內煎至黑焦去椒不用用油調藥搽瘡名為一掃光一方熱水一盆入石灰半碗攪渾待溫可下手洗疥如神大膿㾧疥方韓羽侯方鴿子干屎四兩為細末入白麵半斤香油炸脆零碎吃盡即愈合手香方大風子二三個去頭足水銀一錢杏仁七個去皮尖香油一兩油核桃仁五錢木鱉十個去皮潮腦五錢人言豆大一塊為末上搗為泥為丸核桃大用一丸兩手搓揉令鼻㗜其藥氣再以兩手上油搽癢處效洗疥方吳元位方防風連翹苦參黃芩各一兩連須蔥三根用水煎湯沐浴三五次痊愈玉繡球治疥癩諸瘡方大風子肉杏仁去皮尖花椒去目各四十九粒生白礬二錢水銀三錢茶葉一錢潮腦一錢輕粉一錢上為細末用柏油入鹽少許為丸放掌中或以鼻聞其氣調搽患處不日而愈癬瘡門食魚方治遍身風瘡遠年頑癬久治不愈者黑魚一尾去腸用蒼耳子填入腹中又鋪在鍋底些少用水慢火煮熟去蒼耳子不用自食魚肉不用鹽醬三四次大效若患大風症者如法常食久而自愈治疥癬方石灰不拘多少和紙漿水調隨手即減或石灰淋汁洗之一方用蒼朮皮硝等分煎水洗之效一方浮萍煎濃汁浸浴半日浴二三次效一方生半夏一個斑蝥七個去頭足翅胡椒七粒上為細末用膠棗二個去皮核同藥末搗合為團或用多少唾津搽患處待起小泡若起大泡穿破出黃水即愈一方治癬翻腫極癢不可忍者百治不效馬齒菜嫩葉連根搗爛敷患處其癢即止一方韓羽侯方烏梅肉一兩白砒一錢上為細末將癬用新錢刮破見血陳醋調搽患處一方天茄子不拘多少收磁罐內不管臭不臭埋地上遇有癬先用穿山甲刮破見血津再用天茄水搽三五次即愈一方硫黃人言百草霜各等分上為細末將癬挖破用香油調搽上用紙貼之或用膏藥蓋之亦可其痛甚者俟半日洗去藥自用香油搽之定痂生肉好一方五倍子醋煮為末刮破癬搽之即愈一方羊蹄葉根鮮者取汁對白糖搽之甚效一方紅棗三四枚去核入人言一錢將紙包灰火炮燒過紙為度取為末用豬膽調搽風癬方楮樹津合豬膽汁搽之效治楊梅癬方輕粉二錢杏仁四十二個去皮洗瘡拭乾研爛搽之不過三次即愈干則下鵝膽汁調敷治頭上白屑風癬方李如松方羊蹄葉根搗爛取汁調青鹽末頻上效一方荔枝核六錢鐵鏽七錢膽礬三錢為細末高醋調和用手磨搽患處效便毒魚口門五虎搜山方治便毒初起蜈蚣一條去頭足全蠍七個去尾足以上為末另包蟬蛻七個殭蠶七個防風荊芥連翹當歸甘草白芷芒硝穿山甲各一錢金銀花一兩大黃三錢水二碗煎一碗將前藥末入碗內空心熱服一方大黃三錢枯礬一錢穿山甲一錢炒上為細末煮酒調服自愈一方雞蛋一個頂上打小孔紅娘子六個裝入內紙包水濕煨熟去紅娘子只食雞蛋酒送下食後小便多內痛尿出或血膿立愈一方魚膠熬化攤皮上貼患處一方橫痃便毒槐子七錢炒煮酒煎熱服護暖出汗效外用生山藥砂糖搗爛貼上即消治魚口初出三五日五倍子炒為末百草霜各等分二味合一處醋調貼患處一日夜即消一方瓜蔞一個燒灰存性為末作三服黃酒送下即消魚口未破方真香油一兩細茶葉一撮用滾水沖在大些碗內扣一刻早晚空心服二次外用廣膠一片鐵勺內化開量瘡攤青布上貼之每日早晚換二次神效治魚口方核桃一個劈為兩半一半去瓤裝明礬末合滿與有瓤半個合成一個濕草紙包裹灰火煨熟取礬桃仁研末煮酒送下治魚口便毒方白醜黑醜俱頭末海金沙穿山甲炒各九錢用黃酒一鍾半煎八分露一夜空心涼服利下惡物治魚口腫痛貼之不出膿方梔子川芎炒各五錢水二鍾煎八分露一夜次日早將藥水調蕎麥麵成膏貼之干即去再換貼忌氣惱燒酒神效消橫痃膏魚膘一兩水熬入皂角末一兩搗泥又入薑黃末二錢麝香三分攤貼瘡留頂即消便毒不收口方桑葉用高醋煮貼甚妙治初起魚口方天茄子一把水二鍾煎一鍾溫服如雙的再服一次即愈禿瘡門一方桑椹汁不拘多少入磁罐內封固埋地內背陰處二三尺深三個月取出遇有禿瘡先用米泔水加花椒熬水洗淨剃頭再用桑汁掃頭上三五次結痂痂落髮出一方潮腦四錢煤焦渣七錢水銀一錢三味研不見心用退豬水洗剃淨頭香油調藥遍搽藥愈後用薑汁鐵鏽上可生髮一方陰溝眼泥獨頭蒜其搗成泥搽頭上用破氈帽包之待泥干即好一方鯽魚一尾去腸將豬脂油填滿用炭火燒焦為末香油調搽患處即愈一方頭上禿瘡最不良米泔水洗見血鮮食鹽研細鍋炒熱遍身瘡處一次痊一方房梁上灰黑芝麻各一鍾先將芝麻搗爛再入灰加香油調搽而愈一方李東中方治禿瘡肥瘡綿耳瘡黃水瘡定粉雄黃枯礬川蚊蛤炒各等分上為細末用香油調搽即愈一方甜瓜葉搗汁塗頭上數次發自長出矣汗雀斑門治婦人雀斑黑痣䵟氣方官粉五兩陀僧一兩輕粉二錢五分麝香五分白檀香一兩共研末晚時雞子清調塗次早洗去久上面光如玉治汗斑方白海南花連根葉先用河水熬洗後以花葉搗爛搽之一方水銀一錢北鉛八分蓖麻仁三十四個鮮羊油合搗成泥搽之一夜次早洗去以好為度一方胡一鵬方搽面上雀斑酒刺附子蛤粉茯苓白芷陀僧三柰各三錢上為細末蜜調搽面上次日洗去神效治汗斑方用烏梅肉為末唾津調搽簡便方治赤白汗斑白附子硫黃各等分為極細末薑汁調稀用茄蒂沾搽一日數次治美人黑痣方蕎麥杆灰桑柴灰新石灰三味等分鍋內水滾一滾裝粗布袋內淋水煎成膏密收勿令泄氣用時簪子點痣上五六日即落治汗斑方薑汁潮腦二味研末揉汗巾上搽之一方雄雞腰子同白果研爛搽之二味生用鹿角散治面上忽生紅痣丹如疥狀不急治沿至遍身必死鹿角燒為末用豬苦膽調搽患處愈治美人黑痣方藜蘆灰用滾水一大碗淋灰汁於銅器內外以湯煮如黑膏以針撥破痣處點之不過三次痣即脫去治汗斑方陀僧五錢硫黃一兩上研細末醋調煨姜蘸搽患處一掃而愈治斑癜方治面多彷點似雀