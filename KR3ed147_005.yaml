各三錢大黃二錢為細末童便黃酒各一鍾煎一鍾熱服一方白蒺藜炒黃色為末每服五錢黃酒煎服金傷門一方煙鋪金方龍骨炒白及各等分上為細末刀口小幹上刀口大涼水調上一方用螃蟹搗爛搽傷處立止一方礦子灰末用韭菜搗極爛做餅陰乾研末搽之一方孫偉方用吃的煙末上之即愈一方以晚蠶砂為末摻勻絹上包之隨手瘡合血止一方慈菇葉陰乾為末上瘡口上即效固漏方修德堂方百藥煎炒真降香各等分為細末上金傷只要藥入刀口塗處神效一方高糧米麵水調塗傷處布包數日即好一方刀割破頸項一個大口急用嫩雞撏去毛扯下皮來貼傷處血即止效一方韭菜小薊石灰上同搗爛做成餅陰乾臨用研末上之即止一方白薇為末上刀口即止血漆瘡門一方漆瘡久不愈者用螃蟹黃塗上患處即愈一方白鯗魚頭煎湯洗之即愈千金方治漆瘡芒硝泡濃汁塗之干即再塗二三次效坐板瘡一方治坐板瘡血風膿疥風疥大風乾肉一個阿魏三錢輕粉二錢潮腦一錢上為細末豬板油調搽效一方絲瓜皮陰乾為末用燒酒調搽而愈一方用舊布鞋底炙熱搭癢處候癢止即住不過三次即愈腎囊濕九仙靈應散治男子陰濕陽痿不舉黑附子蛇床子紫霄花遠志菖蒲海螵蛸木鱉子丁香各三錢潮腦一線五分上為末每服五錢水三碗煎一碗半溫洗濕處每日多洗為妙一方蛇床子防風蒼朮各三錢透骨草五錢火硝一兩水煎先熏後洗一方治陰囊腫蟬蛻五錢煎湯先熏後洗鵝掌風一方蜈蚣二條全防風荊芥花椒蘄艾浮小麥蔥根各一兩蘆甘石五錢用水五碗煎三碗再用蘆甘石洗三四次其厚皮自起勿扯起即愈一方蒼朮半斤桐油二兩醋一小鐘人中白為末五錢上三味合均搽洗掌上次用蒼朮燒燒煙燻五次即愈一方張開泰方用自己小便常洗至好即止一方韓羽侯方豬脂油石決明煅苦參各等分為末用豬油調搽患處夜臥用豬尿胞將手包之湯火門一方豬骨燒灰存性為末收磁罐內遇有此症豬脂油調搽患處如濕膿幹上之一方丘起龍集槐子炒黃色為末用豬苦膽調搽一方雞子清磨好京墨塗上患處上用三層濕紙蓋之則不起泡覺冷如冰妙一方黃葵花用筷取收入香油內浸爛用油搽之甚妙一方陳石灰浮萍草各等分兌芝麻油調成膏搽數次即愈一方鮮山藥搗爛上之止痛結癡一方韓羽侯方乾燒酒泡搽立止疼痛黃酒亦可一方老棗樹皮燒灰香油調搽凍瘡門一方鮮山藥黑砂糖同搗上之妙一方白蘞黃柏等分為末香油調搽立效一方五倍子為末牛骨髓油調搽瘡口以帛縛定效一方冬瓜皮干茄根煎湯熱洗不過三次愈一方蟹殼燒存性為末蜜調搽患處又治婦人兒枕痛及血崩腹痛每服二錢酒送下一方孫偉方古廟寺內瓦片拾來燒紅棲在水內乘熱洗燙則愈治腳指縫爛瘡吳化善方鵝掌上黃皮陰乾燒存性為末搽上效治手足裂破血口疼痛及冒涉凍凌面目皺壞用豬腦髓沖熱黃酒洗之而愈體氣門一方大活田螺一個巴豆去殼膽礬各一錢麝香半分上將田螺水內養三日去泥土取開蓋入藥於內仍蓋上用線綁之放磁器內次日此螺成水令病者將此藥水不住手抹於腋下候腹內響肚腹欲出恭揀淨地出恭看其屎色黑是其驗也後用枯礬蛤粉各五錢潮腦一錢共研細末每以少少搽上除根一方枯礬陀僧各五錢先以生薑搽之上研細末干搽患處每日二四次搽之藥完而愈骨鯁門一方用山奈汁煎徐徐呷咽之即愈一方用砂糖噙化鯁自下也一方南硼砂西者白如明礬南者黃如桃膠含化食頓即化一方不要四眼婦人見即將箸倒過隨意鉗肉一塊急吞下即愈犬傷門一方治瘋狗咬人三日內用此方可保不死其咬處先用艾火灸或打磁刀出惡血後用膏貼之斑蝥七個去翅足用糯米同浸一夜炒乾去米不用此米倒溝中大黃三錢牽牛一錢五分檳榔一錢麝香半分上為細末麵糊為丸桐子大每服一丸空心黃酒送下後小便痛時用盆接小便有小狗出肚痛小便不通再用水飛滑石七錢白水調服一方斑蝥七個去頭足翅糯米四十九粒同炒去米不用將蝥研末黃酒調服從小便內出有衣膜似血灌血漿即是下也後用滑石六錢大甘草一錢煎湯服之而愈一方斑蝥二十一個去頭足翅用糯米一撮先將蝥七個入鍋內同米慢火炒勿令焦取出再入七個炒焦取出又入七個炒赤色出赤煙為度去蝥不用將米研末作二服冷水入香油少許空心調服須臾又進二服二便利下惡物為度腹痛即以青靛調涼水飲之解或用黃連甘草湯待冷服不可食熱物終身勿食犬肉一方杏仁去皮尖搗爛塗之愈口嚼碎亦好一方新牛糞貼患處甚妙一方斑蝥三個去翅足上研細末黃酒一鍾煎半鍾空心服打下肉狗四十個為盡如欠少歇數日同前再服一方用頭垢少許納瘡中以牛糞敷之馬傷門一方治馬咬與人咬白煮豬肉一大片同飯本人自嚼貼患處立時止痛即效一方先以艾火灸患處後用馬糞及人糞燒存性豬油調敷可愈蠍傷門雄黃消毒膏治蠍螫疼痛難忍者白礬一兩雄黃人言各五錢巴豆三錢黃臘五錢上研細末同臘熔化一處攪均為錠如用時將錠在燈上炙滴於患處愈一方端五日取豬兒眼熬膏入黃臘內令均為丸臨用時燈火化簪尖點疼處即止痛一方用白糖一撮按疼處揉之立止痛一方用取燈上硫黃點火照螫處一燒疼即止一方大蜘蛛一個令他咬去毒痛即止將蜘蛛放水碗中少時活來放去蜈蚣傷一方雄黃一錢麝香半分為末用蓼蘭汁和塗瘡上如無蓼汁以青黛五分以水調和塗之立愈一方治蟲獸傷杏仁甘草口嚼搭傷處一方用草紙燒煙燻之或用獨頭蒜搗爛敷之或用頭髮燒煙燻之一方治毒蜂咬螫蚯蚓泥在所傷之處揉搽效蛇虎傷門一方治毒蛇傷人用扁豆葉搗爛敷之即愈一方用蚯蚓屎和愈鹽水研敷神效一方蝦蟆一隻搗爛敷傷處即愈一方豬牙草內吃外敷俱用黃酒調煎一方香白芷為末每服三錢麥冬煎湯調服其腥穢黃水從瘡口出而愈一方治蛇蠍毒蟲咬傷白礬熔化熱滴之內服末一錢黃酒送下一方治虎爪熊爪所傷及馬咬用栗子嚼爛敷傷處亦妙治貓咬方薄荷搗汁塗上效卻蝨門一方水銀白果紅棗官粉各等分上研爛搽於紙條內入布帶縫緊束腰中即絕搽身上亦可一方治頭髮內生蝨蟲用細茶葉口中嚼爛同水銀五分揉一處搽之即死再不生矣代針散此藥治腫毒數日內外有膿不得自破者如瘡大將此藥散畫個十字即破其膿就出如諸般大瘡有疔角腐肉不脫用此藥水洗之即去又點面上雀斑黑痣桑木灰七錢礦子灰五錢蕎麥秸灰一兩茄科灰一兩上四灰放鍋內水五碗滾十數滾用布袋濾去渣將水從新用鐵勺熬至一小酒鍾存用如洗大瘡對水洗如水一碗對三五茶匙洗替針散治瘡不出頭木鱉草烏各五錢共研濃漿用鵝翎掃敷患處周圍不時加搽中間只留一小孔以待成頭出膿半日即破代針散瘡毒熟時不破王永光方蠶蛾一個燒灰存性為末黃酒調服即破杖瘡門杖瘡膏藥陀僧四兩為末香油八兩上二味人鐵鍋內文武火熬用柳條數根不住手攪待熬成珠色滴水成珠油紙貼患處當時止疼拘膿水出自然生肉有疔用貼藥即化又貼頑瘡天泡臁瘡一方用童便黃酒飲之免血上攻心即用蔥切爛炒熟搭杖處冷則再易止疼消腫散瘀血如神一方用豬膽一個傾入碗內綠豆粉黃柏黃連各二錢為末將藥未入碗中調勻敷杖處杖瘡打疔痂者不用刀刮用黃蒿子焙乾為末摻上即開如心慌者即飲童便一二碗杖破生疔甲方玉簪花葉用手排熟貼患處一二日即落又用嫩荷葉亦可一方抬挾打受刑止痛楊撥什庫方川蚊蛤花椒頭髮各一兩香油二斤將藥入油內泡三五日炸黑去渣滴水成珠拿下火來待溫再下官粉一斤用槐條不住手攪成膏磁罐收貯量瘡大小攤貼一方用燒酒洗杖瘡處切豆腐片攤上頻換兩日生肌又治四肢打傷青腫皮破者亦效一方受刑間難忍者豆腐蔥白同搗爛攤患處換一二次即愈護心散未受刑先服以冤枉之事所用用白臘三錢為末滾黃酒沖服凡人遇廷杖未杖之先以代文墨之人急救將蚺蛇膽用酒磨溫服如急用即切片口嚼以酒下之若無酒用童便或自己小便亦可杖後亦可用最忌與婦女相迎相見收藏膽法將糯米十數粒伴之即不壞大力門大力丸馮嘉寶方蒺藜酒洗炒去刺白茯苓白芍蓯蓉酒洗杜仲酥油炒菟絲子酒煮續斷當歸覆盆子威靈仙破故紙薏苡仁各一兩五錢牛膝酒洗無名異自然銅醋煅七次者一兩乳香沒藥硃砂飛過血竭青鹽各五錢天雄二兩童便浸五日象鱉十個去頭足翅如無用土鱉跳百丈十個去足龍骨二兩酥油炙共為細末煉蜜為丸二錢半重早晚鹽湯或黃酒送下少時用力行功散於四肢大力丸王永光方土鱉酒洗去腸穢十五個地龍去土酒洗無名異焙當歸酒洗自然銅醋炒成粉乳香去油各四兩白蒺藜炒去刺一斤上為細末煉蜜為丸重二錢五分每服一丸空心鹽湯或黃酒送下魚鰾丸黃老爺方當歸酒洗白蒺藜炒去刺魚鰾麩炒牛膝各四兩川芎三錢上為細末煉蜜為丸硃砂為衣每丸重三錢黃酒送下如意大力丸滿人葛保方蒺藜淨末半斤當歸酒洗二兩大生地酒洗牛膝木瓜杜仲鹽水拌炒去絲枸杞骨碎補去毛鹽水拌炒熊掌骨酥炙各一兩虎脛骨酥油一兩二錢甜瓜子微炒一兩乳香去油沒藥去油各五錢黃柏八錢鹽水炒菟絲子酒浸拌蒸龜版酥炙白茯苓人乳泡知母鹽水洗續斷酒洗大熟地各一兩上為細末煉蜜為丸三錢重每服一丸空心滾白水送下以上四方君子人服之保命護身小人服之喪命身亡急救門半夏散治縊死溺死壓死魔死心頭溫者可治及產暈絕中氣不省人事生半夏為末如豆大些吹入鼻中得嚏者須臾即活如無嚏者不能活也一方治凍死及冬落水有氣者脫去濕衣隨解活人熱衣包暖用米炒熱囊盛熨心上冷即換之或炒皂灰亦可候身暖目開氣回再以溫黃酒或薑湯米飲灌之若先用火灸必死一方竹木刺入肉不出酸棗仁燒灰水調塗之一方治惡木刺入肉膿痛成瘡蒲公英搗爛取汁敷之一方治針入肉不出用鼠腦塗之治誤吞銅錢食核桃肉自化之用生慈菇取汁飲之又多食荸薺亦效治飛絲入目物落眼中不出好京墨清水研末銅筷點之即出治誤吞木屑塞喉不下死在須臾鐵斧磨水灌下而愈治煙燻致死白蘿蔔搗汁灌之立蘇治誤吞螞蝗食蜜即化為水治誤吞衣針入腹磁石為末以黃臘合屎做成針樣涼水送下沾住針從大便出又方蠶豆煮熟同韭菜吃下針從豆菜從大便出治箭頭入肉方蜣螂二三個搗爛入巴豆四五粒共搗如泥敷傷處先定痛後作癢至骨少刻簇出矣治刀傷及刎頸未斷喉者白臘為末敷傷處即止血數日如初治針入肉內方五倍子一個土狗一個將倍子開一孔將土狗入內又用麵包火內煨存性為末涼水調貼患處用紙蓋上其針自出矣治天絲並兔毛入眼方用大塊白礬以舌抵之絲毛從舌上出治箭頭方土狗腦子敷傷處其簇自出牝戶錄云兒中毒箭以犀角刺瘡中立愈治蚰蜓入耳用蝸牛塞耳自出治吞金銀銅鐵在腹方石灰一塊硫黃一塊各如皂角子大為末老酒調服即出治竹木入肉方蓖麻子搗爛塗上即出嚼生栗子敷亦可治癬方大風子一兩去皮油核桃五個去硬皮棗一把煮熟去皮核共合一處搗成泥白布口袋藏貯每日搽患處王岫云方千金不傳萬應仙酒方專治遠年近日諸虛百損五癆七傷左癱右瘓口眼歪斜半身不遂言語蹇澀手足踡彎筋骨疼痛渾身粉泡麻木不仁流氣疼痛膀胱疝氣奔豚十隔五噎身