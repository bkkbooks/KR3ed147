錢上為細末香油調搽濕則幹上一方治小兒外腎腫大用石蟹用醋磨搽之即效又方牡蠣用雞蛋清調塗即消立消散治小兒渾身起羅網蜘蛛瘡躁癢難忍用豆腐皮燒存性為末香油調搽立痊一方治小兒渾身頭面及陰囊虛腫使君子肉一兩蜂蜜五錢炙盡搗泥每服一錢食後米湯調又方用地龍糞以甘草煎湯調搽立效口舌生瘡神靈膏孫偉方專治口內諸瘡點暴發火眼上瘙疳效綠豆粉四兩炒黃色川黃連末一兩麝香冰片各五分上用煉過淨蜜四兩共合一處放淨石板上以鐵捶打千捶收貯磁器內聽用如點眼涼水點上瘙瘡水調搽上口瘡用綠豆大一粒含嗽嚥下三白散劉宗順方專治小兒牙疳紅白口瘡紅絨子燒灰珍珠煅各一錢冰片一分共研極細先用淨米泔水洗後上藥神效一方治舌卒腫如豬泡伏滿口不治必死百草霜用酒調塗舌上立愈紅口瘡方乾薑黃連各等分上為末上患處吐水即食物不痛治舌癰方蒲黃為未頻搽又以黃連水煎服瀉心火即愈又方治舌忽脹滿口乾薑蒲黃等分為未於搽患處神效一方治口唇生瘡檳榔燒灰入輕粉末敷之良一方治小兒大人口瘡冰糖一錢冰片半分硼砂三分上為細末葦筒吹患處即愈一方治小兒重舌又名雀舌巴豆半粒飯黏四五粒共搗爛為餅如黃豆大蛄在印堂中待四圍起泡去之即愈小兒咳嗽保金丸治小兒未歲咳嗽南星半夏生白礬巴豆去殼另研杏仁去皮尖另研牙皂各等分上研均棗肉九如桐子大每服三丸針挑於燈上燒存性研爛茶清調灌下參花散治小兒咳嗽吐血人參天花粉等分為細末蜜水調下三五分即愈咳嗽方小兒大人並治半夏薑製杏仁去皮尖微炒各等分上研末薑汁為丸綠豆大每服一錢薑湯下痘疹門三豆湯痘疹將發之際服之令多者少少者可無或有終身不出者黑豆綠豆赤小豆各一升生用甘草三兩上將豆淘淨同甘草用雪水或長流水煮豆熟為度去甘草將豆曬乾又人汁再浸再曬汁盡為度逐日取豆任意食之預防湯疹未出時服之毒少者可使不出毒多者亦能減輕蓋防患於未病之先也黃連一錢五分生犀角鼠黏子炒研山豆根各一錢密蒙花八分苦參七分升麻三分紅花子十粒水一鍾半煎至八分飢時服保嬰稀痘方羌活麻黃各六分生地黃柏升麻甘草黃連歸身各四分防風川芎黃苓酒洗藁本柴胡乾葛蒼朮各三分紅花細辛蘇木陳皮白朮各二分吳茱萸連翹各一分每逢立春夏秋冬前一日用水二鍾煎八分露一宿次早仍溫熱服若四季俱服永不出痘服一二次者出稀應驗如神兔血丸用活兔一隻在臘月初八日取血以蕎麥麵和之加雄黃四五分為丸如綠豆大初生小兒三日後服二三丸乳汁化灌下如通身發出紅點即是其症驗可保終身不出痘疹即出亦不甚稠密也若嬰兒已長成能飲食者就以兔肉啖之尤妙一方治小兒將出痘時取經霜絲瓜連蒂三寸者燒灰存性為末又用炒糯米煎湯不拘時調服二錢出痘必稀一方沿痘瘡不起用荸薺搗汁和白酒漿燉溫服之即起但不可燉大熱大熱則反不妙慎之四聖丹治痘瘡疔黑紫頭黑爛臭不可聞白豌豆四十九粒燒灰存性血餘燒灰存性三分珍珠炒半分上研極細用油煙脂調凡有痘毒痘瘡無論青黃黑紫之色先揭去瘡痂出紫血後上此藥回生變紅色則愈一方治痘癰潰而不斂用白曲即干狗糞不拘多少燒存性為末調火酒服又用生白曲末敷患處即愈又方用白豌豆炒為末摻上即愈一方治小兒痘疹不起李樹上津膠些須熬水服之即愈一方治痘疹出不快干山楂為末湯點服之立出紅點稀痘方金銀花熬膏服之甚妙犀角化毒丹治小兒胎毒丹毒一切諸瘡癤腫痘疹等症犀角鎊朴硝粉甘草各三錢桔梗一兩青黛三錢生地牛蒡子微炒赤茯苓各五錢連翹玄參各六錢共為細末煉蜜為丸如龍眼大每服一丸薄荷湯研下有驚加硃砂為衣一方治小兒大人出痘疹回在心胸作喘發熱用象糞八錢升麻一錢水二鍾煎一鍾服即表出預解痘毒神方雞子頭蛋一個人糞坑內浸七日煮熟食之大妙痧痘俱不出矣痘疹要訣治咽喉痘疹惡實一錢酒拌炒乾為末甘草節七分桔梗一錢五分水一鍾半煎七分服一方孫偉方治小兒疹痘回在心胸滿悶發熱命在須臾者用白公雞冠上血五七點窩兒白酒沖服大便打下痘疹毒則愈一方治風瘙癮疹心下迷悶巴豆五十粒去皮水七鍾煎二鍾以帛拭乾身上隨手即愈小兒傷食腹脹者脾胃氣虛也蘿蔔子炒蘇子乾葛陳皮枳殼白朮各一錢或八分甘草五分或三分水二鍾煎八分服又方治小兒停食脹滿蘿蔔汁服效又方治小兒肚大脹滿雞蛋一個開孔裝入大蜘蛛一個外用紙包裹水濕灰火煨熟食之愈一方治小兒健脾吐瀉燥濕痢疾水瀉橘紅一錢蒼朮米泔浸三換三次去皮炒炙甘草白朮炒各一兩厚朴姜炒一兩五錢藿香七錢為末蒸飯為丸重六分或四分每一丸米湯送下一方治小兒傷積不思飯食吐瀉方豬苓二兩澤瀉四兩茯苓白朮各三兩藿香一兩砂仁五錢上為細末米飯為丸六分重米湯送下或車煎湯下如小便腫硬用小茴香川楝子木通煎湯服小便不利用桂皮五分煎湯遂下消食丸白朮炒砂仁陳皮三稜炒神麯炒麥芽炒各五錢香附炒一兩上研細末麵糊為丸如綠豆大每服三五七十丸加減用白湯送下一方治小兒傷生冷麵食等物山裡紅果多食好又方燒核桃食之良小兒吐瀉燒針丸治小兒吐瀉神效孫偉方黃丹水飛枯礬硃砂各等分上用小棗肉生搗為丸如櫻桃大每服一丸戮於針尖放燈上燒燃研爛冷米泔水送下嘔吐食後服泄瀉食前服一歲至二歲一丸三歲至五歲服二丸一方治大人小兒噁心嘔吐不止大蘿蔔纓子搗爛取汁飲則止治小兒吐瀉不止方孫偉方干糰粉三錢用雞蛋清調攤紅上貼囟門瀉止去藥如嘔吐不止亦用此藥貼腳心其吐即止一方治大人小兒水瀉俱效砂仁搗爛薑汁拌炒二錢水二鍾煎一鍾加黑砂糖一兩再滾二三沸服封臍丸治小兒瀉吐肉豆蔻麵裹煨熟一錢五分雄黃末一錢上為末醋糊為丸黃豆大曬乾用一丸醋泡少時放臍內以膏貼之參苓白朮散治大人小兒驚痢不止人參雲苓炙甘草桔梗各八錢蓮肉百粒白朮土炒白扁豆去皮炒山藥陳皮各一兩砂仁五錢薏苡仁八錢上為細末大人小兒量用一二三錢黑棗湯調服米湯亦可狗皮膏貼小兒瀉痢兼可作封肚暖臍膏木鱉子十個打碎杏仁四十九粒桃枝柳枝各四十九寸用芝麻油七兩將藥入油炸黑枯色去渣淨入飛過黃丹三兩用槐條攪令煙盡滴水成珠待溫再入浮香沒藥各五錢麝香一錢研末攪均入水中退火毒攤狗皮上貼腹臍神效一方治小兒吐乳不止蚯蚓糞為末每服五分空心米湯調下大效一方治小兒吐瀉慢脾驚風一二歲可服硃砂五釐二歲以上一分三歲四風金蠍一個去足翅一歲一個三歲二個上為細末白湯調服一方治小兒嘔吐不止硃砂一分糰粉三分黃土五分以涼水調下即止諸熱門黃芩荊芥湯治小兒感冒發熱痰壅風熱丹毒疼痛頸項有核腮赤癰癤眼目赤腫口舌生瘡咽喉疼痛小便淋瀝胎毒痘疹一切餘毒等症柴胡黃芩荊芥各一錢五分牛蒡子連翹瞿麥車前子赤芍藥滑石梔子木通當歸防風各四分蟬蛻五分甘草一錢五分上加竹葉十片燈心十寸水二鍾煎八分不拘時頻頻服盜汗門胡連丸治小兒盜汗神效柴胡胡黃連各等分為細末蜜丸雞頭子大一二三丸一服放銀器中黃酒化開再入水五分重湯煮二三十沸溫連藥渣飲病重者再一服效一方治小兒虛汗不止桃樹上乾巴桃子七枚浮麥一撮水二鍾煎七分溫服赤遊丹毒治蛇纏丹妙方舊破草蓆人睡過有汗的更好燒灰香油調敷又方看先起處有泡紫黑用小小艾炷香灸三五艾則痊一方孫偉方治小兒赤遊丹毒因火烤衣褥熱炕受其火毒赤腫遊走日久成瘡退皮之症伏龍肝為末用雞蛋清調搽搽一處好一處如四周又腫再搽若從四肢往內腫者重從中往四肢腫者輕腫處用衣針砭出惡血愈一方專治火丹黃芩為末水調搽之一方治小兒赤遊丹毒無名異為末蔥汁調塗立消一方治小兒赤遊行於身體上下延至心胸即死用芒硝煎取濃汁以拭丹上大效一方治遍身赤丹羚羊角燒灰為末以雞子清調塗神效膿泡瘡門銀松丹治膿泡瘡老松香一兩水銀五錢共研極細末用生豬板油調搽神效一方治小兒頭上肥瘡活鯽魚一尾開肚去腸淨入人言三分在內芝麻油煎熟火上焙乾為細末搽瘡上即愈一方治小兒面上一切諸瘡用囫圇五倍子一個鐵勺內炒糊黃色為細末以香油調上一方治膿泡瘡揭去膿蓋用紫皮大蒜外白皮貼上不動自然平安一方治小兒遍身生瘡膿水不幹用黃柏為細末加枯礬少許摻之愈單用黃柏末亦可一方治膿泡瘡疏黃一兩二錢煙硝一錢人言三錢上三味為末每用三分水一碗煎用鵝毛掃水於瘡上一方治小兒頭上膿瘡肥皂子燒灰存性為末麻油調塗三日即愈一方治渾身潦泡如棠梨每個出水有石一片如指甲大其泡遍生抽盡肌肉不治蓬朮三稜各等分上為末每服二錢黃酒調連進幾服愈六聖散孫偉方專治頭面生瘡作癢黃水等症小紅棗燒灰枯礬黃丹官粉上為細末瘡乾用油調搽瘡濕乾摻上四聖散治黃水瘡兼小兒膿瘡胎毒並皆治之官粉黃丹松香白礬飛上等分為細末瘡濕乾用干則油調又方李國忠集熏牛皮鍛成灰官粉松香各等分上為細末用燈窩油搽患處即愈鳳爪散治面上黃水癢瘡久不愈者用公雞爪炒煙盡存性為末用真麻油調上愈又方李如松方松香一兩定粉一錢花椒三分上三味研細末燈窩油調搽效又方荔枝核研細末水調上效小兒牙疳治小兒走馬牙疳神方小紅棗七個去核每個內入黃豆大人言一塊以線縛嚴放炭火內煅之先有黑煙起後有白煙起將盡取出上為細末加冰片半分先用米泔水將黑腐肉洗去此藥上在疳瘡轉遭即不向外走裡面生新肉其效如神走馬牙疳散五倍子大者一個裝入茶葉末在內外用紙封好放灰火內煨黃色為度上為細末先用米泔水洗漱後上藥效又方人中白火煅紅醋淬七次八錢兌人筋炒黃二錢為細末上患處即愈又方明雄七分明礬三分共研細末先用米泔水洗淨上藥效牙疳速效散並治舌上生瘡寒水石燒紅一兩蒲黃蚊蛤各五錢青黛二錢冰片一分上為細末敷上即效七寶散治一切牙疳硼砂枯礬各一錢蘆薈五分青黛二分輕粉二分雄黃二分冰片一分共為細末摻牙疳上或以雞翅掃敷之三仙散治走馬牙疳一時腐爛人中白火煅一錢銅綠三分麝香半分上為細末搽患處不可太多一方治牙疳不論大人小兒俱效尋房上貓兒糞色白者好放瓦上焙存性又用白鹽梅火煅存性各等分上研極細吹於患處即愈治走馬牙疳口瘡方李榮玉方黃五倍子一錢燒灰珍珠煅五分上二味研極細末搽患處即愈疳疾門蘆薈消疳飲專治小兒腹內積聚生疳作痞發燒作渴口內生疳內服此劑外貼化痞膏藥可保痊蘆薈銀柴胡胡黃連川黃連玄參牛蒡子山梔子桔梗羚羊角各五分淡竹葉十片升麻甘草各一錢石膏五分水二鍾煎七分頻服一方治小兒面黃腹大飲食少進肌膚不潤疳疾等症蘆薈蕪荑仁炒去衣白朮人參胡黃連雞肫皮各二錢五分使君子肉夜明沙淘淨各一兩為細末蒸餅為丸如彈子大眼肉有膜豬精肉煮湯化下凡服之餘用米湯化下空心服午後再服其疾自愈益兒餅治小兒疳疾生於皮裡膜外也小紅花子一錢使君子肉山楂肉各五錢白朮四錢檳榔一錢五分木香一錢神麯二錢五分上為末和小米麵一斤做餅蒸熟任意食之一方孫偉方治小兒癖疳痞塊面黃肌瘦好吃泥土發熱口渴等症核桃一百個打開口檳榔四兩硇砂二錢大黃二兩上用水三升煮一炷香下皮硝四兩又煮一炷香再入皮硝四兩如水乾再添水煮以三炷香為度取出與小兒陸續食之自然體胖一方治小兒疳疾但見肚大青筋發豎脖細好食煤炭泥土等症木鱉子蒼朮遠志肉三稜檳榔各一錢七分上為末用牙豬肝不見水一具以竹刀盡去筋膜切薄片相連勿斷用皮硝五錢洗去血摻入前藥末在內用竹籤簽好余末下鋪上蓋放鍋內蒸一炷香取出不拘時與病者食之如不肯食研碎拌在飯內亦可一方治小兒面目皮肉並黃瓜簍根搗爛取汁二合入蜂蜜一大匙暖服一方治小兒疳積腹脹如鼓用蝦蟆三四個去皮爪頭腸水煮入鹽酒蔥椒煮熟與兒食之以愈為度痞疾門牛黃丸專治小兒痞疾雄黃一錢五分蜈蚣二條去頭足砂鍋內炒蘆薈阿魏天竺黃各三分牛黃一分共為末化黃臘一兩為丸如綠豆大每服七丸退熱再服九丸則塊消服十一丸全好雞子清合藥吃亦可黃酒送下又方靈佑宮胡集阿魏三錢蜈蚣三條麝香三分另研全蠍七個雞子一個蜂蜜三兩蔥白二根皂角七錢上為細末用酒糟拳大一塊將前藥搗和成膏量痞大小紅布攤藥貼在患處三日如肉色發青即愈又方用番木鱉一個泡去毛研末膠棗二個去核上二味搗如泥作二丸用雞子一個將頭打破一孔放入藥丸在內外用紙封嚴水濕飯上蒸熟去殼出藥丸埋入地內此蛋與小兒空心食之輕者服三四個重者服五六個痊愈一方治小兒面黃肚大脾疾等症黃臘和雞肝煮良久取起只吃肝三五服即效透膈清涼羊肝散王永光集專治小兒痞疾服之神效白朮蒼朮莪朮水紅花子頭髮燒灰各等分上為細末用羊肝一具以竹刀割去筋膜切片勿斷將藥末摻勻在內合定飯鍋上蒸熟與兒食之甚效又痞疾方水蘿蔔二兩黃酒糟二兩皮硝二兩梔子五個連皮生薑五錢共搗如泥用布包貼患處干則又換貼三五次即愈又方用水紅花連根葉全用熬成膏攤貼效痢疾門薑茶煎專治小兒痢疾生薑三錢細茶三錢水二鍾煎一鍾服效又方烏梅去核細茶各等分上二味為末蜜為丸如彈子大每用一丸白滾水化下一方治小兒紅痢糰粉七錢黑糖三錢水煎服又方治小兒白痢黑糖七錢糰粉三錢水調服脫肛門一方專治小兒脫肛苦參五倍子東壁土各等分上三味煎湯洗再用木賊為末上之即收一方五倍子為末敷上即愈煎湯洗亦好一方生薑汁雞毛掃上自收一方蜘蛛燒為末敷上亦效藏經婦人立效散治胎動不安如重物所墜冷如冰川芎當歸各等分上為粗末每服五錢水煎食前溫服或下血心腹痛酒水相煎服保安散治妊娠因有所傷胎動疼不可忍及血崩不止連皮縮砂不拘多少炒黑去皮上為細末溫酒調下覺腹中熱則胎已安矣治妊娠胎動不安或腰痛胞轉搶心下血不止石菖蒲根搗汁三升飲之二黃散治有孕胎漏下血生地黃熟地黃各等分上為細末每服三錢煎白朮枳殼湯調下立聖散治妊娠下血不止雞肝二具用好酒一斤煮熟共酒食之大效治妊娠誤有失墜或推築著疼痛難忍當歸一兩新春竹茹二合上藥以好酒二斤煮十數沸分三服又方以川芎為末每服二錢溫酒調下火龍散治妊娠心氣痛艾葉半兩鹽炒一半茴香半兩炒川楝子半兩炒上為細末水煎食前服芎歸湯治妊娠胎動子死或不死川芎當歸各等分上㕮咀每服三錢五錢加紫蘇數葉酒水合煎服死者即下未死者即安黃連湯治妊娠兒在肚中啼黃連二錢生甘草一錢上煎濃汁令母呷之葶藶散治妊娠遍身紅腫葶藶二兩白朮五兩白茯苓桑白皮郁李仁各二兩上為粗末水六升煮取二升分三服小便利即差當歸芍藥散治妊娠腹中絞痛心下急痛白芍藥四兩當歸茯苓各一兩澤瀉二兩川芎二兩甘草炙一兩上為細末每服三錢食前溫酒調服以蜜丸亦可竹瀝湯治妊娠恆若煩悶心膽怯此名子煩茯苓三兩竹瀝一升上以水四升煎取二升分三服不差再服厚朴散治妊娠下利黃水不止厚朴三兩薑汁炙黃連二兩肉豆蔻五個連皮上㕮咀用水二升煮取一升服治妊娠無故卒下血阿膠二兩重以蚌粉同炒珠搗為末生地黃半斤搗取汁上以清酒三升將二味搗勻溫過分三服治妊娠無故尿血龍骨一兩為末蒲黃五錢研勻上以酒調方寸匕日三服治妊娠下痢腹痛小便澀糯米一合當歸一兩炒黃耆一兩上細切和勻水二盞煮取一盞二分去渣分四服黃連散治妊娠下痢赤白膿血久不止黃連八錢厚朴薑製阿膠蚌粉炒當歸各六錢艾葉黃柏各四錢乾薑炮四錢上為細末空心米飲調下方寸匕日三服治妊娠小便不禁桑螵蛸十二個炙上為細末每服二錢空心米飲調下白薇散治妊娠遺尿不禁白薇白芍藥炒各等分上為末每服二錢食前溫酒調下茯苓散治妊娠小便不通赤茯苓黃葵子各等分上㕮咀每服五錢水二盞煎一盞溫服如不通恐是轉胞加發灰少調服極妙治妊娠患淋小便澀水道熱不通車前子一兩葵根五錢切上二味以水升半煎至一半空心溫服護胎法治妊娠傷寒白藥子不拘多少為末用雞子清調攤於花紙上如碗來大貼在臍下胎存處干則以溫水調下又方以灶心土水調塗臍下干又塗之又調塗彈子大佳又方壯熱甚則以井底泥敷心下令胎不傷治妊娠瘧疾得效方常山石膏各一兩甘草炙黃芩各半兩烏梅七個上細切以酒水各一碗浸一宿平旦煎至一碗去渣分二服臨發日服驗胎方治婦人經脈不行已經三月者川芎不用火上為細末空心濃煎艾湯調下方寸匕覺腹內微動則有胎也
