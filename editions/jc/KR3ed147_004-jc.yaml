body:
  text: 卷之四婦人門保命勝金丹此丹專能和經益精補虛種子百發百中兼治男婦諸處百損女子胎前產後血經枯閉崩漏赤白帶下男子遺精白濁腰痛腿痠精寒陽痿咳嗽痰喘耳鳴眼花等症南香附一斤第一次用童便浸二次酒浸三次鹽水四次醋浸每次按春五夏三秋七冬十日取起曬乾官揀參川當歸赤芍藥白芍藥香白芷川芎延胡索遠志去心白朮各一兩五錢桂心白茯苓牡丹皮川牛膝各二兩五錢大熟地四兩五錢酒洗蒸白薇四兩去蘆大甘草七錢五分藁本三兩上除香附另制外十七味俱用煮東酒亦按春五夏三秋七冬十日浸過曬乾為末聽用後加赤石脂白石脂各一兩此二味用好醋浸三日入火煅紅再淬入醋內如此七次焙乾為末和入藥內滴乳香明沒藥各一兩真琥珀五錢硃砂五錢飛過上四味用酒煮細研成膏和入前藥內煉蜜杵丸如彈子大以金箔為衣曬乾入磁罐內收貯封固聽用凡修合此丸須擇壬寅或壬申日虔誠製造天使婦人雞犬一切不潔淨人見之為妙赤白石脂真琥珀乳香沒藥硃砂此六味女人可用男人不可用服藥法凡男婦遇諸症取藥一丸放在磁碗內入煮酒半碗蒸服若女子胎煎產後月子諸病用滾水小半碗將藥手揉碎入碗內用碟蓋泡開如水冷將碗放在鍋內慢火煮熱取出碗以銀匙研碎服之職月子病用些須醋滴在藥碗內服之若碗內藥末淨再用酒滌之飲盡令其半醉服後少坐片時待身覺困倦可臥用衣被蓋暖使汗出則通身暢快百疾遂消如女人經至而腹痛者服此一丸下月即不作痛如行經三日前依法連服三日任其久不生育老必能成孕百發百中並無一空然淨第三日服藥交媾一定生男六日行事則生女矣須當熟記莫令差錯可也四物湯治婦人有孕卒然見血胎欲墜落腰疼之甚赤芍藥當歸各一兩熟地一兩五錢川芎二兩共為細末每服三錢阿膠蔥艾煎湯調服催生奪命丹專治臨產胎不順者或橫或倒或幾日不下母丁香末二錢乳香沒藥各一錢麝香二分半共為細末用臘月初八日兔腦合丸雞頭子大硃砂為衣每服一丸冬天熱酒服夏天滾水服黑神散孫偉方治婦人產後敗血致諸痰者臨產亦用當歸熟地白芍酒炒肉桂去皮各一兩沉香蒲黃炒黑沒藥棕灰赤芍各一錢乳香一錢血竭五分甘草炙一兩上共為細末每服二錢凡產後十八症俱用童便和煮酒調服神效黑神丸治產後一切病症俱用四物湯送下一丸仙方注世黑神丸京墨一兩用水研一錢二分飛羅面天麻細末稱二錢佛面真金用五貼二錢百草霜再研共合為丸四十粒產婦一顆保安全烏金丸治產後血迷瘀血上攻兩脅脹滿胃脘疼痛大小便不通發熱作喘大渴飲冷眼見鬼神惡露去早不行但凡有餘之症服之立效乳香沒藥歸尾各一錢百草霜二錢巴豆去油三錢上為細末煉蜜為丸如大黃豆大硃砂為衣每服一丸用煮東酒四兩生薑一片煎二三沸將藥研化服之後吃紅棗三五枚如不吃棗則吐吃過棗吐亦無妨烏金散治產後血迷氣敗余血不止淋瀝不斷臍腹疼痛頭眩無力眼花多汗血山崩漏等症血竭百草霜血餘男子的燒存性當歸肉桂去粗皮真京墨延胡索鯉魚磷炒黃淨末上各等分研極細末每服二錢溫黃酒調服益母丸總督林北海方七月七日採益母草連根葉梗採來將花葉另放一所梗用刀切斷入鍋內水煮無青色將渣梗撈出不用即將花葉放入湯內煮熟撈起曬乾研末將此汁澄去泥腳就將末放入汁內量有十斤對無灰酒童便各五斤用武火煮三炷香為度用荊條篩子一個上攤豆腐濾子布一塊篩子放在大磁盆上將藥攤平上用荊條橫豎架住再將布四圍蓋之勿令黏藥俟澄下水又兌童便煮東酒各三斤將中之藥倒在蒸籠內蒸一炷香如此七次完連汁盡入鍋內文火炒用竹板鏟勻炒乾不沾布單起出曬乾為末細籮籮過煉蜜為丸藥蜜各對無令輕重每丸二錢隨送下如胎前產後臍腹刺痛或作聲胎動不安下血不止糯米湯或當歸湯化下胎衣不下及橫生不順死胎不下經日脹悶心滿心痛炒鹽湯下中風牙關緊急半身不遂失音不語惡露不盡結滯刺痛上衝心胸滿悶童便合黃酒化下兩太陽穴脹痛呵欠心忪氣短瘦弱不思飲食血氣身熱手足頑麻遍身骨節疼痛水瀉赤白痢疾血山崩漏糯米湯化下血暈眼黑頭疼內熱口乾作渴如見鬼神狂言不省人事薄荷湯或黃酒化下淤血不散結成血塊臍腹奔痛煩悶時發寒熱或有冷汗或未滿月氣血閉塞不順咳嗽氣喘胸膈不利噁心吐酸面目浮腫兩脅疼痛鼻衄舌黑白乾四肢無力經脈不調自身發熱骨蒸作腫及婦人久不孕育俱用黃酒化下大小便不通煩躁口苦面垢顏赤五心煩熱薄荷湯化下赤白帶下艾湯化下或瀉血水棗湯化下生煎產後以酒化下活血紫金丹治婦人經脈不通腹內成塊遍體發熱並治心疼歸尾巴豆去皮油各五錢五靈脂代赭石火煅醋淬七次各一兩上共為細末醋糊為丸如綠豆大每服五七丸紅花湯送下如心疼艾醋湯送下婦人懷胎須用安胎之法少生氣惱戒慎勞碌則胎元無傷再少進保胎之劑自然無事稍有不安即服四物湯加白芍黃芩酒炒二味水煎服一孕婦懷胎三個月因氣所觸致傷胎元腹內少痛覺胎微動當服四物湯加茶葉水煎服服後腹作痛煎四物湯送紫金丹一孕婦三四個月或因氣怒或登高騎馬失腳墜落傷折胎動用四物湯加艾葉大麥水煎服一孕婦四五個月勿用傷胎之物若誤食並氣怒傷胎腰疼腹痛見血者煎四物湯送烏金散打下惡物效一孕婦六七個月偶有所傷腹痛不安或從高墜下觸動胎元痛不可忍或見血露或噁心嘔吐即服胎安飲四物湯加白朮條芩陳皮紫蘇砂仁水煎服如胎安不住就服烏金散黑神丸再不應胎不下服奪命丹一孕婦七八個月身體面目四肢浮腫用烏金丸丁香煎湯化下取下惡物後如臍腹痛用四物湯補之加萹蓄艾葉煎湯服一產前小便澀少惡血阻膈不通服烏金散一產煎小便痢疾不通上下不和嘔吐噁心小腹脹滿者服烏金丸一產前卒然不得小便此是胎逼尿胞用蔥白搗膏貼臍上田螺肉搗膏亦可同用亦可一胎漏下血不止或心腹脹滿用當歸川芎各五錢黃酒煎入童便服一若因母病而胎動但治其母惟用當歸川芎益母草上三味煎湯送烏金散若因胎動而母病者急當安胎用芍藥黃芩益母草上三味煎湯送黑神丸須認輕者轉動不安重者必致傷墜若面赤舌青是兒死面青舌赤是母死唇舌俱青兩邊沫出子母俱死速進奪命丹一產前身體黃腫子癇痰涎潮搐目吊口噤中風頭項強直經脈拘急語言蹇澀不省人事者服黑神丸烏金散一胎氣不知心胃脹滿疼痛或臨產驚恐氣結者服烏金丸紫金丹一胎死腹中或橫或倒或產生不下急用蓖麻仁十九粒巴豆仁十九粒麝香半分上共搗如泥攤貼臍下丹田穴隨時就下即支其藥少有不應即服紫金丹烏金丹或者先服藥後貼臍妙一產前頭疼咳嗽用蛇蛻燒灰入黃酒內送烏金丸榆皮煎湯下一臨產之婦不可坐臥只宜行動不可用力太早臨產之時先服烏金散黑神丸黃酒送下一婦人月子後受風四肢攣蜷名雞爪風痛牽遍身不時發者於兩腿膝蓋旁有鬼眼穴各炙三壯即愈一產前崩漏用槐子煎湯送烏金散一治胎衣不下用皮硝一兩童便黃酒調服即下一治產後大熱不能著衣蓋被用豬苦膽一個生飲汁即愈霹靂散治血山崩漏行經不止黃芩炒荊芥炒上研細末各二錢黃酒四兩同盛碗內先將銅秤錘一個用棗木柴燒通紅淬入藥碗內酒滾乘熱服效一方治產後腹脹閉結膨悶氣急坐臣不安大麥芽炒為末用一合陳酒調服立通一方治產後血暈迷悶五靈脂半生半炒為末每服三錢滾水調下如口閉撬開灌之一方治產後面白乃惡血下多氣脫故目閉不開人參一兩煎湯灌之將手掐人中眉心即回神效一方治產後面紫乃惡血上衝氣壅故目開不合山楂一兩炒童便煎服再用韭菜搗爛裝入有嘴瓶內煎滾醋衝入急包其口將嘴熏二鼻孔將手掐人中穴妙一方治產後面黑乃惡血入肺發喘欲死人參五錢蘇木一兩捶碎水三鍾先煎蘇木至一鍾濾支渣調入人參末服神效一方治產後血線下垂乃產婦用力太過垂出肉線痛徹心脾急用老薑三片連皮搗爛入麻油二斤炒乾先以熟絹盛超納近產戶乃以絹袋盛姜就近熏之冷則更換漸次縮入也重者須一二日則愈斷則不可治也一方治新產後不問不病無病即用童便一鍾陳醋半鍾合而溫服則百病不生一方治產後昏暈急將亂髮浸陳醋燒於床前立蘇即溫服童便一碗可保無虞一方治產後惡血攻心語言顛倒健忘失志及打撲損傷一切敗血為病殊效血竭沒藥各等分上為末每服二錢童便陳酒各半鐘調和溫服其惡血即下行而愈一方治產後血崩大下不止蒲黃炒黑為末每服二錢用川芎當歸各二錢煎湯調服即止甚效此藥治身體無汗手足不冷者乃血欲脫而氣未脫也當服之若汗大出手足冷而無神色眼欲閉者身倦無力口鼻氣淺者氣欲脫也不用前方只用人參五錢煎湯熱服即止一方治產後血暈心眼倒築角弓反張四肢搐搦又治中風口噤不能服藥灌入鼻中其效如神以上十方王永光集荊芥穗微炒為末每服三錢童便一鍾煮酒少許調下或煎湯亦可芎歸獨活湯治產後敗血流注經絡腿痛膝痛寒熱往來以成產後雜症川芎丹皮續斷木瓜丹參秦艽獨活各八分當歸香附童便制牛膝各一錢陳皮六分甘草三分赤芍八分茯苓六分水二鍾煎七分溫服一方治產後即眠致敗血攻心發暈欲死者童便半鍾酒一鍾合而溫服即愈一方治產後穢汙不盡腹滿心悶手足煩熱血暈用生藕搗爛取汁飲之最妙產後當忌生冷惟藕不必忌能清血故也一方治婦人血山崩槐花百草霜各等分為末每服二錢空心溫酒調服一方治產後兒枕痛用山楂水煎濃湯加砂糖一匙飲之一方治產後諸勞病當歸赤芍蒲黃川蓽撥紅花乾薑甘草生菟絲子各一錢黃酒一鍾童便半鍾加黑豆一撮煎一鍾空心服渣再煎一方治產後諸病用紅褐子一隻燒灰以黃酒調服出汗百病愈一方治產後血氣上衝心痛鬱金燒灰為末每服二錢米醋調灌即愈一方治產後惡露不盡見神見鬼蛇蛻一條用火燒灰黃酒調服惡露自下方安一方治產後陰翻王永光集澤蘭水煎濃汁熏洗即收一方治婦人產後房事太早成風症黑牛蹄夾內老皮燒存性為末黃酒調服三錢出汗愈妊娠門保胎無憂散治素有產難之患如懷孕至八個月將此藥服一劑半月後又服一劑臨產時再服一二劑能保子母平安不受驚怖真正仙方幸勿輕視當歸酒洗川芎菟絲子酒泡各一錢五分蘄艾酒洗厚朴姜炒各七分白芍一錢酒炒臨月加三分羌活五分嫩黃耆蜜炙荊芥穗各八分川貝母去心一錢枳殼六分炒甘草五分水三鍾姜三片煎一鍾溫服渣再煎青皮安胎飲治胎前瘧疾柴胡青皮草果白朮黃芩茯苓厚朴甘草各八分水一鍾姜三片棗二枚煎八分服白朮調中湯治婦人胎前血瀉白朮人參黃連厚朴各八分白芍山藥陳皮澤瀉山楂茯苓各一錢甘草三分砂仁六分水二鍾煎八分溫服一方治孕婦心痛又止婦人產後發熱干公雞屎炒焦銀硃各二錢五分上共為末每服一錢熱黃酒調服即出冷汗愈一方治妊娠腰痛不可忍者補骨脂炒香為末嚼核桃肉半個空心溫黃酒調服二錢以上二方王永光集一方治懷孕二三個月胎動不安防其欲墜預當服之或素慣墜者服之皆效川杜仲八兩薑汁炒川續斷二兩酒拌炒上為細末棗肉為丸如桐子大每服三十丸陳倉米湯送